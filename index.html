0\" y=\"178\" text-anchor=\"middle\">G 7</text><line x1=\"267\" y1=\"210\" x2=\"318\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19)\"/><text x=\"290\" y=\"216\" text-anchor=\"middle\">H 4</text><text x=\"5\" y=\"280\" font-size=\"12\">ア 1　　イ 2　　ウ 3　　エ 4</text></svg>","explanation":"図1のクリティカルパスはA(5)→B(8)→E(9)→G(7)=29日。図2ではE1(3)→E2(4)でE相当=7日となりE経由が26日，ダミー考慮でもクリティカルパスは28日。29-28=1日の短縮（ア）。"},{"id":"AM2-2025春-20","year":"2025年春","section":"午前II","q_num":20,"q":"JIS Q 21500:2018（プロジェクトマネジメントの手引）によれば，プロセス「品質の計画」で行う活動はどれか。","choices":["成果物及びプロセスの品質を満たしそうなことを監視し，確定済みのツール，手順及び技法を用いて欠陥を発見する。","品質要求事項を満たすために達成する目標及び関連する規格が，適切なプロジェクト組織の構成員によって伝達され，理解され，受け入れられ，遵守されることを確実にする。","品質要求事項を満たすために必要なものとして確定した，ツール，手順，技法及び資源を使用することを確実にする。","プロジェクトの目標に基づいて，プロジェクトに適用する品質に関連する規格を満たすために必要なツール，手順，技法及び資源を確定する。"],"answer":3,"explanation":"「品質の計画」プロセスでは，プロジェクト目標に基づき，適用する品質規格を満たすために必要なツール・手順・技法・資源を確定する活動を行います。"},{"id":"AM2-2025春-21","year":"2025年春","section":"午前II","q_num":21,"q":"メモリインタリーブの説明として，適切なものはどれか。","choices":["外部記憶装置を利用して，主記憶の物理容量を超えるメモリ空間をプログラムから利用可能にする。","主記憶と磁気ディスク装置との間にバッファメモリを置いて，双方のアクセス速度の差を補う。","主記憶と入出力装置との間でCPUを介さずにデータ転送を行う。","主記憶を複数のバンクに分けて，CPUからのアクセス要求を並列的に処理できるようにする。"],"answer":3,"explanation":"メモリインタリーブは，主記憶を複数のバンクに分割し，CPUからのアクセスを各バンクに分散して並列処理することでメモリアクセスを高速化する技術です。ア：仮想記憶，イ：キャッシュメモリ，ウ：DMAの説明です。"},{"id":"AM2-2025春-22","year":"2025年春","section":"午前II","q_num":22,"q":"MTBFがx時間，MTTRがy時間のシステムがある。稼働環境が変わったので，MTBF，MTTRがともに従来の1.5倍になった。新しい稼働環境での稼働率はどうなるか。","choices":["x，yの値によって変化するが，従来の稼働率よりは大きい値になる。","従来の稼働率と同じ値である。","従来の稼働率の1.5倍になる。","従来の稼働率の2/3倍になる。"],"answer":1,"explanation":"稼働率＝MTBF÷(MTBF+MTTR)。MTBFとMTTRが両方1.5倍になると，1.5x÷(1.5x+1.5y)＝x÷(x+y)となり，従来と同じ稼働率になります。"},{"id":"AM2-2025春-23","year":"2025年春","section":"午前II","q_num":23,"q":"DBMSにおいて，複数のトランザクション処理プログラムが同一データベースを同時に更新する場合，論理的な矛盾を生じさせないために用いる技法はどれか。","choices":["再編成","正規化","整合性制約","排他制御"],"answer":3,"explanation":"排他制御（ロック）は，複数のトランザクションが同一データに同時アクセスする際の競合を防ぎ，データの整合性を保つ技法です。"},{"id":"AM2-2025春-24","year":"2025年春","section":"午前II","q_num":24,"q":"スイッチングハブ同士を接続する際に，複数のポートを束ねて一つの論理ポートとして扱う技術はどれか。","choices":["MIME","MIMO","マルチパート","リンクアグリゲーション"],"answer":3,"explanation":"リンクアグリゲーション（IEEE 802.3ad/LACP）は，複数の物理ポートを束ねて1つの論理リンクとして扱う技術です。帯域幅の増加と冗長性の確保が実現できます。"},{"id":"AM2-2025春-25","year":"2025年春","section":"午前II","q_num":25,"q":"労働基準法で定める制度のうち，いわゆる36協定と呼ばれる労使協定に関する制度はどれか。","choices":["業務遂行の手段，時間配分の決定などを大幅に労働者に委ねる業務に適用され，労働時間の算定は，労使協定で定めた労働時間の労働とみなす制度","業務の繁閑に応じた労働時間の配分などを行い，労使協定によって1か月以内の期間を平均して1週の法定労働時間を超えないようにする制度","時間外労働，休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることによって，法定労働時間を超える時間外労働が認められる制度","労使協定によって1か月以内の一定期間の総労働時間を定め，1日の固定勤務時間以外では，労働者に始業・終業時刻の決定を委ねる制度"],"answer":2,"explanation":"36協定（労働基準法第36条）とは，時間外労働・休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることで，法定労働時間を超える労働が認められる制度です。ア：裁量労働制，イ：変形労働時間制，エ：フレックスタイム制の説明です。"},{"id": "AM2-2024春-01", "year": "令和6年春", "section": "午前II", "q_num": 1, "q": "JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，サービスマネジメントシステム（SMS）の支援に関する要求事項のうち，“意図した結果を達成するために，知識及び技能を適用する能力”に関するものはどれか。", "choices": ["サービスの運用に必要な人，技術，情報及び財務に関する資源を決定し，提供する。", "サービスの運用を支援するために必要な知識を決定し，維持する。", "組織の要員がサービスマネジメントの方針及び目的に関する認識をもつようにする。", "適切な教育，訓練又は経験に基づいて，組織の管理下でSMS及びサービスのパフォーマンス及び有効性に影響を与える業務を行う人々が力量を備えていることを確実にする。"], "answer": 3, "explanation": "JIS Q 20000-1:2020の「力量」に関する要求事項（7.2）では，適切な教育・訓練・経験に基づいて，SMS及びサービスに影響を与える業務を行う人々が力量を備えていることを確実にすることが求められています。これが“知識及び技能を適用する能力”を確実にする取組みに当たります。"},{"id": "AM2-2024春-02", "year": "令和6年春", "section": "午前II", "q_num": 2, "q": "サービスマネジメントにおける“サービス継続管理”の活動において，組織は，サービス継続計画を作成し，実施し，維持しなければならない。“サービス継続の発動の基準及び責任”や“重大なサービスの停止の場合に実施する手順”と同様に，サービス継続計画に含めなければならない事項はどれか。", "choices": ["顧客又はサービスに重大な影響を及ぼす可能性のある変更を判断する基準", "サービスに対する需要に基づいた現在の容量・能力及び予測される容量・能力", "他のサービスへの依存関係", "平常業務の状態に復帰するための手順"], "answer": 3, "explanation": "JIS Q 20000-1:2020のサービス継続管理では，サービス継続計画に「発動の基準及び責任」「重大な停止時に実施する手順」に加え，「平常業務の状態に復帰するための手順」を含めることが要求されています。ア・イ・ウはそれぞれ変更管理，容量・能力管理，依存関係の整理に関する事項です。"},{"id": "AM2-2024春-03", "year": "令和6年春", "section": "午前II", "q_num": 3, "q": "サービスマネジメントの“事業関係管理”において，サービス提供者が実施すべき活動はどれか。", "choices": ["外部供給者が提供又は運用するサービス，サービスコンポーネント，プロセス又はプロセスの一部に関する適用範囲を含めた契約文書を作成し，外部供給者と合意する。", "サービスの顧客，利用者及び他の利害関係者を特定し，文書化し，顧客及び他の利害関係者との間にコミュニケーションのための取決めを確立する。", "提供する各サービスについて，文書化したサービスの要求事項に基づいて，一つ以上のSLAを顧客と合意する。", "内部供給者又は供給者として行動する顧客に対して，サービスレベル目標，他のコミットメント，活動及び関係者間のインタフェースを定義するための合意文書を作成し，合意し，維持する。"], "answer": 1, "explanation": "事業関係管理は，サービスの顧客，利用者及び他の利害関係者を特定して文書化し，それらとのコミュニケーションのための取決めを確立する活動です。ア・エは供給者管理，ウはサービスレベル管理（SLA）に関する活動に当たります。"},{"id": "AM2-2024春-04", "year": "令和6年春", "section": "午前II", "q_num": 4, "q": "ITIL4の可用性管理プラクティスにおいて，障害発生後のサービスの回復の速さを測定する指標はどれか。", "choices": ["MTBF", "MTRS", "サービス期間中の合計ダウンタイム", "平均サービス・インシデント間隔"], "answer": 1, "explanation": "MTRS（Mean Time to Restore Service：平均サービス回復時間）は，障害発生からサービスが回復するまでの平均時間を表し，障害発生後の回復の速さを測定する指標です。MTBFはサービスが継続して利用できる平均時間を表す指標です。"},{"id": "AM2-2024春-05", "year": "令和6年春", "section": "午前II", "q_num": 5, "q": "JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，内部監査の要求事項のうち，適切なものはどれか。", "choices": ["各監査について，監査の基準及び監査範囲を明確にする。", "監査は，新しいリスク又はその他の問題が発見されたときに実施する。", "監査を受ける業務を担当する要員の中から，適切な知識を有する人を監査員に選定する。", "前回までの監査の結果を考慮せずに，監査プログラムを計画する。"], "answer": 0, "explanation": "JIS Q 20000-1:2020の内部監査の要求事項では，各監査について監査の基準及び監査範囲を明確にすることが求められています。監査プログラムは過去の監査結果も考慮して計画し，監査員は被監査対象の業務から独立した者を選定する必要があります。"},{"id": "AM2-2024春-06", "year": "令和6年春", "section": "午前II", "q_num": 6, "q": "サービス提供時間帯が毎日0時から24時のITサービスにおいて，ある年の4月1日0時から6月30日24時までのサービス停止状況は表のとおりであった。システムバージョンアップ作業に伴う停止時間は，計画停止時間として顧客との間で合意している。4月1日から6月30日までのITサービスのサービス可用性は何%か。ここで，サービス可用性（%）は小数第3位を四捨五入するものとする。", "choices": ["95.52", "95.70", "99.52", "99.63"], "answer": 2, "explanation": "4月1日から6月30日までは91日＝2,184時間。計画停止であるバージョンアップ作業の84時間はサービス提供時間から除外して考えるため，対象となるサービス提供時間は2,184－84＝2,100時間。これに対し，計画外の停止（ハードウェア故障）が10時間あったので，可用性＝(2,100－10)÷2,100＝0.99523…≒99.52%（ウ）となります。", "figure": "<svg viewBox=\"0 0 560 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><rect x=\"10\" y=\"10\" width=\"190\" height=\"34\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"10\" width=\"350\" height=\"34\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"31\" text-anchor=\"middle\" font-weight=\"bold\">停止理由</text><text x=\"375\" y=\"31\" text-anchor=\"middle\" font-weight=\"bold\">停止時間</text><rect x=\"10\" y=\"44\" width=\"190\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"44\" width=\"350\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"60\" text-anchor=\"middle\">システムバージョンアップ</text><text x=\"105\" y=\"74\" text-anchor=\"middle\">作業に伴う停止</text><text x=\"375\" y=\"67\" text-anchor=\"middle\">5月2日22時から5月6日10時までの84時間</text><rect x=\"10\" y=\"82\" width=\"190\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"82\" width=\"350\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"105\" text-anchor=\"middle\">ハードウェア故障に伴う停止</text><text x=\"375\" y=\"105\" text-anchor=\"middle\">6月26日10時から20時までの10時間</text></svg>"},{"id": "AM2-2024春-07", "year": "令和6年春", "section": "午前II", "q_num": 7, "q": "総所有費用（TCO）の説明として，適切なものはどれか。", "choices": ["自社に導入した業務システムの開発総費用とハードウェア購入費用", "システムの導入から廃棄に至るライフサイクルの総費用", "ハードウェア及びソフトウェアを導入して稼働させるまでの総費用", "ハードウェア購入費用とヘルプデスクや利用者教育などのテクニカルサポートに要する費用"], "answer": 1, "explanation": "TCO（Total Cost of Ownership：総所有費用）は，システムの導入から運用，保守，廃棄に至るライフサイクル全体でかかる総費用（導入費・運用費・保守費・教育費・廃棄費用などを含む）を指す概念です。"},{"id": "AM2-2024春-08", "year": "令和6年春", "section": "午前II", "q_num": 8, "q": "サービスデスクにWFM（Work Force Management）システムを導入する目的として，適切なものはどれか。", "choices": ["アウトバウンド業務において顧客の電話番号を自動的に発信することによって，要員による電話の掛け誤りを防止する。", "過去の応対記録に基づいて顧客の興味や関心に合わせたきめ細かい対応を行い，顧客満足度を高める。", "顧客からの問合せ件数の実績に基づいて今後の問合せ件数を予測し，要員の勤務スケジュールを自動的に作成する。", "資料請求の受付などの簡単な顧客対応は音声による自動応答で行うことによって，要員が高度な顧客対応に集中できるようにする。"], "answer": 2, "explanation": "WFM（Work Force Management）システムは，過去の問合せ件数の実績に基づいて将来の問合せ件数を予測し，それに応じた要員の勤務スケジュールを自動的に作成して，必要な人員を必要なときに確保するためのシステムです。"},{"id": "AM2-2024春-09", "year": "令和6年春", "section": "午前II", "q_num": 9, "q": "運用サービスを提供するデータセンターにおいて，サーバに仮想化技術を用いることによって得られる利点のうち，適切なものはどれか。", "choices": ["仮想サーバを，それぞれのリクエストの応答時間が長くなる時間帯が重ならないように，少数の物理サーバに再配置することによって，現状の応答時間を保証した上で物理サーバの台数を削減できる。", "クラスタ構成のサーバの処理能力をスケールアップによって増強する場合，ソフトウェアの基本ライセンスの条件の確認はしなくてもよい。", "サービスの利用が少なくなる夜間の消費電力量を削減するために，物理サーバの稼働台数を減少させることは，ライブマイグレーションによって仮想サーバを少数の物理サーバに集約すれば，サービスを停止させなくて済む。", "大規模データの分散処理を実現するソフトウェアApache Hadoopを構築したシステムを評価する場合，このシステムを複数の仮想サーバを稼働させる1台の物理サーバ上に構築することによって，システムの処理能力を検証できる。"], "answer": 2, "explanation": "サーバ仮想化のライブマイグレーション機能を利用すれば，稼働中の仮想サーバを停止させることなく別の物理サーバへ移動できるため，夜間など利用が少ない時間帯に仮想サーバを少数の物理サーバへ集約し，他の物理サーバを停止して消費電力を削減することができます。"},{"id": "AM2-2024春-10", "year": "令和6年春", "section": "午前II", "q_num": 10, "q": "災害時における復旧対策の説明のうち，ウォームサイトのものはどれか。", "choices": ["ITサービスが再開されるまで，手作業で業務を遂行する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点に，いつでも利用できる状態の本番環境と同じバックアップシステムを備えておき，災害時にはバックアップシステムに切り替えることでサービスを復旧する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点に，本番環境とほぼ同じシステムを非稼働状態で待機させておき，災害時にはこのシステムを稼働させて復旧する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点を確保しておき，災害時には自社のコンピュータ機器を設置して，数日から数週間で復旧する。"], "answer": 2, "explanation": "ウォームサイトは，あらかじめ電源・ネットワークなどの設備を備えた拠点に，本番環境とほぼ同じシステムを非稼働状態で待機させておき，災害時にそのシステムを稼働させて復旧する方式です。ア：手作業による代替，イ：ホットサイト，エ：コールドサイトの説明に当たります。"},{"id": "AM2-2024春-11", "year": "令和6年春", "section": "午前II", "q_num": 11, "q": "基幹業務システムの構築及び運用において，データ管理者（DA）とデータベース管理者（DBA）を別々に任命した場合のDAの役割として，適切なものはどれか。", "choices": ["業務データ量の増加傾向を把握し，ディスク装置の増設などを計画して実施する。", "システム開発の設計工程では，主に論理データベース設計を行い，データ項目を管理して標準化する。", "システム開発のテスト工程では，主にパフォーマンスチューニングを担当する。", "システム障害が発生した場合には，データの復旧や整合性のチェックなどを行う。"], "answer": 1, "explanation": "データ管理者（DA）は，データを全社的な資源として捉え，システム開発の設計工程において主に論理データベース設計を行い，データ項目の管理・標準化を担当します。ア・ウ・エは物理的なデータベースの構築・運用を担うDBA（データベース管理者）の役割です。"},{"id": "AM2-2024春-12", "year": "令和6年春", "section": "午前II", "q_num": 12, "q": "データセンターの施設効率を測る定量指標である，PUE（Power Usage Effectiveness）の計算式はどれか。", "choices": ["IT機器の総消費電力 ÷ データセンターの総消費電力", "IT機器の総消費電力 ÷ データセンターの総床面積", "IT機器の総処理量 ÷ データセンターの総消費電力", "データセンターの総消費電力 ÷ IT機器の総消費電力"], "answer": 3, "explanation": "PUE（Power Usage Effectiveness）は「データセンターの総消費電力 ÷ IT機器の総消費電力」で算出される指標で，値が1に近いほど空調や照明などに使われる電力が少なく，データセンターのエネルギー効率が高いことを示します。"},{"id": "AM2-2024春-13", "year": "令和6年春", "section": "午前II", "q_num": 13, "q": "空調計画における冷房負荷には，“外気負荷”，“室内負荷”，“伝熱負荷”，“日射負荷”などがある。冷房負荷の軽減策のうち，“伝熱負荷”の軽減策として，最も適切なものはどれか。", "choices": ["使用を終えたら，その都度PCの電源を切る。", "隙間風や換気による影響を少なくする。", "日光が当たる南に面したガラス窓をむやみに大きなものにしない。", "屋根や壁面に断熱加工を施す。"], "answer": 3, "explanation": "伝熱負荷とは，屋根，壁，窓などを通して外部の熱が室内に伝わることによって生じる負荷のことです。屋根や壁面に断熱加工を施すことで，外部から室内への熱の伝わりを抑制し，伝熱負荷を軽減できます。ア：室内負荷，イ：外気負荷，ウ：日射負荷の軽減策に当たります。"},{"id": "AM2-2024春-14", "year": "令和6年春", "section": "午前II", "q_num": 14, "q": "システム監査基準（令和5年）におけるシステム監査基準の説明として，適切なものはどれか。", "choices": ["システム監査が効果的かつ効率的に行われるために，システム監査のあるべき体制や実施方法等を示したもの", "システム監査の信頼性を保つために，システム監査人が保持すべき情報システム及びシステム監査に関する専門的知識・技能の水準を定めたもの", "情報システムのガバナンス，マネジメント，コントロールを点検・評価・検証する際の判断の尺度となるもの", "情報システムの利活用において共通して留意すべき事項を体系化・一般化してまとめたもの"], "answer": 0, "explanation": "システム監査基準（令和5年）は，システム監査が効果的かつ効率的に行われるために，システム監査人が従うべき監査の体制や実施方法等の判断の尺度を示した基準です。イはシステム監査人に求められる知識・技能の水準，ウ・エはシステム管理基準に関する説明に当たります。"},{"id": "AM2-2024春-15", "year": "令和6年春", "section": "午前II", "q_num": 15, "q": "デジタル署名のあるソフトウェアをインストールするときに，そのソフトウェアの発行元を確認するために使用する証明書はどれか。", "choices": ["EV SSL証明書", "クライアント証明書", "コードサイニング証明書", "サーバ証明書"], "answer": 2, "explanation": "コードサイニング証明書は，ソフトウェアの開発元（発行元）が改ざんされていないこと及びその真正性を確認できるように，実行ファイルなどにデジタル署名を付与する際に用いられる証明書です。"},{"id": "AM2-2024春-16", "year": "令和6年春", "section": "午前II", "q_num": 16, "q": "JIS Q 27000:2019（情報セキュリティマネジメントシステム用語）における用語の定義として，適切なものはどれか。", "choices": ["トップマネジメントとは，リスクを運用管理することについて，アカウンタビリティ及び権限をもつ人又は主体のことである。", "リスクアセスメントとは，リスクを修正するプロセスのことであり，リスクを生じさせる活動を開始又は継続しないと決定することによって，リスクを回避することを含む。", "リスク評価とは，リスク及び/又はその大きさが受容可能か又は許容可能かを決定するために，リスク分析の結果をリスク基準と比較するプロセスのことである。", "リスク分析とは，リスクを発見，認識及び記述するプロセスのことであり，リスク源，事象，それらの原因及び起こり得る結果の特定が含まれる。"], "answer": 2, "explanation": "JIS Q 27000:2019では，リスク評価とは「リスク及び/又はその大きさが受容可能か又は許容可能かを決定するために，リスク分析の結果をリスク基準と比較するプロセス」と定義されています。ア，イ，エの記述はそれぞれリスクオーナー，リスク対応，リスク特定の説明に当たります。"},{"id": "AM2-2024春-17", "year": "令和6年春", "section": "午前II", "q_num": 17, "q": "IoT推進コンソーシアム，総務省，経済産業省が策定した“IoTセキュリティガイドライン（Ver 1.0）”における“要点17．出荷・リリース後も安全安心な状態を維持する”に対策として挙げられているものはどれか。", "choices": ["IoT機器及びIoTシステムが収集するセンサーデータ，個人情報などの情報の洗い出し，並びに保護すべきデータの特定", "IoT機器のアップデート方法の検討，アップデートなどの機能の搭載，アップデートの実施", "IoT機器メーカー，IoTシステムやサービスの提供者，利用者の役割の整理", "PDCAサイクルの実施，組織としてIoTシステムやサービスのリスクの認識，対策を行う体制の構築"], "answer": 1, "explanation": "IoTセキュリティガイドライン（Ver 1.0）の「要点17．出荷・リリース後も安全安心な状態を維持する」では，IoT機器のアップデート方法の検討，アップデート機能の搭載，アップデートの実施が対策として挙げられています。これは出荷後に発見された脆弱性へ対応し続けるための取組みです。"},{"id": "AM2-2024春-18", "year": "令和6年春", "section": "午前II", "q_num": 18, "q": "ステークホルダ登録簿の作成及び更新に関する記述のうち，適切なものはどれか。", "choices": ["重要なステークホルダを特定するために，社外の人だけをステークホルダ登録簿に記載する。", "ステークホルダに公平に対応するために，ステークホルダ登録簿には登録したステークホルダの重要度を付けない。", "ステークホルダのニーズや期待の変化に対応するために，ステークホルダ登録簿の内容を継続的に更新する。", "ステークホルダの利害及び関係に関連する情報を漏れなく記載するために，プロジェクトをある程度進めてからステークホルダ登録簿を作成する。"], "answer": 2, "explanation": "ステークホルダ登録簿は，ステークホルダのニーズや期待が時間の経過とともに変化することに対応するため，プロジェクトを通じて継続的に更新する必要があります。社内外を問わず重要なステークホルダを特定し，重要度などの分類情報も含めてプロジェクトの初期段階から作成します。"},{"id": "AM2-2024春-19", "year": "令和6年春", "section": "午前II", "q_num": 19, "q": "アローダイアグラムで表される日程のプロジェクトにおいて，現在のクリティカルパスは作業A，D，I，Jである。作業Dを2日，作業Jを1日短縮すると，作業Fの総余裕日数は何日減少するか。ここで，総余裕日数とは，当該作業に先行する作業が遅れなしに完了したとき，総所要日数を増加させることなく，当該作業が遅れてもよい日数である。", "choices": ["1", "2", "3", "4"], "answer": 0, "explanation": "変更前は，作業Fが合流する結合点の最遅結合点時刻は13日（J経由：A+D+I=13からJ=4を引いた値），最早結合点時刻は9日（B+F=3+6）であり，総余裕日数は13－9＝4日です。Dを2日，Jを1日短縮すると，新たな最長経路はB→E→I→J（3+3+6+3＝15日）となり，Fが合流する結合点の最遅結合点時刻は12日（15－J=3），最早結合点時刻は変わらず9日のため，総余裕日数は12－9＝3日になります。よって4－3＝1日減少します（ア）。", "figure": "<svg viewBox=\"0 0 580 290\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:12px\"><defs><marker id=\"ar19b\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></marker></defs><circle cx=\"40\" cy=\"150\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"180\" cy=\"80\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"180\" cy=\"150\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"180\" cy=\"220\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"330\" cy=\"100\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"410\" cy=\"160\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"530\" cy=\"160\" r=\"14\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"52\" y1=\"142\" x2=\"167\" y2=\"87\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"100\" y=\"105\" text-anchor=\"middle\">A</text><text x=\"100\" y=\"118\" text-anchor=\"middle\">3</text><line x1=\"54\" y1=\"150\" x2=\"166\" y2=\"150\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"108\" y=\"143\" text-anchor=\"middle\">B</text><text x=\"108\" y=\"165\" text-anchor=\"middle\">3</text><line x1=\"52\" y1=\"158\" x2=\"167\" y2=\"213\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"100\" y=\"200\" text-anchor=\"middle\">C</text><text x=\"100\" y=\"213\" text-anchor=\"middle\">7</text><line x1=\"194\" y1=\"83\" x2=\"317\" y2=\"98\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"250\" y=\"80\" text-anchor=\"middle\">D</text><text x=\"250\" y=\"93\" text-anchor=\"middle\">4</text><line x1=\"192\" y1=\"143\" x2=\"318\" y2=\"109\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"245\" y=\"140\" text-anchor=\"middle\">E</text><text x=\"245\" y=\"153\" text-anchor=\"middle\">3</text><line x1=\"194\" y1=\"153\" x2=\"397\" y2=\"160\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"290\" y=\"175\" text-anchor=\"middle\">F</text><text x=\"290\" y=\"188\" text-anchor=\"middle\">6</text><line x1=\"192\" y1=\"212\" x2=\"398\" y2=\"170\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"290\" y=\"222\" text-anchor=\"middle\">G</text><text x=\"290\" y=\"235\" text-anchor=\"middle\">4</text><path d=\"M 182 232 Q 350 270 516 176\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"345\" y=\"248\" text-anchor=\"middle\">H</text><text x=\"345\" y=\"261\" text-anchor=\"middle\">7</text><line x1=\"338\" y1=\"112\" x2=\"403\" y2=\"149\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"390\" y=\"117\" text-anchor=\"middle\">I</text><text x=\"390\" y=\"130\" text-anchor=\"middle\">6</text><line x1=\"424\" y1=\"160\" x2=\"516\" y2=\"160\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"470\" y=\"153\" text-anchor=\"middle\">J</text><text x=\"470\" y=\"175\" text-anchor=\"middle\">4</text><rect x=\"430\" y=\"15\" width=\"140\" height=\"55\" fill=\"none\" stroke=\"#94a3b8\"/><circle cx=\"452\" cy=\"42\" r=\"11\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"505\" y=\"35\" text-anchor=\"middle\" font-size=\"10\">作業名</text><text x=\"505\" y=\"53\" text-anchor=\"middle\" font-size=\"10\">所要日数</text><text x=\"20\" y=\"282\" font-size=\"12\">ア 1　　イ 2　　ウ 3　　エ 4</text></svg>"},{"id": "AM2-2024春-20", "year": "令和6年春", "section": "午前II", "q_num": 20, "q": "品質の定量的評価の指標のうち，ソフトウェアの保守性の評価指標になるものはどれか。", "choices": ["（最終成果物に含まれる誤りの件数）÷（最終成果物の量）", "（修正時間の合計）÷（修正件数）", "（変更が必要となるソースコードの行数）÷（移植するソースコードの行数）", "（利用者からの改良要求件数）÷（出荷後の経過月数）"], "answer": 1, "explanation": "ソフトウェアの保守性は，不具合を修正する際に要する時間や手間の少なさで評価されます。「修正時間の合計 ÷ 修正件数」は1件当たりの平均修正時間を表し，保守性（修正のしやすさ）を測る代表的な指標です。アは信頼性，ウは移植性，エは利用者満足度などに関する指標です。"},{"id": "AM2-2024春-21", "year": "令和6年春", "section": "午前II", "q_num": 21, "q": "ネットワークインタフェースカード（NIC）のチーミングの説明として，適切なものはどれか。", "choices": ["処理能力を超えるフレームを受信する可能性があるとき，一時的に送信の中断を要求し，受信バッファがあふれないようにする。", "接続相手のNICが対応している通信規格又は通信モードの違いを自動的に認識し，最適な速度で通信を行うようにする。", "ソフトウェアでNICをエミュレートし，1台のコンピュータに搭載している物理NICの数以上のネットワークインタフェースを使用できるようにする。", "一つのIPアドレスに複数のNICを割り当て，負荷分散，帯域の有効活用，耐障害性の向上などを図る。"], "answer": 3, "explanation": "NICのチーミング（ボンディング）は，一つのIPアドレスに複数の物理NICを割り当てて束ね，あたかも1つの論理インタフェースのように扱う技術です。これによって負荷分散，帯域の有効活用，一部のNICが故障しても通信を継続できる耐障害性の向上などが図れます。ア：フロー制御，イ：オートネゴシエーション，ウ：NICの仮想化の説明に当たります。"},{"id": "AM2-2024春-22", "year": "令和6年春", "section": "午前II", "q_num": 22, "q": "クライアントサーバシステムの3層アーキテクチャを説明したものはどれか。", "choices": ["アプリケーションに必要なGUIとAPIをプレゼンテーション層とファンクション層に分離したアーキテクチャであり，データベースサーバを独立させている。", "プレゼンテーション層，ファンクション層，データ層に分離したアーキテクチャであり，各層のOSは異なってもよい。", "プレゼンテーション層とデータ層をミドルウェア層によって連結したアーキテクチャであり，各層をネットワークで接続したコンピュータに分散できる。", "プレゼンテーション層とファンクション層を結合し，データ層を分離したアーキテクチャであり，データベースサーバを効率的に運用できる。"], "answer": 1, "explanation": "3層アーキテクチャは，画面表示を担うプレゼンテーション層，業務処理を担うファンクション（ビジネスロジック）層，データ管理を担うデータ層の三つに分離した構成です。各層は独立したコンピュータ上に構築できるため，それぞれ異なるOSを用いることも可能です。"},{"id": "AM2-2024春-23", "year": "令和6年春", "section": "午前II", "q_num": 23, "q": "機械学習を用いたビッグデータ分析において使用されるJupyterLabの説明はどれか。", "choices": ["定期的に実行するタスクを制御するための，タスク管理ツールである。", "データ分析を行う際に使用する，対話型の開発環境である。", "並列分散処理を行うバッチシステムである。", "マスターノードをもたない分散データベースシステムである。"], "answer": 1, "explanation": "JupyterLabは，プログラムのコード，実行結果，グラフ，説明文（ドキュメント）などを一つのノートブック上にまとめ，対話的に確認しながらデータ分析や機械学習のプログラムを開発できる対話型の開発環境です。"},{"id": "AM2-2024春-24", "year": "令和6年春", "section": "午前II", "q_num": 24, "q": "インターネット上やイントラネット上でのファイル共有サービスなどで用いられ，HTTPを拡張して，ファイルやフォルダの参照，作成，削除，属性変更などを可能にする仕組みはどれか。", "choices": ["iSCSI", "NFS", "WebDAV", "WebRTC"], "answer": 2, "explanation": "WebDAV（Web-based Distributed Authoring and Versioning）は，HTTPを拡張したプロトコルであり，Webサーバ上のファイルやフォルダの参照・作成・削除・属性（プロパティ）の変更などをリモートから行えるようにする仕組みです。インターネットやイントラネット上のファイル共有サービスなどで利用されます。"},{"id": "AM2-2024春-25", "year": "令和6年春", "section": "午前II", "q_num": 25, "q": "NFTの説明として，適切なものはどれか。", "choices": ["アーティストによってWeb上で発表され，パブリックドメインに置かれる絵画・音楽などのデジタルアートの総称", "芸術作品や貴金属などの売買において，正当な取引であることを記録するために暗号資産を支払の手段とすること", "ブロックチェーン技術を用いて一意性が付与されることによって，代替不可能なことが担保されたデジタルデータ", "メタバースやオンラインゲームなどの仮想空間において，代用貨幣を用いて利用者がアイテムなどを売買すること"], "answer": 2, "explanation": "NFT（Non-Fungible Token：非代替性トークン）は，ブロックチェーン技術を用いて一意性（唯一性）を証明するトークンを発行することで，デジタルデータに代替不可能な価値（証明）を持たせる仕組みです。デジタルアートや収集品などの真正性・所有権の証明に利用されます。"}, {"id": "AM1-2024春-01", "year": "令和6年春", "section": "午前I", "q_num": 1, "q": "ATM（現金自動預け払い機）が1台ずつ設置してある二つの支店を統合し，統合後の支店にはATMを1台設置する。統合後のATMの平均待ち時間を求める式はどれか。ここで，待ち時間はM/M/1の待ち行列モデルに従い，平均待ち時間にはサービス時間を含まず，ATMを1台に統合しても十分に処理できるものとする。\n\n〔条件〕\n(1) 統合後の平均サービス時間：Ts\n(2) 統合前のATMの利用率：両支店ともρ\n(3) 統合後の利用者数：統合前の両支店の利用者数の合計", "choices": ["ρ/(1-ρ)×Ts", "ρ/(1-2ρ)×Ts", "2ρ/(1-ρ)×Ts", "2ρ/(1-2ρ)×Ts"], "answer": 3, "explanation": "統合後はATMを1台にするため，利用者数（到着率）は2支店分の合計となり，ATM1台当たりの利用率は2ρになる。M/M/1の待ち行列モデルにおける平均待ち時間（サービス時間を含まない待ち時間）は，利用率をρ'とすると ρ'/(1-ρ') × Ts で表される。ρ'=2ρを代入すると，2ρ/(1-2ρ)×Ts（エ）となる。"}, {"id": "AM1-2024春-02", "year": "令和6年春", "section": "午前I", "q_num": 2, "q": "符号長7ビット，情報ビット数4ビットのハミング符号による誤り訂正の方法を，次のとおりとする。\n\n受信した7ビットの符号語x1 x2 x3 x4 x5 x6 x7（x4=0又は1）に対して\nc0 = x1 + x3 + x5 + x7\nc1 = x2 + x3 + x6 + x7\nc2 = x4 + x5 + x6 + x7\n（いずれもmod2での計算）\nを計算し，c0, c1, c2の中に少なくとも一つは0でないものがある場合には，\ni = c0 + c1×2 + c2×4\nを求めて，左からiビット目を反転することによって誤りを訂正する。\n受信した符号語が1000101であった場合，誤り訂正後の符号語はどれか。", "choices": ["1000001", "1000101", "1001101", "1010101"], "answer": 3, "explanation": "受信した符号語x1～x7 = 1,0,0,0,1,0,1について計算すると，c0 = x1+x3+x5+x7 = 1+0+1+1 = 1（mod2），c1 = x2+x3+x6+x7 = 0+0+0+1 = 1（mod2），c2 = x4+x5+x6+x7 = 0+1+0+1 = 0（mod2）。i = c0 + c1×2 + c2×4 = 1 + 2 + 0 = 3 となるので，左から3ビット目（x3）を反転する。x3は0→1となり，訂正後の符号語は1010101（エ）となる。"}, {"id": "AM1-2024春-03", "year": "令和6年春", "section": "午前I", "q_num": 3, "q": "各ノードがもつデータを出力する再帰処理f(ノードn)を定義した。この処理を，図の2分木の根（最上位のノード）から始めたときの出力はどれか。\n\n〔f(ノードn)の定義〕\n1. ノードnの右に子ノードrがあれば，f(ノードr)を実行\n2. ノードnの左に子ノードlがあれば，f(ノードl)を実行\n3. 再帰処理f(ノードr)，f(ノードl)を未実行の子ノード，又は子ノードがなければ，ノード自身がもつデータを出力\n4. 終了", "choices": ["+÷-ED×CBA", "ABC×DE-÷+", "E-D÷C×B+A", "ED-CB×÷A+"], "answer": 3, "explanation": "この定義は，あるノードについて「右の子ノードがあればそれを再帰的に処理し，次に左の子ノードがあればそれを再帰的に処理し，最後に自分自身の値を出力する」という処理である。根「+」から適用すると，まず右の部分木「÷」を処理する。「÷」も同様に，右の部分木「−」（その右の子E，左の子D，自身−の順で「ED-」）を処理し，続いて左の部分木「×」（右の子C，左の子B，自身×の順で「CB×」）を処理し，最後に「÷」自身を出力するので「ED-CB×÷」となる。続いて根「+」の左の子「A」を出力し，最後に「+」自身を出力する。全体をつなげると「ED-CB×÷A+」（エ）となる。", "figure": "<svg viewBox=\"0 0 420 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:14px\"><line x1=\"200\" y1=\"30\" x2=\"110\" y2=\"100\" stroke=\"#94a3b8\"/><line x1=\"200\" y1=\"30\" x2=\"290\" y2=\"100\" stroke=\"#94a3b8\"/><line x1=\"290\" y1=\"100\" x2=\"230\" y2=\"170\" stroke=\"#94a3b8\"/><line x1=\"290\" y1=\"100\" x2=\"350\" y2=\"170\" stroke=\"#94a3b8\"/><line x1=\"230\" y1=\"170\" x2=\"190\" y2=\"230\" stroke=\"#94a3b8\"/><line x1=\"230\" y1=\"170\" x2=\"270\" y2=\"230\" stroke=\"#94a3b8\"/><line x1=\"350\" y1=\"170\" x2=\"310\" y2=\"230\" stroke=\"#94a3b8\"/><line x1=\"350\" y1=\"170\" x2=\"390\" y2=\"230\" stroke=\"#94a3b8\"/><circle cx=\"200\" cy=\"30\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"200\" y=\"35\" text-anchor=\"middle\">+</text><circle cx=\"110\" cy=\"100\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"110\" y=\"105\" text-anchor=\"middle\">A</text><circle cx=\"290\" cy=\"100\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"290\" y=\"105\" text-anchor=\"middle\">÷</text><circle cx=\"230\" cy=\"170\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"230\" y=\"175\" text-anchor=\"middle\">×</text><circle cx=\"350\" cy=\"170\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"350\" y=\"175\" text-anchor=\"middle\">−</text><circle cx=\"190\" cy=\"230\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"190\" y=\"235\" text-anchor=\"middle\">B</text><circle cx=\"270\" cy=\"230\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"270\" y=\"235\" text-anchor=\"middle\">C</text><circle cx=\"310\" cy=\"230\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"310\" y=\"235\" text-anchor=\"middle\">D</text><circle cx=\"390\" cy=\"230\" r=\"18\" fill=\"#1a2535\" stroke=\"#94a3b8\"/><text x=\"390\" y=\"235\" text-anchor=\"middle\">E</text></svg>"}, {"id": "AM1-2024春-04", "year": "令和6年春", "section": "午前I", "q_num": 4, "q": "量子ゲート方式の量子コンピュータの説明として，適切なものはどれか。", "choices": ["演算は2進数で行われ，結果も2進数で出力される。", "特定のアルゴリズムによる演算だけができ，加算演算はできない。", "複数の状態を同時に表現する量子ビットと，その重ね合わせを利用する。", "量子状態を変化させながら観測するので，100℃以上の高温で動作する。"], "answer": 2, "explanation": "量子ゲート方式の量子コンピュータは，0と1の状態を同時に表現できる量子ビット（重ね合わせ状態）を用い，その重ね合わせや量子もつれを利用して並列的に演算を行う方式である（ウ）。アは古典コンピュータの説明であり，イ・エは量子コンピュータの特徴として誤っている。"}, {"id": "AM1-2024春-05", "year": "令和6年春", "section": "午前I", "q_num": 5, "q": "システムの信頼性設計に関する記述のうち，適切なものはどれか。", "choices": ["フェールセーフとは，利用者の誤操作によってシステムが異常終了してしまうことのないように，単純なミスを発生させないようにする設計方法である。", "フェールソフトとは，故障が発生した場合でも機能を縮退させることなく稼働を継続する概念である。", "フォールトアボイダンスとは，システム構成要素の個々の品質を高めて故障が発生しないようにする概念である。", "フォールトトレランスとは，故障が生じても重大な影響が出ないように，あらかじめ定められた安全状態にシステムを固定し，全体として安全が維持されるような設計方法である。"], "answer": 2, "explanation": "フォールトアボイダンスとは，構成要素そのものの品質や信頼性を高めることによって，故障の発生をできるだけ避けようとする考え方である（ウ）。アはフールプルーフ，イは「機能を縮退させてでも稼働を継続する」のがフェールソフトの正しい説明であり記述が誤り，エはフェールセーフの説明に近く，フォールトトレランスは故障が発生しても性能を低下させずにシステム全体の機能を維持する設計を指すため，いずれも記述が誤っている。"}, {"id": "AM1-2024春-06", "year": "令和6年春", "section": "午前I", "q_num": 6, "q": "三つの資源X～Zを占有して処理を行う四つのプロセスA～Dがある。各プロセスは処理の進行に伴い，表中の数値の順に資源を占有し，実行終了時に三つの資源を一括して解放する。プロセスAと同時にもう一つプロセスを動かした場合に，デッドロックを起こす可能性があるプロセスはどれか。", "choices": ["B, C, D", "C, D", "Cだけ", "Dだけ"], "answer": 1, "explanation": "デッドロックは，複数のプロセスが互いに相手が占有している資源を，異なる順序で要求し合うことで発生する。プロセスBはAと全く同じ順序（X→Y→Z）で資源を占有するため，Aと同時に動かしても資源の取得順序が競合せず，デッドロックは発生しない。プロセスCはY→Z→Xの順，プロセスDはZ→Y→Xの順で資源を占有するため，いずれもAの占有順序（X→Y→Z）と異なる順序で資源を要求する場面が生じ，互いに相手が確保した資源を待ち合う状態（デッドロック）が発生する可能性がある。したがって，デッドロックを起こす可能性があるのはC，D（イ）である。", "figure": "<svg viewBox=\"0 0 300 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:13px\"><rect x=\"0\" y=\"0\" width=\"90\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"45.0\" y=\"21.0\" text-anchor=\"middle\" font-weight=\"bold\">プロセス</text><rect x=\"90\" y=\"0\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"125.0\" y=\"21.0\" text-anchor=\"middle\" font-weight=\"bold\">資源X</text><rect x=\"160\" y=\"0\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"195.0\" y=\"21.0\" text-anchor=\"middle\" font-weight=\"bold\">資源Y</text><rect x=\"230\" y=\"0\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"265.0\" y=\"21.0\" text-anchor=\"middle\" font-weight=\"bold\">資源Z</text><rect x=\"0\" y=\"32\" width=\"90\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"45.0\" y=\"53.0\" text-anchor=\"middle\">A</text><rect x=\"90\" y=\"32\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"125.0\" y=\"53.0\" text-anchor=\"middle\">1</text><rect x=\"160\" y=\"32\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"195.0\" y=\"53.0\" text-anchor=\"middle\">2</text><rect x=\"230\" y=\"32\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"265.0\" y=\"53.0\" text-anchor=\"middle\">3</text><rect x=\"0\" y=\"64\" width=\"90\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"45.0\" y=\"85.0\" text-anchor=\"middle\">B</text><rect x=\"90\" y=\"64\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"125.0\" y=\"85.0\" text-anchor=\"middle\">1</text><rect x=\"160\" y=\"64\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"195.0\" y=\"85.0\" text-anchor=\"middle\">2</text><rect x=\"230\" y=\"64\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"265.0\" y=\"85.0\" text-anchor=\"middle\">3</text><rect x=\"0\" y=\"96\" width=\"90\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"45.0\" y=\"117.0\" text-anchor=\"middle\">C</text><rect x=\"90\" y=\"96\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"125.0\" y=\"117.0\" text-anchor=\"middle\">2</text><rect x=\"160\" y=\"96\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"195.0\" y=\"117.0\" text-anchor=\"middle\">3</text><rect x=\"230\" y=\"96\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"265.0\" y=\"117.0\" text-anchor=\"middle\">1</text><rect x=\"0\" y=\"128\" width=\"90\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"45.0\" y=\"149.0\" text-anchor=\"middle\">D</text><rect x=\"90\" y=\"128\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"125.0\" y=\"149.0\" text-anchor=\"middle\">3</text><rect x=\"160\" y=\"128\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"195.0\" y=\"149.0\" text-anchor=\"middle\">2</text><rect x=\"230\" y=\"128\" width=\"70\" height=\"32\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"265.0\" y=\"149.0\" text-anchor=\"middle\">1</text></svg>"}, {"id": "AM1-2024春-07", "year": "令和6年春", "section": "午前I", "q_num": 7, "q": "入力がAとB，出力がYの論理回路を動作させたとき，図のタイムチャートが得られた。この論理回路として，適切なものはどれか。", "choices": ["排他的論理和素子（XOR）：入力側が二重曲線で，出力に否定（○）が付いていない素子", "論理一致素子：入力側が二重曲線で，出力に否定（○）が付いている素子", "否定論理積素子（NAND）：入力側が直線（AND形）で，出力に否定（○）が付いている素子", "否定論理和素子（NOR）：入力側が単曲線（OR形）で，出力に否定（○）が付いている素子"], "answer": 2, "explanation": "タイムチャートを区間ごとに読み取ると，(A,B)=(0,1)のときY=1，(0,0)のときY=1，(1,1)のときY=0，(1,0)のときY=1となっている。これは，AとBがともに1のときだけY=0となり，それ以外では常にY=1となる動作であり，論理積（AND）を反転させた否定論理積（NAND）の真理値表と一致する（ウ）。", "figure": "<svg viewBox=\"0 0 380 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:13px\"><text x=\"15\" y=\"40\" text-anchor=\"middle\">A</text><text x=\"30\" y=\"35\">1</text><text x=\"30\" y=\"65\">0</text><polyline points=\"50,60 95,60 95,60 140,60 140,30 185,30 185,60 230,60 230,30 275,30 275,60 320,60 320,30 365,30\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"15\" y=\"120\" text-anchor=\"middle\">B</text><text x=\"30\" y=\"115\">1</text><text x=\"30\" y=\"145\">0</text><polyline points=\"50,110 95,110 95,140 140,140 140,110 185,110 185,140 230,140 230,110 275,110 275,140 320,140 320,140 365,140\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"15\" y=\"200\" text-anchor=\"middle\">Y</text><text x=\"30\" y=\"195\">1</text><text x=\"30\" y=\"225\">0</text><polyline points=\"50,190 95,190 95,190 140,190 140,220 185,220 185,190 230,190 230,220 275,220 275,190 320,190 320,190 365,190\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></svg>"}, {"id": "AM1-2024春-08", "year": "令和6年春", "section": "午前I", "q_num": 8, "q": "ビットマップフォントよりも，アウトラインフォントの利用が適している場合はどれか。", "choices": ["英数字だけでなく，漢字も表示する。", "各文字の幅を一定にして表示する。", "画面上にできるだけ高速に表示する。", "文字を任意の倍率に拡大して表示する。"], "answer": 3, "explanation": "アウトラインフォントは，文字の輪郭線を数式（曲線）で表現するため，どのような大きさに拡大・縮小しても輪郭が滑らかなまま表示できる。ビットマップフォントは点（ドット）の集合で表現されるため，拡大すると輪郭がギザギザになる。したがって，アウトラインフォントの利用が適しているのは「文字を任意の倍率に拡大して表示する」場合（エ）である。"}, {"id": "AM1-2024春-09", "year": "令和6年春", "section": "午前I", "q_num": 9, "q": "ストアドプロシージャの利点はどれか。", "choices": ["アプリケーションプログラムからネットワークを介してDBMSにアクセスする場合，両者間の通信量を減少させる。", "アプリケーションプログラムからの一連の要求を一括して処理することによって，DBMS内の実行計画の数を減少させる。", "アプリケーションプログラムからの一連の要求を一括して処理することによって，DBMS内の必要バッファ数を減少させる。", "データが格納されているディスク装置へのI/O回数を減少させる。"], "answer": 0, "explanation": "ストアドプロシージャは，一連のSQL処理手順をDBMSサーバ側にあらかじめ登録しておき，アプリケーションプログラムからは1回の呼出しでまとめて実行させる仕組みである。これによって，アプリケーションとDBMSサーバとの間で個々のSQL文を何度もやり取りする必要がなくなり，両者間の通信量を減少させることができる（ア）。"}, {"id": "AM1-2024春-10", "year": "令和6年春", "section": "午前I", "q_num": 10, "q": "CSMA/CD方式のLANに接続されたノードの送信動作として，適切なものはどれか。", "choices": ["各ノードに論理的な順位付けを行い，送信権を順次受け渡し，これを受け取ったノードだけが送信を行う。", "各ノードは伝送媒体が使用中かどうかを調べ，使用中でなければ送信を行う。送信中に衝突を検出したらランダムな時間の経過後に再度送信を行う。", "各ノードを環状に接続して，送信権を制御するための特殊なフレームを巡回させる。これを受け取ったノードだけが送信を行う。", "タイムスロットを割り当てられたノードだけが送信を行う。"], "answer": 1, "explanation": "CSMA/CD方式では，各ノードは送信前に伝送媒体（伝送路）が使用中かどうかを確認（キャリアセンス）し，空いていれば送信を行う。複数のノードが同時に送信して信号の衝突（コリジョン）が発生したことを検出した場合は，ランダムな時間が経過した後に再度送信を行う（イ）。アはトークンパッシング，ウはトークンリング，エはTDM（時分割多重）方式の説明である。"}, {"id": "AM1-2024春-11", "year": "令和6年春", "section": "午前I", "q_num": 11, "q": "ビット誤り率が0.0001%の回線を使って，1,500バイトのパケットを10,000個送信するとき，誤りが含まれるパケットの個数の期待値はおよそ幾らか。", "choices": ["10", "15", "80", "120"], "answer": 3, "explanation": "1パケットは1,500バイト＝1,500×8＝12,000ビットである。ビット誤り率は0.0001%＝1×10^-6なので，1パケット当たりに誤りが含まれる確率はおよそ12,000×1×10^-6＝0.012となる。10,000個のパケットを送信した場合，誤りが含まれるパケットの個数の期待値は10,000×0.012＝120個（エ）となる。"}, {"id": "AM1-2024春-12", "year": "令和6年春", "section": "午前I", "q_num": 12, "q": "3Dセキュア2.0（EMV 3-Dセキュア）は，オンラインショッピングにおけるクレジットカード決済時に，不正取引を防止するための本人認証サービスである。3Dセキュア2.0で利用される本人認証の特徴はどれか。", "choices": ["利用者がカード会社に本人認証に用いるパスワードを忘れた場合でも，安全にパスワードを再発行することができる。", "利用者の過去の取引履歴や決済に用いているデバイスの情報から不正利用や高リスクと判断される場合に，カード会社が追加の本人認証を行う。", "利用者の過去の取引履歴や決済に用いているデバイスの情報にかかわらず，カード会社がパスワードと生体認証を併用した本人認証を行う。", "利用者の過去の取引履歴や決済に用いているデバイスの情報に加えて，操作しているのが人間であることを確認した上で，カード会社が追加の本人認証を行う。"], "answer": 1, "explanation": "EMV 3Dセキュア2.0では，利用者の過去の取引履歴や，決済に利用しているデバイスの情報（IPアドレス，機種情報など）をもとに取引のリスクを評価し，不正利用の可能性が高いと判断された取引についてのみ，ワンタイムパスワードなどの追加の本人認証を要求するリスクベース認証の仕組みを採用している（イ）。"}, {"id": "AM1-2024春-13", "year": "令和6年春", "section": "午前I", "q_num": 13, "q": "公開鍵暗号方式を使った暗号通信をn人が相互に行う場合，全部で何個の鍵が必要になるか。ここで，一組の公開鍵と秘密鍵は2個と数える。", "choices": ["n+1", "2n", "n(n-1)/2", "n^2"], "answer": 1, "explanation": "公開鍵暗号方式では，利用者各自が自分用の公開鍵と秘密鍵の組を1組持てばよく，公開鍵は通信相手に配布し，秘密鍵は本人だけが保管する。これによってn人全員が相互に暗号通信を行うことができる。鍵の組（公開鍵＋秘密鍵）を2個と数えるので，必要な鍵の総数はn人×2個＝2n個（イ）となる。"}, {"id": "AM1-2024春-14", "year": "令和6年春", "section": "午前I", "q_num": 14, "q": "自社製品の脆弱性に起因するリスクに対応するための社内機能として，最も適切なものはどれか。", "choices": ["CSIRT", "PSIRT", "SOC", "WHOISデータベースの技術連絡担当"], "answer": 1, "explanation": "PSIRT（Product Security Incident Response Team）は，自社が開発・販売する製品（プロダクト）の脆弱性に関する情報を収集し，分析・評価を行い，パッチ提供などの対応を行う社内組織・機能である（イ）。CSIRTは組織内で発生する情報セキュリティインシデント全般に対応する組織，SOCはセキュリティ監視を専門に行う組織であり，自社製品の脆弱性対応に特化した機能としてはPSIRTが最も適切である。"}, {"id": "AM1-2024春-15", "year": "令和6年春", "section": "午前I", "q_num": 15, "q": "PCからサーバに対し，IPv6を利用した通信を行う場合，ネットワーク層で暗号化を行うときに利用するものはどれか。", "choices": ["IPsec", "PPP", "SSH", "TLS"], "answer": 0, "explanation": "IPsecは，IPパケット単位でデータの暗号化や認証を行うプロトコルであり，ネットワーク層（IP層）でセキュリティを確保する（ア）。PPPはデータリンク層のプロトコル，SSHやTLSはトランスポート層より上位で動作するセキュリティプロトコルであり，ネットワーク層での暗号化には用いられない。"}, {"id": "AM1-2024春-16", "year": "令和6年春", "section": "午前I", "q_num": 16, "q": "オブジェクト指向におけるクラス間の関係のうち，適切なものはどれか。", "choices": ["クラス間の関連は，二つのクラス間でだけ定義できる。", "サブクラスではスーパークラスの操作を再定義することができる。", "サブクラスのインスタンスが，スーパークラスで定義されている操作を実行するときに，スーパークラスのインスタンスに操作を依頼する。", "二つのクラスに集約の関係があるときには，集約オブジェクトは部分となるオブジェクトと，属性及び操作を共有する。"], "answer": 1, "explanation": "オブジェクト指向において，サブクラス（派生クラス）はスーパークラス（基底クラス）で定義された操作（メソッド）を，自身の実装で上書きして再定義（オーバーライド）することができる（イ）。これによってポリモーフィズム（多態性）が実現される。アは関連が複数クラス間（多重関連）でも定義できるため誤り，ウはサブクラスのインスタンス自身が操作を実行するのであってスーパークラスのインスタンスに依頼するわけではないため誤り，エは集約は全体と部分が別個のオブジェクトであり属性・操作を共有するものではないため誤り。"}, {"id": "AM1-2024春-17", "year": "令和6年春", "section": "午前I", "q_num": 17, "q": "ソフトウェア信頼度成長モデルの一つであって，テスト工程においてバグが収束したと判定する根拠の一つとして使用するゴンペルツ曲線はどれか。", "choices": ["テスト項目消化数の増加につれて，累積誤り検出数の増加が緩やかに始まり，次第に急激に増加していく（下に凸の）曲線", "テスト項目消化数の増加に対して，累積誤り検出数が一定の割合で増加する直線", "テスト項目消化数の増加に伴い，累積誤り検出数の増加が初めは緩やかで，中盤に急激に増加し，その後飽和して緩やかになるS字形の曲線", "テスト項目消化数の増加につれて，累積誤り検出数が初めに急激に増加し，その後増加率が徐々に小さくなって飽和に近づく（上に凸の）曲線"], "answer": 2, "explanation": "ゴンペルツ曲線は，テスト工程の初期は潜在するバグの検出数の増加が緩やかであり，テストが進むにつれて検出数が急激に増加し，その後バグの摘出が進んで増加が緩やかになり収束（飽和）していくS字形の信頼度成長曲線である。したがって，テスト項目消化数の増加に伴い「緩やか→急激→飽和」というS字形の増加を示すウのグラフがゴンペルツ曲線に該当する。", "figure": "<svg viewBox=\"0 0 360 290\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:12px\"><line x1=\"10\" y1=\"30\" x2=\"10\" y2=\"130\" stroke=\"#94a3b8\"/><line x1=\"10\" y1=\"130\" x2=\"160\" y2=\"130\" stroke=\"#94a3b8\"/><text x=\"6\" y=\"24\" font-weight=\"bold\">ア</text><text x=\"85.0\" y=\"148\" text-anchor=\"middle\" font-size=\"10\">テスト項目消化数</text><text x=\"4\" y=\"80.0\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 4 80.0)\">累積誤り検出数</text><path d=\"M 10 130 Q 160 130 160 30\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"190\" y1=\"30\" x2=\"190\" y2=\"130\" stroke=\"#94a3b8\"/><line x1=\"190\" y1=\"130\" x2=\"340\" y2=\"130\" stroke=\"#94a3b8\"/><text x=\"186\" y=\"24\" font-weight=\"bold\">イ</text><text x=\"265.0\" y=\"148\" text-anchor=\"middle\" font-size=\"10\">テスト項目消化数</text><text x=\"184\" y=\"80.0\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 184 80.0)\">累積誤り検出数</text><path d=\"M 190 130 L 340 30\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"10\" y1=\"160\" x2=\"10\" y2=\"260\" stroke=\"#94a3b8\"/><line x1=\"10\" y1=\"260\" x2=\"160\" y2=\"260\" stroke=\"#94a3b8\"/><text x=\"6\" y=\"154\" font-weight=\"bold\">ウ</text><text x=\"85.0\" y=\"278\" text-anchor=\"middle\" font-size=\"10\">テスト項目消化数</text><text x=\"4\" y=\"210.0\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 4 210.0)\">累積誤り検出数</text><path d=\"M 10 260 C 32.5 260, 137.5 160, 160 160\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"190\" y1=\"160\" x2=\"190\" y2=\"260\" stroke=\"#94a3b8\"/><line x1=\"190\" y1=\"260\" x2=\"340\" y2=\"260\" stroke=\"#94a3b8\"/><text x=\"186\" y=\"154\" font-weight=\"bold\">エ</text><text x=\"265.0\" y=\"278\" text-anchor=\"middle\" font-size=\"10\">テスト項目消化数</text><text x=\"184\" y=\"210.0\" text-anchor=\"middle\" font-size=\"10\" transform=\"rotate(-90 184 210.0)\">累積誤り検出数</text><path d=\"M 190 260 Q 190 160 340 160\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></svg>"}, {"id": "AM1-2024春-18", "year": "令和6年春", "section": "午前I", "q_num": 18, "q": "EVMで管理しているプロジェクトがある。図は，プロジェクトの開始から完了予定までの期間の半分が経過した時点での状況である。コスト効率，スケジュール効率がこのまま推移すると仮定した場合の見通しのうち，適切なものはどれか。", "choices": ["計画に比べてコストは多くなり，プロジェクトの完了は遅くなる。", "計画に比べてコストは多くなり，プロジェクトの完了は早くなる。", "計画に比べてコストは少なくなり，プロジェクトの完了は遅くなる。", "計画に比べてコストは少なくなり，プロジェクトの完了は早くなる。"], "answer": 0, "explanation": "図より，現時点でAC（実コスト）がEV（達成した作業のPV換算値）より大きい。これはコスト効率指数CPI＝EV/ACが1未満であることを意味し，計画よりも多くのコストをかけて作業を進めている，つまり計画よりコストが多くかかる（コスト超過）状態である。また，現時点でのEVは，現時点のPV（計画上の進捗）よりも小さく，スケジュール効率指数SPI＝EV/PVも1未満となっている。これは作業の進捗が計画より遅れていることを意味する。このコスト超過・進捗遅れの傾向がこのまま続くと仮定すると，計画に比べてコストは多くなり，プロジェクトの完了は遅くなる（ア）と見通すことができる。", "figure": "<svg viewBox=\"0 0 420 260\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:13px\"><line x1=\"40\" y1=\"30\" x2=\"40\" y2=\"220\" stroke=\"#94a3b8\"/><line x1=\"40\" y1=\"220\" x2=\"400\" y2=\"220\" stroke=\"#94a3b8\"/><text x=\"20\" y=\"35\" font-size=\"12\">累積値</text><text x=\"40\" y=\"240\" text-anchor=\"middle\" font-size=\"12\">開始日</text><text x=\"380\" y=\"240\" text-anchor=\"middle\" font-size=\"12\">完了予定日</text><text x=\"210\" y=\"240\" text-anchor=\"middle\" font-size=\"12\">現時点</text><line x1=\"210\" y1=\"220\" x2=\"210\" y2=\"30\" stroke=\"#94a3b8\" stroke-dasharray=\"3,3\"/><line x1=\"40\" y1=\"220\" x2=\"380\" y2=\"40\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"385\" y=\"38\" font-size=\"12\">PV</text><path d=\"M 40 220 Q 150 200 210 140\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"255\" y1=\"135\" x2=\"213\" y2=\"140\" stroke=\"#94a3b8\" stroke-width=\"1\"/><text x=\"258\" y=\"138\" font-size=\"12\">AC</text><path d=\"M 40 220 Q 150 210 210 160\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"215\" y=\"172\" font-size=\"12\">EV</text></svg>"}, {"id": "AM1-2024春-19", "year": "令和6年春", "section": "午前I", "q_num": 19, "q": "工場の生産能力を増強する方法として，新規システムを開発する案と既存システムを改修する案とを検討している。次の条件で，期待金額価値の高い案を採用するとき，採用すべき案と期待金額価値との組合せのうち，適切なものはどれか。ここで，期待金額価値は，収入と投資額との差で求める。\n\n〔条件〕\n・新規システムを開発する場合の投資額は100億円であって，既存システムを改修する場合の投資額は50億円である。\n・需要が拡大する確率は70%であって，需要が縮小する確率は30%である。\n・新規システムを開発した場合，需要が拡大したときは180億円の収入が見込まれ，需要が縮小したときは50億円の収入が見込まれる。\n・既存システムを改修した場合，需要が拡大したときは120億円の収入が見込まれ，需要が縮小したときは40億円の収入が見込まれる。\n・他の条件は考慮しない。", "choices": ["既存システムの改修，期待金額価値46億円", "既存システムの改修，期待金額価値96億円", "新規システムの開発，期待金額価値41億円", "新規システムの開発，期待金額価値130億円"], "answer": 0, "explanation": "新規システムを開発する場合，期待収入＝180×0.7＋50×0.3＝126＋15＝141億円であり，投資額100億円との差から期待金額価値＝141－100＝41億円となる。既存システムを改修する場合，期待収入＝120×0.7＋40×0.3＝84＋12＝96億円であり，投資額50億円との差から期待金額価値＝96－50＝46億円となる。期待金額価値が高い方は46億円の既存システムの改修であり，採用すべき案と期待金額価値の組合せは「既存システムの改修，46億円」（ア）となる。"}, {"id": "AM1-2024春-20", "year": "令和6年春", "section": "午前I", "q_num": 20, "q": "サービスマネジメントにおけるサービスレベル管理の活動はどれか。", "choices": ["現在の資源の調整と最適化を行い，将来の資源要件に関する予測を記載した計画を作成する。", "サービスの提供に必要な予算に応じて，適切な資金を確保する。", "災害や障害などで事業が中断しても，要求されたサービス機能を合意された期間内に確実に復旧できるように，事業影響度の評価や復旧優先順位を明確にする。", "提供するサービス及びサービスレベル目標を決定し，サービス提供者が顧客との間で合意文書を交わす。"], "answer": 3, "explanation": "サービスレベル管理は，提供するサービスの内容やサービスレベル目標（SLO）を明確にし，サービス提供者と顧客との間でサービスレベルアグリーメント（SLA）などの合意文書を取り交わす活動である（エ）。アは容量・能力管理，イは財務管理，ウは事業継続管理（サービス継続管理）に関する活動である。"}, {"id": "AM1-2024春-21", "year": "令和6年春", "section": "午前I", "q_num": 21, "q": "システム監査基準（令和5年）によれば，システム監査において，監査人が一定の基準に基づいて総合的に点検・評価を行う対象とするものは，情報システムのマネジメント，コントロールと，あと一つはどれか。", "choices": ["ガバナンス", "コンプライアンス", "サイバーレジリエンス", "モニタリング"], "answer": 0, "explanation": "システム監査基準（令和5年）では，システム監査人は，情報システムにかかわる「ガバナンス」，「マネジメント」及び「コントロール」を，一定の基準に基づいて総合的に点検・評価することを目的とすると規定されている（ア）。"}, {"id": "AM1-2024春-22", "year": "令和6年春", "section": "午前I", "q_num": 22, "q": "情報システムに対する統制をITに係る全般統制とITに係る業務処理統制に分けたとき，ITに係る業務処理統制に該当するものはどれか。", "choices": ["サーバ室への入退室を制限・記録するための入退室管理システム", "システム開発業務を適切に委託するために定めた選定手続", "販売管理システムにおける入力データの正当性チェック機能", "不正アクセスを防止するためのファイアウォールの運用管理"], "answer": 2, "explanation": "IT全般統制は，業務システム全体に共通する基盤（システムの開発・運用・保守，アクセス管理，外部委託管理など）に対する統制であり，IT業務処理統制は個々の業務（アプリケーション）における入力・処理・出力の正確性や完全性を確保するための統制である。「販売管理システムにおける入力データの正当性チェック機能」は，個別の業務システムにおいて入力データの妥当性を確認するための統制であり，IT業務処理統制に該当する（ウ）。ア，イ，エはいずれもIT全般統制に該当する。"}, {"id": "AM1-2024春-23", "year": "令和6年春", "section": "午前I", "q_num": 23, "q": "SOAの説明はどれか。", "choices": ["会計，人事，製造，購買，在庫管理，販売などの企業の業務プロセスを一元管理することによって，業務の効率化や経営資源の全体最適を図る手法", "企業の業務プロセス，システム化要求などのニーズと，ソフトウェアパッケージの機能性がどれだけ適合し，どれだけかい離しているかを分析する手法", "業務プロセスの問題点を洗い出して，目標設定，実行，チェック，修正行動のマネジメントサイクルを適用し，継続的な改善を図る手法", "利用者の視点から業務システムの機能を幾つかの独立した部品に分けることによって，業務プロセスとの対応付けや他ソフトウェアとの連携を容易にする手法"], "answer": 3, "explanation": "SOA（Service Oriented Architecture：サービス指向アーキテクチャ）は，業務システムの機能を「サービス」という独立した部品（コンポーネント）の単位に分割し，それらを組み合わせて利用することで，業務プロセスとシステム機能との対応付けや，他のソフトウェアとの連携・再利用を容易にするという考え方である（エ）。アはERP，イはフィット＆ギャップ分析，ウはPDCAサイクル（業務改善）の説明である。"}, {"id": "AM1-2024春-24", "year": "令和6年春", "section": "午前I", "q_num": 24, "q": "EMS（Electronics Manufacturing Services）の説明として，適切なものはどれか。", "choices": ["相手先ブランドで販売する電子機器の設計だけを受託し，製造は相手が行う。", "外部から調達した電子機器に付加価値を加えて，自社ブランドで販売する。", "自社ブランドで販売する電子機器のソフトウェア開発だけを外部に委託し，ハードウェアは自社で設計製造する。", "生産設備をもつ企業が，他社からの委託を受けて電子機器を製造する。"], "answer": 3, "explanation": "EMS（Electronics Manufacturing Services）は，自社で生産設備をもつ企業が，ブランドをもつ他社からの委託を受けて電子機器の製造を行う事業形態である（エ）。設計から製造まで一括して受託するODM（Original Design Manufacturer）とは異なり，主に製造工程の受託に重点を置く点が特徴である。"}, {"id": "AM1-2024春-25", "year": "令和6年春", "section": "午前I", "q_num": 25, "q": "組込み機器のハードウェアの製造を外部に委託する場合のコンティンジェンシープランの記述として，適切なものはどれか。", "choices": ["実績のある外注先の利用によって，リスクの発生確率を低減する。", "製造品質が担保されていることを確認できるように委託先と契約する。", "複数の会社の見積りを比較検討して，委託先を選定する。", "部品調達のリスクが顕在化したときに備えて，対処するための計画を策定する。"], "answer": 3, "explanation": "コンティンジェンシープランとは，あらかじめ想定したリスク（ここでは部品調達など，ハードウェア製造に関するリスク）が実際に発生（顕在化）した場合に，被害を最小限に抑えるためにどのように対処するかをあらかじめ定めておく計画である（エ）。ア，イ，ウはいずれもリスクが発生する前に行うリスク対応（発生確率や影響の低減策）であり，コンティンジェンシープランそのものではない。"}, {"id": "AM1-2024春-26", "year": "令和6年春", "section": "午前I", "q_num": 26, "q": "企業が属する業界の競争状態と収益構造を，“新規参入の脅威”，“供給者の支配力”，“買い手の交渉力”，“代替製品・サービスの脅威”，“既存競合企業同士の敵対関係”の要素に分類して，分析するフレームワークはどれか。", "choices": ["PEST分析", "VRIO分析", "バリューチェーン分析", "ファイブフォース分析"], "answer": 3, "explanation": "ファイブフォース分析は，業界の競争環境を「新規参入の脅威」，「供給者の交渉力（支配力）」，「買い手の交渉力」，「代替品・代替サービスの脅威」，「既存競合企業同士の敵対関係」という5つの競争要因に分類して，業界の収益構造や競争状態を分析するフレームワークである（エ）。"}, {"id": "AM1-2024春-27", "year": "令和6年春", "section": "午前I", "q_num": 27, "q": "フィージビリティスタディの説明はどれか。", "choices": ["企業が新規事業立ち上げや海外進出する際の検証，公共事業の採算性検証など，実現性を調査・検証する投資前評価のこと", "技術革新，社会変動などに関する未来予測によく用いられ，専門家グループなどがもつ直観的な意見や経験的判断を，反復型アンケートを使って組織的に集約・洗練して収束すること", "集団（小グループ）によるアイディア発想法の一つで，会議の参加メンバー各自が自由奔放にアイディアを出し合い，互いの発想の異質さを利用して，連想を行うことによって，さらに多数のアイディアを生み出そうという集団思考法・発想法のこと", "商品が市場に投入されてから，次第に売れなくなり姿を消すまでのプロセスを，導入期，成長期，成熟期（市場飽和），衰退期の4段階で表現し，その市場における製品の寿命を検討すること"], "answer": 0, "explanation": "フィージビリティスタディとは，新規事業の立上げや海外進出，公共事業などにおいて，その投資や事業計画が実現可能かどうかを，事前に技術面・経済面・市場面などから調査・検証する投資前評価のことである（ア）。イはデルファイ法，ウはブレーンストーミング，エはプロダクトライフサイクルの説明である。"}, {"id": "AM1-2024春-28", "year": "令和6年春", "section": "午前I", "q_num": 28, "q": "IoTの技術として注目されている，エッジコンピューティングの説明として，最も適切なものはどれか。", "choices": ["演算処理のリソースをセンサー端末の近傍に置くことによって，アプリケーション処理の低遅延化や通信トラフィックの最適化を行う。", "人体に装着して脈拍センサーなどで人体の状態を計測して解析を行う。", "ネットワークを介して複数のコンピュータを結ぶことによって，全体として処理能力が高いコンピュータシステムを作る。", "周りの環境から微小なエネルギーを収穫して，電力に変換する。"], "answer": 0, "explanation": "エッジコンピューティングは，IoTデバイス（センサー端末）の近くにエッジサーバなどの演算処理リソースを配置し，そこでデータ処理の一部を行うことによって，クラウドへの通信トラフィックを削減し，アプリケーション処理の応答遅延（レイテンシ）を低減する仕組みである（ア）。イはウェアラブルデバイス，ウは分散コンピューティング（グリッドコンピューティング），エはエナジーハーベスティングの説明である。"}, {"id": "AM1-2024春-29", "year": "令和6年春", "section": "午前I", "q_num": 29, "q": "損益計算資料から求められる損益分岐点売上高は，何百万円か。\n\n（単位　百万円）\n売上高　　　　　500\n材料費（変動費）200\n外注費（変動費）100\n製造固定費　　　100\n総利益　　　　　100\n販売固定費　　　80\n利益　　　　　　20", "choices": ["225", "300", "450", "480"], "answer": 2, "explanation": "変動費は，材料費200百万円＋外注費100百万円＝300百万円であり，売上高500百万円に対する変動費率は300÷500＝0.6となる。固定費は，製造固定費100百万円＋販売固定費80百万円＝180百万円である。損益分岐点売上高をSとすると，S×(1－0.6)＝180が成り立つので，S＝180÷0.4＝450（百万円）（ウ）となる。"}, {"id": "AM1-2024春-30", "year": "令和6年春", "section": "午前I", "q_num": 30, "q": "不正競争防止法の不正競争行為に該当するものはどれか。", "choices": ["A社と競争関係になっていないB社が，偶然に，A社の社名に類似のドメイン名を取得した。", "ある地方だけで有名な和菓子に類似した商品名の飲料を，その和菓子が有名でない地方で販売し，利益を取得した。", "商標権のない商品名を用いたドメイン名を取得し，当該商品のコピー商品を販売し，利益を取得した。", "他社サービスと類似しているが，自社サービスに適しており，正当な利益を得る目的があると認められるドメインを取得し，それを利用した。"], "answer": 2, "explanation": "不正競争防止法では，不正の利益を得る目的で，他人の商品等表示と同一又は類似のドメイン名を使用する権利を取得・保有する行為や，他人の商品の形態を模倣した商品を譲渡する行為などが不正競争行為とされる。商標権がない商品名であっても，それに類似したドメイン名を取得し，その商品のコピー商品（模倣品）を販売して利益を得る行為は，不正の目的によるドメイン名の取得・利用及び模倣品の販売に該当し，不正競争行為に該当する（ウ）。アは「競争関係になく，偶然」取得した場合であり不正の目的が認められないため該当しない，イ・エも不正の目的やただ乗りの意図が認められない記述になっている。"}];

// =====================================================
// State
// =====================================================
let state = {
  screen: 'home',     // home | quiz | result | review
  mode: null,         // 'all' | 'AM1' | 'AM2' | 'wrong'
  queue: [],
  idx: 0,
  answered: false,
  chosen: null,
  log: [],            // { id, correct, chosen }
  stats: loadStats()
};

function loadStats() {
  try { return JSON.parse(localStorage.getItem('itsm_stats')) || { total: 0, correct: 0, history: [] }; }
  catch { return { total: 0, correct: 0, history: [] }; }
}
function saveStats() {
  localStorage.setItem('itsm_stats', JSON.stringify(state.stats));
}

// =====================================================
// Render
// =====================================================
function render() {
  const app = document.getElementById('app');
  const pw = document.getElementById('progress-wrap');
  const hs = document.getElementById('header-stats');
  pw.style.display = 'none';
  hs.textContent = '';

  if (state.screen === 'home')   { app.innerHTML = renderHome(); }
  if (state.screen === 'quiz')   { app.innerHTML = renderQuiz(); pw.style.display = 'block'; updateProgress(); }
  if (state.screen === 'result') { app.innerHTML = renderResult(); }
  if (state.screen === 'review') { app.innerHTML = renderReview(); }

  attachEvents();
}

function renderHome() {
  const s = state.stats;
  const pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
  const wrongIds = getWrongIds();
  return `
    <div class="home">
      <div>
        <div class="home-badge">IPA // IT Service Manager</div>
        <h1 style="margin-top:16px">午前<span>過去問</span><br>トレーニング</h1>
        <p class="home-desc" style="margin-top:12px">午前I（応用情報レベル四択）・午前II（専門四択）<br>を繰り返し解いて合格力を鍛える</p>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${s.total}</div>
          <div class="stat-label">累計回答数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:${pct>=60?'var(--correct)':'var(--wrong)'}">${pct}<span style="font-size:18px;color:var(--muted)">%</span></div>
          <div class="stat-label">正解率</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--wrong)">${wrongIds.length}</div>
          <div class="stat-label">苦手問題数</div>
        </div>
      </div>
      <div class="mode-grid">
        <div class="mode-card" data-action="start" data-mode="all">
          <div class="mode-icon">📋</div>
          <div class="mode-name">全問ランダム</div>
          <div class="mode-desc">午前I・IIをシャッフルして出題</div>
          <div class="mode-count">${QUESTIONS.length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM1">
          <div class="mode-icon">📘</div>
          <div class="mode-name">午前Ⅰのみ</div>
          <div class="mode-desc">応用情報レベルの四択問題</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前I').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM2">
          <div class="mode-icon">📗</div>
          <div class="mode-name">午前Ⅱのみ</div>
          <div class="mode-desc">ITサービスマネージャー専門</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前II').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="wrong" ${wrongIds.length===0?'style="opacity:.4;pointer-events:none"':''}>
          <div class="mode-icon">🎯</div>
          <div class="mode-name">苦手問題</div>
          <div class="mode-desc">間違えた問題だけを集中練習</div>
          <div class="mode-count">${wrongIds.length} 問</div>
        </div>
      </div>
      ${s.total > 0 ? `<button class="btn btn-ghost" style="max-width:200px" data-action="review">📊 最後のセッションを見直す</button>` : ''}
    </div>`;
}

function renderQuiz() {
  const q = state.queue[state.idx];
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const feedbackClass = state.answered ? (state.chosen === q.answer ? 'ok' : 'ng') : '';

  let choicesHtml = q.choices.map((c, i) => {
    let cls = '';
    if (state.answered) {
      if (i === q.answer) cls = 'correct';
      else if (i === state.chosen) cls = 'wrong';
    }
    return `<button class="choice-btn ${cls}" data-action="answer" data-idx="${i}" ${state.answered ? 'disabled' : ''}>
      <span class="choice-key">${keys[i]}</span>
      <span>${c.replace(/^[ア-エ]\. /, '')}</span>
    </button>`;
  }).join('');

  const feedbackHtml = state.answered ? `
    <div class="feedback show">
      <div class="feedback-header ${feedbackClass}">
        <span class="feedback-dot ${feedbackClass}"></span>
        ${state.chosen === q.answer ? '正解！' : '不正解'}
      </div>
      <div class="feedback-answer">正解：<strong>${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</strong></div>
      <div class="feedback-body">${q.explanation}</div>
    </div>` : `<div class="feedback"></div>`;

  const nextLabel = state.idx < state.queue.length - 1 ? '次の問題 →' : '結果を見る';

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
      <button class="btn btn-ghost" style="flex:none;padding:8px 14px;font-size:13px" data-action="home">✕ 中断</button>
    </div>
    <div class="q-meta">
      <span class="tag">${q.section}</span>
      <span class="tag">${q.year} 問${q.q_num}</span>
      <span class="q-num">${state.idx + 1} / ${state.queue.length}</span>
    </div>
    <div class="q-card">
      <div class="q-text">${q.q}</div>
      ${q.figure ? `<div class="q-figure">${q.figure}</div>` : ''}
    </div>
    <div class="choices">${choicesHtml}</div>
    ${feedbackHtml}
    ${state.answered ? `<div class="btn-row"><button class="btn btn-primary" data-action="next">${nextLabel}</button></div>` : ''}
  `;
}

function renderResult() {
  const total = state.log.length;
  const correct = state.log.filter(l => l.correct).length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 60;
  return `
    <div class="result">
      <div>
        <div class="result-score" style="color:${pass?'var(--correct)':'var(--wrong)'}">${pct}<span>%</span></div>
        <div class="result-label">${correct} 問正解 / ${total} 問中</div>
      </div>
      <div class="result-grade ${pass?'pass':'fail'}">${pass ? '🎉 合格ライン達成！' : '📚 もう一息！ 60% 目標'}</div>
      <div class="result-detail">
        累計: ${state.stats.total} 問 ／ 通算正解率: ${state.stats.total>0 ? Math.round(state.stats.correct/state.stats.total*100) : 0}%
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" data-action="review">解答を見直す</button>
        <button class="btn btn-ghost" data-action="home">ホームへ戻る</button>
      </div>
    </div>`;
}

function renderReview() {
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const items = state.log.map(l => {
    const q = QUESTIONS.find(q => q.id === l.id);
    const ok = l.correct;
    return `<div class="review-item ${ok?'ok':'ng'}">
      <div class="review-q"><span class="tag" style="font-size:10px;padding:2px 8px;margin-bottom:8px;display:inline-block">${q.section} ${q.year} 問${q.q_num}</span><br>${q.q}</div>
      <div class="review-ans">
        あなたの回答: <span class="${ok?'ok':'ng'}">${keys[l.chosen]}（${q.choices[l.chosen].replace(/^[ア-エ]\. /,'')}）</span>
        ${!ok ? `　正解: <span class="ok">${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</span>` : ''}
      </div>
      ${!ok ? `<div class="feedback-body" style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7">${q.explanation}</div>` : ''}
    </div>`;
  }).join('');
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h2 style="font-size:16px;font-weight:700">解答一覧</h2>
      <button class="btn btn-ghost" style="flex:none;padding:8px 16px;font-size:13px" data-action="home">← ホーム</button>
    </div>
    <div class="review-list">${items}</div>`;
}

// =====================================================
// Events
// =====================================================
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === 'start') {
    startQuiz(el.dataset.mode);
  } else if (action === 'answer') {
    if (state.answered) return;
    const idx = parseInt(el.dataset.idx);
    answer(idx);
  } else if (action === 'next') {
    nextQuestion();
  } else if (action === 'result') {
    state.screen = 'result';
    render();
  } else if (action === 'review') {
    state.screen = 'review';
    render();
  } else if (action === 'home') {
    state.screen = 'home';
    render();
  }
}

// =====================================================
// Logic
// =====================================================
function startQuiz(mode) {
  let pool = QUESTIONS;
  if (mode === 'AM1') pool = QUESTIONS.filter(q => q.section === '午前I');
  if (mode === 'AM2') pool = QUESTIONS.filter(q => q.section === '午前II');
  if (mode === 'wrong') pool = QUESTIONS.filter(q => getWrongIds().includes(q.id));
  state.queue = shuffle([...pool]);
  state.idx = 0;
  state.answered = false;
  state.chosen = null;
  state.log = [];
  state.mode = mode;
  state.screen = 'quiz';
  render();
}

function answer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.answer;
  state.answered = true;
  state.chosen = chosen;
  state.log.push({ id: q.id, correct, chosen });
  state.stats.total++;
  if (correct) state.stats.correct++;
  // track wrong answers per question
  let wrong = {};
  try { wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}'); } catch {}
  if (!correct) wrong[q.id] = (wrong[q.id] || 0) + 1;
  else delete wrong[q.id];
  localStorage.setItem('itsm_wrong', JSON.stringify(wrong));
  saveStats();
  render();
}

function nextQuestion() {
  if (state.idx < state.queue.length - 1) {
    state.idx++;
    state.answered = false;
    state.chosen = null;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function updateProgress() {
  const pct = ((state.idx + (state.answered ? 1 : 0)) / state.queue.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-stats').textContent = `${state.idx + 1}/${state.queue.length}`;
}

function getWrongIds() {
  try {
    const wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}');
    return Object.keys(wrong);
  } catch { return []; }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =====================================================
// Boot
// =====================================================
render();
</script>
</body>
</html>
