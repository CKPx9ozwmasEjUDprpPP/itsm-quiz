<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ITサービスマネージャー 過去問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f1923;
  --surface:  #1a2535;
  --surface2: #223044;
  --accent:   #38bdf8;
  --accent2:  #0ea5e9;
  --correct:  #22c55e;
  --wrong:    #ef4444;
  --text:     #e2eaf5;
  --muted:    #7a9ab8;
  --border:   rgba(56,189,248,0.15);
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans JP', sans-serif;
  --radius:   14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 680px;
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.header-stats {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}

/* ── Progress bar ── */
.progress-wrap {
  width: 100%;
  max-width: 680px;
  padding: 12px 20px 0;
}
.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ── Main card ── */
.main {
  width: 100%;
  max-width: 680px;
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Home screen ── */
.home {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  text-align: center;
  padding: 40px 0;
}
.home-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(56,189,248,.1);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 99px;
  letter-spacing: .1em;
}
.home h1 {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -.01em;
}
.home h1 span { color: var(--accent); }
.home-desc {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  max-width: 420px;
}
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 460px;
}
.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
  text-align: left;
}
.mode-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
.mode-card:active { transform: translateY(0); }
.q-figure { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); overflow-x: auto; background: #1a2535; border-radius: 8px; padding: 12px; }
.q-figure svg { max-width: 100%; height: auto; }
.q-figure svg text { fill: #cbd5e1; }
.q-figure svg line, .q-figure svg path, .q-figure svg ellipse, .q-figure svg circle, .q-figure svg rect { stroke: #64748b; }
.q-figure svg rect[fill='none'], .q-figure svg ellipse[fill='none'], .q-figure svg circle[fill='none'] { fill: none; }
.mode-icon { font-size: 24px; margin-bottom: 10px; }
.mode-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.mode-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-top: 10px;
}
.stats-row {
  display: flex;
  gap: 20px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 24px;
  text-align: center;
  flex: 1;
}
.stat-num { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Question card ── */
.q-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--accent);
  background: rgba(56,189,248,.07);
  letter-spacing: .05em;
}
.q-num { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.q-text {
  font-size: 16px;
  line-height: 1.85;
  font-weight: 500;
  white-space: pre-wrap;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  line-height: 1.65;
  transition: border-color .2s, background .2s, transform .1s;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); transform: translateX(3px); }
.choice-btn:active:not(:disabled) { transform: translateX(0); }
.choice-btn:disabled { cursor: default; }
.choice-key {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
  width: 20px;
}
.choice-btn.correct { border-color: var(--correct); background: rgba(34,197,94,.1); }
.choice-btn.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,.1); }
.choice-btn.correct .choice-key { color: var(--correct); }
.choice-btn.wrong   .choice-key { color: var(--wrong); }

/* ── Feedback ── */
.feedback {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: fadeUp .3s ease;
}
.feedback.show { display: flex; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
}
.feedback-header.ok  { color: var(--correct); }
.feedback-header.ng  { color: var(--wrong); }
.feedback-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.feedback-dot.ok { background: var(--correct); }
.feedback-dot.ng { background: var(--wrong); }
.feedback-body { font-size: 13px; color: var(--muted); line-height: 1.8; }
.feedback-answer { font-size: 13px; color: var(--text); margin-top: 4px; }
.feedback-answer strong { color: var(--accent); }

/* ── Next button ── */
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 15px;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: opacity .2s, transform .1s;
  letter-spacing: .02em;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #0f1923; }
.btn-primary:hover { opacity: .9; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Result screen ── */
.result {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  text-align: center;
  padding: 40px 0;
}
.result-score {
  font-family: var(--mono);
  font-size: 72px;
  font-weight: 600;
  line-height: 1;
}
.result-score span { font-size: 32px; color: var(--muted); }
.result-label { font-size: 15px; color: var(--muted); margin-top: 8px; }
.result-grade {
  font-size: 18px;
  font-weight: 700;
  padding: 8px 24px;
  border-radius: 99px;
}
.result-grade.pass { background: rgba(34,197,94,.15); color: var(--correct); border: 1px solid rgba(34,197,94,.3); }
.result-grade.fail { background: rgba(239,68,68,.1); color: var(--wrong); border: 1px solid rgba(239,68,68,.2); }
.result-detail { color: var(--muted); font-size: 14px; line-height: 1.8; }
.result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }

/* ── Review ── */
.review-list { display: flex; flex-direction: column; gap: 16px; }
.review-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  border-left: 3px solid var(--border);
}
.review-item.ok { border-left-color: var(--correct); }
.review-item.ng { border-left-color: var(--wrong); }
.review-q { font-size: 13px; line-height: 1.7; margin-bottom: 10px; white-space: pre-wrap; }
.review-ans { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.review-ans .ok { color: var(--correct); }
.review-ans .ng { color: var(--wrong); }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

@media (max-width: 480px) {
  .mode-grid { grid-template-columns: 1fr; }
  .stats-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">ITSM // 過去問</span>
  <span class="header-stats" id="header-stats"></span>
</div>
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="main" id="app"></div>

<script>
// =====================================================
// 問題データ（午前I・午前II サンプル）
// questions.json を読み込む形に後で差し替え可能
// =====================================================
const QUESTIONS = [{"id":"AM1-2024-01","year":"2024年春","section":"午前I","q_num":1,"q":"ITサービスマネジメントにおいて、サービスデスクが提供すべき主要な機能はどれか。","choices":["システムの設計と開発","利用者からの問合せや障害の一次受付","サーバのハードウェア保守","セキュリティポリシーの策定"],"answer":1,"explanation":"サービスデスクはITILにおける「サービスオペレーション」の主要機能であり、利用者からの問合せ・インシデントの一次受付（シングルポイントオブコンタクト）を担います。"},{"id":"AM1-2024-02","year":"2024年春","section":"午前I","q_num":2,"q":"ITIL 4 において、サービス価値システム（SVS）の構成要素として正しいものはどれか。","choices":["サービスポートフォリオ・サービスカタログ・サービスパイプライン","ガバナンス・サービス価値連鎖・継続的改善","インシデント管理・問題管理・変更管理","可用性管理・容量管理・IT サービス継続性管理"],"answer":1,"explanation":"ITIL 4 のSVSは「指導原則・ガバナンス・サービス価値連鎖・プラクティス・継続的改善」の5要素で構成されます。"},{"id":"AM2-2025春-01","year":"2025年春","section":"午前II","q_num":1,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，組織は，サービスのライフサイクルに関与する他の関係者の評価及び選定のための基準を設定し，適用しなくてはならない。ここでいう「他の関係者」に該当する利害関係者の組みはどれか。","choices":["外部供給者，外部顧客，利用者","外部供給者，供給者として行動する顧客，内部供給者","外部顧客，供給者として行動する顧客，内部顧客","内部供給者，内部顧客，利用者"],"answer":1,"explanation":"JIS Q 20000-1:2020では，「他の関係者」とは外部供給者，供給者として行動する顧客（自組織のSMSのプロセスを運用する顧客），内部供給者を指します。外部顧客や利用者はサービスの受益者として区別されています。"},{"id":"AM2-2025春-02","year":"2025年春","section":"午前II","q_num":2,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）において，「力量」に関する組織への要求事項として規定されているものはどれか。","choices":["SMS及びサービスに必要な資源が利用可能であることを確実にすることによって，SMSに関するトップマネジメントのリーダーシップ及びコミットメントを実証する。","他の関係者が運用する，組織のSMSのプロセスを決定し，サービスの要求事項を満たすため，他の関係者が運用するSMSの範囲内のプロセスを統合する。","適切な教育，訓練又は経験に基づいて，SMS及びサービスのパフォーマンス及び有効性に影響を与える業務を組織の管理下で行う人々が力量を備えていることを確実にする。","プロセスが計画どおりに実施されたという確信をもつために必要な程度の，文書化した情報を保持する。"],"answer":2,"explanation":"JIS Q 20000-1:2020の「力量」要求事項（7.2節）は，SMSやサービスに影響を与える業務を行う人々が，適切な教育・訓練・経験に基づき必要な力量を備えていることを確実にすることを求めています。"},{"id":"AM2-2025春-03","year":"2025年春","section":"午前II","q_num":3,"q":"JIS Q 20000-2:2023（サービスマネジメントシステムの適用の手引）によれば，SLAに関する説明のうち，最も適切なものはどれか。","choices":["SLAでは，顧客の責任は規定せずに，サービス提供者の責任を規定する。","SLAにおいて設定する目標は，サービス提供者の視点でできるだけ多く定義する。","単一のSLAが，複数のサービス又は複数の顧客を対象とすることがある。","利用するサービスに関する情報は，サービスカタログに収録されている情報についても，必ずSLAに記載する。"],"answer":2,"explanation":"SLAは1つの文書で複数のサービスや複数の顧客をカバーするマルチレベルSLAの形態をとることがあります。顧客の責任も規定でき，目標は双方合意で設定し，サービスカタログの情報をSLAへ重複記載する必要はありません。"},{"id":"AM2-2025春-04","year":"2025年春","section":"午前II","q_num":4,"q":"ITIL4によれば，サービス・カタログ管理プラクティスの目的として，適切なものはどれか。","choices":["高品質な製品及びサービスが円滑に提供されるように，組織のサプライヤ及びそのパフォーマンスを適切に管理することを確実にする。","顧客及びユーザのニーズを満たすために，サービスが合意されたレベルの可用性を確実に提供する。","サービス及びサービス・コンポーネントを体系的に監視し，イベントとして識別された状態の変更を選別して記録及び報告する。","全てのサービスとサービス提供に関する一貫した情報を一元管理し，その情報を関連する対象者が利用できるようにする。"],"answer":3,"explanation":"ITIL4のサービス・カタログ管理プラクティスの目的は，全てのサービスとサービス提供に関する一貫した情報源を提供し，関係者が必要な情報を利用できるようにすることです。"},{"id":"AM2-2025春-05","year":"2025年春","section":"午前II","q_num":5,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，「リスク及び機会への取組み」において，サービスマネジメントシステムの計画を策定するとき，組織は，取り組む必要があるリスク及び機会を決定しなければならない。リスク及び機会を決定する目的として，適切なものはどれか。","choices":["サービスマネジメントシステム及びサービスに必要な資源が利用可能であることを確実にする。","サービスマネジメントシステムが，その意図した成果を達成できるという確信を与える。","サービスマネジメント方針と整合するサービスマネジメントの目的を確立する。","設定されたパフォーマンス基準に従ってプロセスの管理を実施する。"],"answer":1,"explanation":"JIS Q 20000-1:2020の6.1節では，SMSが意図した成果を達成できるという確信を与えること，望ましくない影響を防止・低減すること，継続的改善を達成することを目的としてリスク及び機会を決定することを求めています。"},{"id":"AM2-2025春-06","year":"2025年春","section":"午前II","q_num":6,"q":"図は，あるプロジェクトにおける，旧システムから新システムへの切替え移行作業の流れ図である。次の条件で作業を遂行する場合，移行開始から移行終了までの所要時間は最短で何時間か。\n\n〔条件〕\n・作業者は3人とし，一つの作業は1人が担当する。\n・並行して実施できる作業は同時に進める。\n・各作業者は，作業と作業との間のどこかで最低1回，連続1時間以上の休憩を取る。","choices":["6.5","7.0","7.5","8.5"],"answer":2,"figure":"<svg viewBox=\"0 0 520 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar6\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></marker></defs><rect x=\"360\" y=\"8\" width=\"150\" height=\"52\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1\"/><text x=\"435\" y=\"23\" text-anchor=\"middle\" font-weight=\"bold\">凡例</text><rect x=\"370\" y=\"28\" width=\"130\" height=\"26\ dle\">【旧システム】</text><text x=\"300\" y=\"158\" text-anchor=\"middle\">取引データ</text><text x=\"300\" y=\"171\" text-anchor=\"middle\">抽出 2.5時間</text><line x1=\"50\" y1=\"180\" x2=\"50\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"170\" y1=\"180\" x2=\"170\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"300\" y1=\"180\" x2=\"300\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"5\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"50\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"50\" y=\"228\" text-anchor=\"middle\">利用者IDデータ</text><text x=\"50\" y=\"241\" text-anchor=\"middle\">登録 4.0時間</text><rect x=\"125\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"170\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"170\" y=\"228\" text-anchor=\"middle\">マスターデータ</text><text x=\"170\" y=\"241\" text-anchor=\"middle\">登録 3.5時間</text><rect x=\"255\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"300\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"300\" y=\"228\" text-anchor=\"middle\">取引データ</text><text x=\"300\" y=\"241\" text-anchor=\"middle\">登録 3.0時間</text><line x1=\"50\" y1=\"250\" x2=\"50\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"170\" y1=\"250\" x2=\"170\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"300\" y1=\"250\" x2=\"300\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"265\" x2=\"300\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"265\" x2=\"110\" y2=\"280\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"240\" y1=\"265\" x2=\"240\" y2=\"280\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"60\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"110\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"110\" y=\"308\" text-anchor=\"middle\">動作確認① 0.5時間</text><rect x=\"190\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"240\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"240\" y=\"308\" text-anchor=\"middle\">動作確認② 0.5時間</text><line x1=\"110\" y1=\"318\" x2=\"110\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"240\" y1=\"318\" x2=\"240\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"335\" x2=\"240\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"175\" y1=\"335\" x2=\"175\" y2=\"350\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><ellipse cx=\"175\" cy=\"368\" rx=\"58\" ry=\"16\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"175\" y=\"372\" text-anchor=\"middle\">移行終了</text><text x=\"10\" y=\"395\" font-size=\"12\">ア 6.5　　イ 7.0　　ウ 7.5　　エ 8.5</text></svg>","explanation":"クリティカルパスは「オンライン停止(0.5)→取引データ抽出(2.5)→取引データ登録(3.0)→動作確認②(0.5)」で合計6.5時間。各作業者は最低1時間の休憩が必要なため+1時間。最短は7.5時間（ウ）。"},{"id":"AM2-2025春-07","year":"2025年春","section":"午前II","q_num":7,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，サービスマネジメントにおける「リリース及び展開管理」に対する要求事項のうち，適切なものはどれか。","choices":["稼働環境へのリリースの展開後，影響を受けたCIのベースラインをとる。","顧客は，業務への影響を考慮して，緊急リリースを含むリリースの種類及び頻度を定義する。","リリースの成功又は失敗の分析から導き出された結果及び結論は記録し，改善の機会を特定するためにレビューする。","リリースは，文書化した受入れ基準に基づいて検証し，正しく展開されたことを確認した後に承認する。"],"answer":2,"explanation":"JIS Q 20000-1:2020では，リリースの成功・失敗の分析結果を記録し改善機会特定のためにレビューすることが要求されています。ア：ベースラインは展開前，イ：リリースの種類・頻度は組織が定義，エ：承認は展開前に行います。"},{"id":"AM2-2025春-08","year":"2025年春","section":"午前II","q_num":8,"q":"目標復旧時間（RTO）を24時間に定めているのはどれか。","choices":["アプリケーションソフトウェアのリリースを展開するための中断時間を，24時間以内とする。","インシデントの解決後，その原因となった問題を24時間以内に解決させる。","業務データを，障害発生時点の24時間前以降の状態に復旧させる。","中断したITサービスを24時間以内に復旧させる。"],"answer":3,"explanation":"RTO（Recovery Time Objective：目標復旧時間）とは，サービス中断から復旧までの目標時間です。「中断したITサービスを24時間以内に復旧させる」がRTOの定義に合致します。ウはRPO（目標復旧時点）の説明です。"},{"id":"AM2-2025春-09","year":"2025年春","section":"午前II","q_num":9,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，パフォーマンス評価の一つである「マネジメントレビュー」の要求事項のうち，適切なものはどれか。","choices":["SLAには，サービスレベル目標，作業負荷の限度及び例外を含めなければならない。","アウトプットには，継続的改善の機会に関する決定を含まなければならない。","改善の機会に対して適用する評価基準には，改善とサービスマネジメントの目的との整合性が含まれなければならない。","既存のサービス，新規サービス及びサービス変更に対するサービスの要求事項を決定し，文書化しなければならない。"],"answer":1,"explanation":"マネジメントレビューのアウトプットには，継続的改善の機会に関する決定，SMSやサービスの変更の必要性，必要な資源が含まれなければなりません。"},{"id":"AM2-2025春-10","year":"2025年春","section":"午前II","q_num":10,"q":"バックアップサイトを用いたサービス復旧方法の説明のうち，ウォームスタンバイの説明として，最も適切なものはどれか。","choices":["同じようなシステムを運用する外部の企業や組織と協定を結び，緊急時には互いのシステムを貸し借りして，サービスを復旧させる。","緊急時にはバックアップシステムを持ち込んでシステムを再開し，サービスを復旧させる。","常にデータの同期が取れているバックアップシステムを用意しておき，緊急時にはバックアップシステムに切り替えて直ちにサービスを復旧させる。","バックアップシステムを起動しておき，緊急時にはバックアップシステムに切り替えて，データを最新状態にする処理を行った後にサービスを復旧させる。"],"answer":3,"explanation":"ウォームスタンバイは，バックアップシステムを起動した状態で待機させ，緊急時に切り替え後データを最新化してからサービスを復旧する方法です。ア：相互利用協定，イ：コールドスタンバイ，ウ：ホットスタンバイの説明です。"},{"id":"AM2-2025春-11","year":"2025年春","section":"午前II","q_num":11,"q":"ヒューマンエラーに起因する運用作業ミスの防止対策の一つに，エラープルーフ化がある。〔磁気テープ交換作業のミス〕に対する再発防止策のうち，エラープルーフ化の五つの原理（排除，代替化，容易化，異常検出，影響緩和）の「排除」に該当するものはどれか。\n\n〔磁気テープ交換作業のミス〕\nサーバの内蔵ディスクに記録されているデータを磁気テープにバックアップする作業において，磁気テープに書ききれなくなったことを示すメッセージがコンソールに表示された。この場合，未使用の磁気テープに交換した後にバックアップ作業を継続するのが正しい作業であるが，オペレーターが誤って既にほかのデータが記録されている磁気テープに交換して作業を継続したので，取得済みのデータが失われてしまった。","choices":["磁気テープに最初のデータを書き込む前に磁気情報をチェックし，データが記録された磁気テープであった場合はエラーメッセージを表示することによって，磁気テープの交換ミスに気付かせるようにする。","十分な記憶容量をもつ外部ディスク装置にバックアップ先を変更することによって，磁気テープへのバックアップ作業を不要にする。","既にデータが記録されている磁気テープに目印となるシールを貼っておくことによって，磁気テープの交換ミスを起こりにくくする。","データが記録された磁気テープを書込み禁止状態にしておくことによって，磁気テープの交換ミスをしてもバックアップデータが書き込めないようにする。"],"answer":1,"explanation":"「排除」とはミスが発生する原因そのものをなくすことです。磁気テープへのバックアップを外部ディスクに変更することで，磁気テープ交換作業自体が不要になりミスの原因が排除されます。ア：異常検出，ウ：容易化，エ：影響緩和に該当します。"},{"id":"AM2-2025春-12","year":"2025年春","section":"午前II","q_num":12,"q":"データセンターのファシリティマネジメントにおいて，設備機器に関わる，運転状況の監視と運転の制御，設備故障の監視，計測データの管理を行うものはどれか。","choices":["AIM（Automated Infrastructure Management）","BAS（Building Automation System）","CMDB（Configuration Management Database）","NEBS（Network Equipment Building Systems）"],"answer":1,"explanation":"BAS（ビルオートメーションシステム）は，空調・電源・照明などの設備機器の運転状況監視・制御，故障監視，計測データ管理を行うシステムです。"},{"id":"AM2-2025春-13","year":"2025年春","section":"午前II","q_num":13,"q":"サーバルームのように，散水による消火では甚大な水損が発生するおそれがある施設に設置される消火設備であって，二酸化炭素などを消火剤に用いて酸素濃度を下げて消火する設備はどれか。","choices":["泡消火設備","ハロゲン化物消火設備","不活性ガス消火設備","粉末消火設備"],"answer":2,"explanation":"不活性ガス消火設備は，二酸化炭素・窒素・アルゴンなどの不活性ガスを放出して酸素濃度を下げることで消火します。水損がなくサーバルームに適しています。"},{"id":"AM2-2025春-14","year":"2025年春","section":"午前II","q_num":14,"q":"金融庁「財務報告に係る内部統制の評価及び監査に関する実施基準（令和5年）」によれば，「記録した取引に漏れ，重複がないこと」は，組織目標を達成するためのITの統制目標のうち，どれに含まれるか。","choices":["可用性","機密性","準拠性","信頼性"],"answer":3,"explanation":"「記録した取引に漏れ，重複がないこと」はデータの完全性・正確性に関わり，財務報告の「信頼性」に含まれます。"},{"id":"AM2-2025春-15","year":"2025年春","section":"午前II","q_num":15,"q":"Webサーバでのシングルサインオンの実装方式に関する記述のうち，適切なものはどれか。","choices":["cookieを使ったシングルサインオンの場合，Webサーバごとの認証情報を含んだcookieをクライアントで生成し，各Webサーバ上で保存，管理する。","cookieを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，利用者認証においてパスワードの代わりにデジタル証明書を用いることができる。"],"answer":3,"explanation":"リバースプロキシ方式のSSOでは，プロキシが認証を一元管理するため，利用者認証にデジタル証明書を利用することが可能です。cookie方式では同一ドメイン内でcookieを共有します。"},{"id":"AM2-2025春-16","year":"2025年春","section":"午前II","q_num":16,"q":"JIS Q 0073:2010（リスクマネジメント一用語）におけるリスクマトリックスの定義はどれか。","choices":["結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段","結果とその起こりやすさの組合せとして表現される，リスク又は組み合わさったリスクの大きさ","組織に追求する又は保有する意思があるリスクの量及び種類","リスク全体を更に完全に理解することを進展させるために，幾つかのリスクを一つのリスクに組み合わせたもの"],"answer":0,"explanation":"JIS Q 0073:2010では，リスクマトリックスとは「結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段」と定義されています。イ：リスクレベル，ウ：リスク選好，エ：複合リスクの説明です。"},{"id":"AM2-2025春-17","year":"2025年春","section":"午前II","q_num":17,"q":"JIS Q 22301:2020が要求事項を規定している対象はどれか。","choices":["ITサービスマネジメントシステム","個人情報保護マネジメントシステム","事業継続マネジメントシステム","情報セキュリティマネジメントシステム"],"answer":2,"explanation":"JIS Q 22301は事業継続マネジメントシステム（BCMS）の要求事項を規定する規格です。ア：JIS Q 20000，イ：JIS Q 15001，エ：JIS Q 27001が対応します。"},{"id":"AM2-2025春-18","year":"2025年春","section":"午前II","q_num":18,"q":"プロジェクトマネジメントにおいて，プロジェクトスコープのクリープと呼ばれるものはどれか。","choices":["時間，コスト及び資源の調整が行われず，コントロールされていないプロジェクトスコープの変更","発生した場合に，プロジェクトの目標にプラス又はマイナスの影響を与えることがある潜在的な事象","プロジェクトの目標を達成するために完了する必要のある作業を表すための，階層的分割の枠組み","目標，成果物，要求事項及び境界を含むプロジェクトスコープを記述したもの"],"answer":0,"explanation":"スコープクリープとは，適切な変更管理プロセスを経ずに，時間・コスト・資源の調整なしにプロジェクトスコープが拡大していく現象です。イ：リスク，ウ：WBS，エ：スコープ記述書の説明です。"},{"id":"AM2-2025春-19","year":"2025年春","section":"午前II","q_num":19,"q":"プロジェクトのスケジュールを短縮したい。当初の計画は図1のとおりである。作業Eを作業E1，E2，E3に分けて，図2のとおりに計画を変更すると，スケジュールは全体で何日短縮できるか。","choices":["1","2","3","4"],"answer":0,"figure":"<svg viewBox=\"0 0 480 310\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar19\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></marker></defs><text x=\"5\" y=\"14\" font-weight=\"bold\" font-size=\"12\">図1　当初の計画</text><circle cx=\"30\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"100\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"175\" cy=\"35\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"175\" cy=\"75\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"255\" cy=\"35\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"255\" cy=\"75\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"330\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"43\" 0\" y=\"178\" text-anchor=\"middle\">G 7</text><line x1=\"267\" y1=\"210\" x2=\"318\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19)\"/><text x=\"290\" y=\"216\" text-anchor=\"middle\">H 4</text><text x=\"5\" y=\"280\" font-size=\"12\">ア 1　　イ 2　　ウ 3　　エ 4</text></svg>","explanation":"図1のクリティカルパスはA(5)→B(8)→E(9)→G(7)=29日。図2ではE1(3)→E2(4)でE相当=7日となりE経由が26日，ダミー考慮でもクリティカルパスは28日。29-28=1日の短縮（ア）。"},{"id":"AM2-2025春-20","year":"2025年春","section":"午前II","q_num":20,"q":"JIS Q 21500:2018（プロジェクトマネジメントの手引）によれば，プロセス「品質の計画」で行う活動はどれか。","choices":["成果物及びプロセスの品質を満たしそうなことを監視し，確定済みのツール，手順及び技法を用いて欠陥を発見する。","品質要求事項を満たすために達成する目標及び関連する規格が，適切なプロジェクト組織の構成員によって伝達され，理解され，受け入れられ，遵守されることを確実にする。","品質要求事項を満たすために必要なものとして確定した，ツール，手順，技法及び資源を使用することを確実にする。","プロジェクトの目標に基づいて，プロジェクトに適用する品質に関連する規格を満たすために必要なツール，手順，技法及び資源を確定する。"],"answer":3,"explanation":"「品質の計画」プロセスでは，プロジェクト目標に基づき，適用する品質規格を満たすために必要なツール・手順・技法・資源を確定する活動を行います。"},{"id":"AM2-2025春-21","year":"2025年春","section":"午前II","q_num":21,"q":"メモリインタリーブの説明として，適切なものはどれか。","choices":["外部記憶装置を利用して，主記憶の物理容量を超えるメモリ空間をプログラムから利用可能にする。","主記憶と磁気ディスク装置との間にバッファメモリを置いて，双方のアクセス速度の差を補う。","主記憶と入出力装置との間でCPUを介さずにデータ転送を行う。","主記憶を複数のバンクに分けて，CPUからのアクセス要求を並列的に処理できるようにする。"],"answer":3,"explanation":"メモリインタリーブは，主記憶を複数のバンクに分割し，CPUからのアクセスを各バンクに分散して並列処理することでメモリアクセスを高速化する技術です。ア：仮想記憶，イ：キャッシュメモリ，ウ：DMAの説明です。"},{"id":"AM2-2025春-22","year":"2025年春","section":"午前II","q_num":22,"q":"MTBFがx時間，MTTRがy時間のシステムがある。稼働環境が変わったので，MTBF，MTTRがともに従来の1.5倍になった。新しい稼働環境での稼働率はどうなるか。","choices":["x，yの値によって変化するが，従来の稼働率よりは大きい値になる。","従来の稼働率と同じ値である。","従来の稼働率の1.5倍になる。","従来の稼働率の2/3倍になる。"],"answer":1,"explanation":"稼働率＝MTBF÷(MTBF+MTTR)。MTBFとMTTRが両方1.5倍になると，1.5x÷(1.5x+1.5y)＝x÷(x+y)となり，従来と同じ稼働率になります。"},{"id":"AM2-2025春-23","year":"2025年春","section":"午前II","q_num":23,"q":"DBMSにおいて，複数のトランザクション処理プログラムが同一データベースを同時に更新する場合，論理的な矛盾を生じさせないために用いる技法はどれか。","choices":["再編成","正規化","整合性制約","排他制御"],"answer":3,"explanation":"排他制御（ロック）は，複数のトランザクションが同一データに同時アクセスする際の競合を防ぎ，データの整合性を保つ技法です。"},{"id":"AM2-2025春-24","year":"2025年春","section":"午前II","q_num":24,"q":"スイッチングハブ同士を接続する際に，複数のポートを束ねて一つの論理ポートとして扱う技術はどれか。","choices":["MIME","MIMO","マルチパート","リンクアグリゲーション"],"answer":3,"explanation":"リンクアグリゲーション（IEEE 802.3ad/LACP）は，複数の物理ポートを束ねて1つの論理リンクとして扱う技術です。帯域幅の増加と冗長性の確保が実現できます。"},{"id":"AM2-2025春-25","year":"2025年春","section":"午前II","q_num":25,"q":"労働基準法で定める制度のうち，いわゆる36協定と呼ばれる労使協定に関する制度はどれか。","choices":["業務遂行の手段，時間配分の決定などを大幅に労働者に委ねる業務に適用され，労働時間の算定は，労使協定で定めた労働時間の労働とみなす制度","業務の繁閑に応じた労働時間の配分などを行い，労使協定によって1か月以内の期間を平均して1週の法定労働時間を超えないようにする制度","時間外労働，休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることによって，法定労働時間を超える時間外労働が認められる制度","労使協定によって1か月以内の一定期間の総労働時間を定め，1日の固定勤務時間以外では，労働者に始業・終業時刻の決定を委ねる制度"],"answer":2,"explanation":"36協定（労働基準法第36条）とは，時間外労働・休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることで，法定労働時間を超える労働が認められる制度です。ア：裁量労働制，イ：変形労働時間制，エ：フレックスタイム制の説明です。"},{"id": "AM2-2024春-01", "year": "令和6年春", "section": "午前II", "q_num": 1, "q": "JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，サービスマネジメントシステム（SMS）の支援に関する要求事項のうち，“意図した結果を達成するために，知識及び技能を適用する能力”に関するものはどれか。", "choices": ["サービスの運用に必要な人，技術，情報及び財務に関する資源を決定し，提供する。", "サービスの運用を支援するために必要な知識を決定し，維持する。", "組織の要員がサービスマネジメントの方針及び目的に関する認識をもつようにする。", "適切な教育，訓練又は経験に基づいて，組織の管理下でSMS及びサービスのパフォーマンス及び有効性に影響を与える業務を行う人々が力量を備えていることを確実にする。"], "answer": 3, "explanation": "JIS Q 20000-1:2020の「力量」に関する要求事項（7.2）では，適切な教育・訓練・経験に基づいて，SMS及びサービスに影響を与える業務を行う人々が力量を備えていることを確実にすることが求められています。これが“知識及び技能を適用する能力”を確実にする取組みに当たります。"},{"id": "AM2-2024春-02", "year": "令和6年春", "section": "午前II", "q_num": 2, "q": "サービスマネジメントにおける“サービス継続管理”の活動において，組織は，サービス継続計画を作成し，実施し，維持しなければならない。“サービス継続の発動の基準及び責任”や“重大なサービスの停止の場合に実施する手順”と同様に，サービス継続計画に含めなければならない事項はどれか。", "choices": ["顧客又はサービスに重大な影響を及ぼす可能性のある変更を判断する基準", "サービスに対する需要に基づいた現在の容量・能力及び予測される容量・能力", "他のサービスへの依存関係", "平常業務の状態に復帰するための手順"], "answer": 3, "explanation": "JIS Q 20000-1:2020のサービス継続管理では，サービス継続計画に「発動の基準及び責任」「重大な停止時に実施する手順」に加え，「平常業務の状態に復帰するための手順」を含めることが要求されています。ア・イ・ウはそれぞれ変更管理，容量・能力管理，依存関係の整理に関する事項です。"},{"id": "AM2-2024春-03", "year": "令和6年春", "section": "午前II", "q_num": 3, "q": "サービスマネジメントの“事業関係管理”において，サービス提供者が実施すべき活動はどれか。", "choices": ["外部供給者が提供又は運用するサービス，サービスコンポーネント，プロセス又はプロセスの一部に関する適用範囲を含めた契約文書を作成し，外部供給者と合意する。", "サービスの顧客，利用者及び他の利害関係者を特定し，文書化し，顧客及び他の利害関係者との間にコミュニケーションのための取決めを確立する。", "提供する各サービスについて，文書化したサービスの要求事項に基づいて，一つ以上のSLAを顧客と合意する。", "内部供給者又は供給者として行動する顧客に対して，サービスレベル目標，他のコミットメント，活動及び関係者間のインタフェースを定義するための合意文書を作成し，合意し，維持する。"], "answer": 1, "explanation": "事業関係管理は，サービスの顧客，利用者及び他の利害関係者を特定して文書化し，それらとのコミュニケーションのための取決めを確立する活動です。ア・エは供給者管理，ウはサービスレベル管理（SLA）に関する活動に当たります。"},{"id": "AM2-2024春-04", "year": "令和6年春", "section": "午前II", "q_num": 4, "q": "ITIL4の可用性管理プラクティスにおいて，障害発生後のサービスの回復の速さを測定する指標はどれか。", "choices": ["MTBF", "MTRS", "サービス期間中の合計ダウンタイム", "平均サービス・インシデント間隔"], "answer": 1, "explanation": "MTRS（Mean Time to Restore Service：平均サービス回復時間）は，障害発生からサービスが回復するまでの平均時間を表し，障害発生後の回復の速さを測定する指標です。MTBFはサービスが継続して利用できる平均時間を表す指標です。"},{"id": "AM2-2024春-05", "year": "令和6年春", "section": "午前II", "q_num": 5, "q": "JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，内部監査の要求事項のうち，適切なものはどれか。", "choices": ["各監査について，監査の基準及び監査範囲を明確にする。", "監査は，新しいリスク又はその他の問題が発見されたときに実施する。", "監査を受ける業務を担当する要員の中から，適切な知識を有する人を監査員に選定する。", "前回までの監査の結果を考慮せずに，監査プログラムを計画する。"], "answer": 0, "explanation": "JIS Q 20000-1:2020の内部監査の要求事項では，各監査について監査の基準及び監査範囲を明確にすることが求められています。監査プログラムは過去の監査結果も考慮して計画し，監査員は被監査対象の業務から独立した者を選定する必要があります。"},{"id": "AM2-2024春-06", "year": "令和6年春", "section": "午前II", "q_num": 6, "q": "サービス提供時間帯が毎日0時から24時のITサービスにおいて，ある年の4月1日0時から6月30日24時までのサービス停止状況は表のとおりであった。システムバージョンアップ作業に伴う停止時間は，計画停止時間として顧客との間で合意している。4月1日から6月30日までのITサービスのサービス可用性は何%か。ここで，サービス可用性（%）は小数第3位を四捨五入するものとする。", "choices": ["95.52", "95.70", "99.52", "99.63"], "answer": 2, "explanation": "4月1日から6月30日までは91日＝2,184時間。計画停止であるバージョンアップ作業の84時間はサービス提供時間から除外して考えるため，対象となるサービス提供時間は2,184－84＝2,100時間。これに対し，計画外の停止（ハードウェア故障）が10時間あったので，可用性＝(2,100－10)÷2,100＝0.99523…≒99.52%（ウ）となります。", "figure": "<svg viewBox=\"0 0 560 130\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><rect x=\"10\" y=\"10\" width=\"190\" height=\"34\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"10\" width=\"350\" height=\"34\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"31\" text-anchor=\"middle\" font-weight=\"bold\">停止理由</text><text x=\"375\" y=\"31\" text-anchor=\"middle\" font-weight=\"bold\">停止時間</text><rect x=\"10\" y=\"44\" width=\"190\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"44\" width=\"350\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"60\" text-anchor=\"middle\">システムバージョンアップ</text><text x=\"105\" y=\"74\" text-anchor=\"middle\">作業に伴う停止</text><text x=\"375\" y=\"67\" text-anchor=\"middle\">5月2日22時から5月6日10時までの84時間</text><rect x=\"10\" y=\"82\" width=\"190\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><rect x=\"200\" y=\"82\" width=\"350\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\"/><text x=\"105\" y=\"105\" text-anchor=\"middle\">ハードウェア故障に伴う停止</text><text x=\"375\" y=\"105\" text-anchor=\"middle\">6月26日10時から20時までの10時間</text></svg>"},{"id": "AM2-2024春-07", "year": "令和6年春", "section": "午前II", "q_num": 7, "q": "総所有費用（TCO）の説明として，適切なものはどれか。", "choices": ["自社に導入した業務システムの開発総費用とハードウェア購入費用", "システムの導入から廃棄に至るライフサイクルの総費用", "ハードウェア及びソフトウェアを導入して稼働させるまでの総費用", "ハードウェア購入費用とヘルプデスクや利用者教育などのテクニカルサポートに要する費用"], "answer": 1, "explanation": "TCO（Total Cost of Ownership：総所有費用）は，システムの導入から運用，保守，廃棄に至るライフサイクル全体でかかる総費用（導入費・運用費・保守費・教育費・廃棄費用などを含む）を指す概念です。"},{"id": "AM2-2024春-08", "year": "令和6年春", "section": "午前II", "q_num": 8, "q": "サービスデスクにWFM（Work Force Management）システムを導入する目的として，適切なものはどれか。", "choices": ["アウトバウンド業務において顧客の電話番号を自動的に発信することによって，要員による電話の掛け誤りを防止する。", "過去の応対記録に基づいて顧客の興味や関心に合わせたきめ細かい対応を行い，顧客満足度を高める。", "顧客からの問合せ件数の実績に基づいて今後の問合せ件数を予測し，要員の勤務スケジュールを自動的に作成する。", "資料請求の受付などの簡単な顧客対応は音声による自動応答で行うことによって，要員が高度な顧客対応に集中できるようにする。"], "answer": 2, "explanation": "WFM（Work Force Management）システムは，過去の問合せ件数の実績に基づいて将来の問合せ件数を予測し，それに応じた要員の勤務スケジュールを自動的に作成して，必要な人員を必要なときに確保するためのシステムです。"},{"id": "AM2-2024春-09", "year": "令和6年春", "section": "午前II", "q_num": 9, "q": "運用サービスを提供するデータセンターにおいて，サーバに仮想化技術を用いることによって得られる利点のうち，適切なものはどれか。", "choices": ["仮想サーバを，それぞれのリクエストの応答時間が長くなる時間帯が重ならないように，少数の物理サーバに再配置することによって，現状の応答時間を保証した上で物理サーバの台数を削減できる。", "クラスタ構成のサーバの処理能力をスケールアップによって増強する場合，ソフトウェアの基本ライセンスの条件の確認はしなくてもよい。", "サービスの利用が少なくなる夜間の消費電力量を削減するために，物理サーバの稼働台数を減少させることは，ライブマイグレーションによって仮想サーバを少数の物理サーバに集約すれば，サービスを停止させなくて済む。", "大規模データの分散処理を実現するソフトウェアApache Hadoopを構築したシステムを評価する場合，このシステムを複数の仮想サーバを稼働させる1台の物理サーバ上に構築することによって，システムの処理能力を検証できる。"], "answer": 2, "explanation": "サーバ仮想化のライブマイグレーション機能を利用すれば，稼働中の仮想サーバを停止させることなく別の物理サーバへ移動できるため，夜間など利用が少ない時間帯に仮想サーバを少数の物理サーバへ集約し，他の物理サーバを停止して消費電力を削減することができます。"},{"id": "AM2-2024春-10", "year": "令和6年春", "section": "午前II", "q_num": 10, "q": "災害時における復旧対策の説明のうち，ウォームサイトのものはどれか。", "choices": ["ITサービスが再開されるまで，手作業で業務を遂行する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点に，いつでも利用できる状態の本番環境と同じバックアップシステムを備えておき，災害時にはバックアップシステムに切り替えることでサービスを復旧する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点に，本番環境とほぼ同じシステムを非稼働状態で待機させておき，災害時にはこのシステムを稼働させて復旧する。", "あらかじめシステムを稼働させるために必要な電源，ネットワークなどの設備を備えた拠点を確保しておき，災害時には自社のコンピュータ機器を設置して，数日から数週間で復旧する。"], "answer": 2, "explanation": "ウォームサイトは，あらかじめ電源・ネットワークなどの設備を備えた拠点に，本番環境とほぼ同じシステムを非稼働状態で待機させておき，災害時にそのシステムを稼働させて復旧する方式です。ア：手作業による代替，イ：ホットサイト，エ：コールドサイトの説明に当たります。"},{"id": "AM2-2024春-11", "year": "令和6年春", "section": "午前II", "q_num": 11, "q": "基幹業務システムの構築及び運用において，データ管理者（DA）とデータベース管理者（DBA）を別々に任命した場合のDAの役割として，適切なものはどれか。", "choices": ["業務データ量の増加傾向を把握し，ディスク装置の増設などを計画して実施する。", "システム開発の設計工程では，主に論理データベース設計を行い，データ項目を管理して標準化する。", "システム開発のテスト工程では，主にパフォーマンスチューニングを担当する。", "システム障害が発生した場合には，データの復旧や整合性のチェックなどを行う。"], "answer": 1, "explanation": "データ管理者（DA）は，データを全社的な資源として捉え，システム開発の設計工程において主に論理データベース設計を行い，データ項目の管理・標準化を担当します。ア・ウ・エは物理的なデータベースの構築・運用を担うDBA（データベース管理者）の役割です。"},{"id": "AM2-2024春-12", "year": "令和6年春", "section": "午前II", "q_num": 12, "q": "データセンターの施設効率を測る定量指標である，PUE（Power Usage Effectiveness）の計算式はどれか。", "choices": ["IT機器の総消費電力 ÷ データセンターの総消費電力", "IT機器の総消費電力 ÷ データセンターの総床面積", "IT機器の総処理量 ÷ データセンターの総消費電力", "データセンターの総消費電力 ÷ IT機器の総消費電力"], "answer": 3, "explanation": "PUE（Power Usage Effectiveness）は「データセンターの総消費電力 ÷ IT機器の総消費電力」で算出される指標で，値が1に近いほど空調や照明などに使われる電力が少なく，データセンターのエネルギー効率が高いことを示します。"},{"id": "AM2-2024春-13", "year": "令和6年春", "section": "午前II", "q_num": 13, "q": "空調計画における冷房負荷には，“外気負荷”，“室内負荷”，“伝熱負荷”，“日射負荷”などがある。冷房負荷の軽減策のうち，“伝熱負荷”の軽減策として，最も適切なものはどれか。", "choices": ["使用を終えたら，その都度PCの電源を切る。", "隙間風や換気による影響を少なくする。", "日光が当たる南に面したガラス窓をむやみに大きなものにしない。", "屋根や壁面に断熱加工を施す。"], "answer": 3, "explanation": "伝熱負荷とは，屋根，壁，窓などを通して外部の熱が室内に伝わることによって生じる負荷のことです。屋根や壁面に断熱加工を施すことで，外部から室内への熱の伝わりを抑制し，伝熱負荷を軽減できます。ア：室内負荷，イ：外気負荷，ウ：日射負荷の軽減策に当たります。"},{"id": "AM2-2024春-14", "year": "令和6年春", "section": "午前II", "q_num": 14, "q": "システム監査基準（令和5年）におけるシステム監査基準の説明として，適切なものはどれか。", "choices": ["システム監査が効果的かつ効率的に行われるために，システム監査のあるべき体制や実施方法等を示したもの", "システム監査の信頼性を保つために，システム監査人が保持すべき情報システム及びシステム監査に関する専門的知識・技能の水準を定めたもの", "情報システムのガバナンス，マネジメント，コントロールを点検・評価・検証する際の判断の尺度となるもの", "情報システムの利活用において共通して留意すべき事項を体系化・一般化してまとめたもの"], "answer": 0, "explanation": "システム監査基準（令和5年）は，システム監査が効果的かつ効率的に行われるために，システム監査人が従うべき監査の体制や実施方法等の判断の尺度を示した基準です。イはシステム監査人に求められる知識・技能の水準，ウ・エはシステム管理基準に関する説明に当たります。"},{"id": "AM2-2024春-15", "year": "令和6年春", "section": "午前II", "q_num": 15, "q": "デジタル署名のあるソフトウェアをインストールするときに，そのソフトウェアの発行元を確認するために使用する証明書はどれか。", "choices": ["EV SSL証明書", "クライアント証明書", "コードサイニング証明書", "サーバ証明書"], "answer": 2, "explanation": "コードサイニング証明書は，ソフトウェアの開発元（発行元）が改ざんされていないこと及びその真正性を確認できるように，実行ファイルなどにデジタル署名を付与する際に用いられる証明書です。"},{"id": "AM2-2024春-16", "year": "令和6年春", "section": "午前II", "q_num": 16, "q": "JIS Q 27000:2019（情報セキュリティマネジメントシステム用語）における用語の定義として，適切なものはどれか。", "choices": ["トップマネジメントとは，リスクを運用管理することについて，アカウンタビリティ及び権限をもつ人又は主体のことである。", "リスクアセスメントとは，リスクを修正するプロセスのことであり，リスクを生じさせる活動を開始又は継続しないと決定することによって，リスクを回避することを含む。", "リスク評価とは，リスク及び/又はその大きさが受容可能か又は許容可能かを決定するために，リスク分析の結果をリスク基準と比較するプロセスのことである。", "リスク分析とは，リスクを発見，認識及び記述するプロセスのことであり，リスク源，事象，それらの原因及び起こり得る結果の特定が含まれる。"], "answer": 2, "explanation": "JIS Q 27000:2019では，リスク評価とは「リスク及び/又はその大きさが受容可能か又は許容可能かを決定するために，リスク分析の結果をリスク基準と比較するプロセス」と定義されています。ア，イ，エの記述はそれぞれリスクオーナー，リスク対応，リスク特定の説明に当たります。"},{"id": "AM2-2024春-17", "year": "令和6年春", "section": "午前II", "q_num": 17, "q": "IoT推進コンソーシアム，総務省，経済産業省が策定した“IoTセキュリティガイドライン（Ver 1.0）”における“要点17．出荷・リリース後も安全安心な状態を維持する”に対策として挙げられているものはどれか。", "choices": ["IoT機器及びIoTシステムが収集するセンサーデータ，個人情報などの情報の洗い出し，並びに保護すべきデータの特定", "IoT機器のアップデート方法の検討，アップデートなどの機能の搭載，アップデートの実施", "IoT機器メーカー，IoTシステムやサービスの提供者，利用者の役割の整理", "PDCAサイクルの実施，組織としてIoTシステムやサービスのリスクの認識，対策を行う体制の構築"], "answer": 1, "explanation": "IoTセキュリティガイドライン（Ver 1.0）の「要点17．出荷・リリース後も安全安心な状態を維持する」では，IoT機器のアップデート方法の検討，アップデート機能の搭載，アップデートの実施が対策として挙げられています。これは出荷後に発見された脆弱性へ対応し続けるための取組みです。"},{"id": "AM2-2024春-18", "year": "令和6年春", "section": "午前II", "q_num": 18, "q": "ステークホルダ登録簿の作成及び更新に関する記述のうち，適切なものはどれか。", "choices": ["重要なステークホルダを特定するために，社外の人だけをステークホルダ登録簿に記載する。", "ステークホルダに公平に対応するために，ステークホルダ登録簿には登録したステークホルダの重要度を付けない。", "ステークホルダのニーズや期待の変化に対応するために，ステークホルダ登録簿の内容を継続的に更新する。", "ステークホルダの利害及び関係に関連する情報を漏れなく記載するために，プロジェクトをある程度進めてからステークホルダ登録簿を作成する。"], "answer": 2, "explanation": "ステークホルダ登録簿は，ステークホルダのニーズや期待が時間の経過とともに変化することに対応するため，プロジェクトを通じて継続的に更新する必要があります。社内外を問わず重要なステークホルダを特定し，重要度などの分類情報も含めてプロジェクトの初期段階から作成します。"},{"id": "AM2-2024春-19", "year": "令和6年春", "section": "午前II", "q_num": 19, "q": "アローダイアグラムで表される日程のプロジェクトにおいて，現在のクリティカルパスは作業A，D，I，Jである。作業Dを2日，作業Jを1日短縮すると，作業Fの総余裕日数は何日減少するか。ここで，総余裕日数とは，当該作業に先行する作業が遅れなしに完了したとき，総所要日数を増加させることなく，当該作業が遅れてもよい日数である。", "choices": ["1", "2", "3", "4"], "answer": 0, "explanation": "変更前は，作業Fが合流する結合点の最遅結合点時刻は13日（J経由：A+D+I=13からJ=4を引いた値），最早結合点時刻は9日（B+F=3+6）であり，総余裕日数は13－9＝4日です。Dを2日，Jを1日短縮すると，新たな最長経路はB→E→I→J（3+3+6+3＝15日）となり，Fが合流する結合点の最遅結合点時刻は12日（15－J=3），最早結合点時刻は変わらず9日のため，総余裕日数は12－9＝3日になります。よって4－3＝1日減少します（ア）。", "figure": "<svg viewBox=\"0 0 580 290\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:12px\"><defs><marker id=\"ar19b\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-w le\">F</text><text x=\"290\" y=\"188\" text-anchor=\"middle\">6</text><line x1=\"192\" y1=\"212\" x2=\"398\" y2=\"170\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"290\" y=\"222\" text-anchor=\"middle\">G</text><text x=\"290\" y=\"235\" text-anchor=\"middle\">4</text><path d=\"M 182 232 Q 350 270 516 176\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"345\" y=\"248\" text-anchor=\"middle\">H</text><text x=\"345\" y=\"261\" text-anchor=\"middle\">7</text><line x1=\"338\" y1=\"112\" x2=\"403\" y2=\"149\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"390\" y=\"117\" text-anchor=\"middle\">I</text><text x=\"390\" y=\"130\" text-anchor=\"middle\">6</text><line x1=\"424\" y1=\"160\" x2=\"516\" y2=\"160\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar19b)\"/><text x=\"470\" y=\"153\" text-anchor=\"middle\">J</text><text x=\"470\" y=\"175\" text-anchor=\"middle\">4</text><rect x=\"430\" y=\"15\" width=\"140\" height=\"55\" fill=\"none\" stroke=\"#94a3b8\"/><circle cx=\"452\" cy=\"42\" r=\"11\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"505\" y=\"35\" text-anchor=\"middle\" font-size=\"10\">作業名</text><text x=\"505\" y=\"53\" text-anchor=\"middle\" font-size=\"10\">所要日数</text><text x=\"20\" y=\"282\" font-size=\"12\">ア 1　　イ 2　　ウ 3　　エ 4</text></svg>"},{"id": "AM2-2024春-20", "year": "令和6年春", "section": "午前II", "q_num": 20, "q": "品質の定量的評価の指標のうち，ソフトウェアの保守性の評価指標になるものはどれか。", "choices": ["（最終成果物に含まれる誤りの件数）÷（最終成果物の量）", "（修正時間の合計）÷（修正件数）", "（変更が必要となるソースコードの行数）÷（移植するソースコードの行数）", "（利用者からの改良要求件数）÷（出荷後の経過月数）"], "answer": 1, "explanation": "ソフトウェアの保守性は，不具合を修正する際に要する時間や手間の少なさで評価されます。「修正時間の合計 ÷ 修正件数」は1件当たりの平均修正時間を表し，保守性（修正のしやすさ）を測る代表的な指標です。アは信頼性，ウは移植性，エは利用者満足度などに関する指標です。"},{"id": "AM2-2024春-21", "year": "令和6年春", "section": "午前II", "q_num": 21, "q": "ネットワークインタフェースカード（NIC）のチーミングの説明として，適切なものはどれか。", "choices": ["処理能力を超えるフレームを受信する可能性があるとき，一時的に送信の中断を要求し，受信バッファがあふれないようにする。", "接続相手のNICが対応している通信規格又は通信モードの違いを自動的に認識し，最適な速度で通信を行うようにする。", "ソフトウェアでNICをエミュレートし，1台のコンピュータに搭載している物理NICの数以上のネットワークインタフェースを使用できるようにする。", "一つのIPアドレスに複数のNICを割り当て，負荷分散，帯域の有効活用，耐障害性の向上などを図る。"], "answer": 3, "explanation": "NICのチーミング（ボンディング）は，一つのIPアドレスに複数の物理NICを割り当てて束ね，あたかも1つの論理インタフェースのように扱う技術です。これによって負荷分散，帯域の有効活用，一部のNICが故障しても通信を継続できる耐障害性の向上などが図れます。ア：フロー制御，イ：オートネゴシエーション，ウ：NICの仮想化の説明に当たります。"},{"id": "AM2-2024春-22", "year": "令和6年春", "section": "午前II", "q_num": 22, "q": "クライアントサーバシステムの3層アーキテクチャを説明したものはどれか。", "choices": ["アプリケーションに必要なGUIとAPIをプレゼンテーション層とファンクション層に分離したアーキテクチャであり，データベースサーバを独立させている。", "プレゼンテーション層，ファンクション層，データ層に分離したアーキテクチャであり，各層のOSは異なってもよい。", "プレゼンテーション層とデータ層をミドルウェア層によって連結したアーキテクチャであり，各層をネットワークで接続したコンピュータに分散できる。", "プレゼンテーション層とファンクション層を結合し，データ層を分離したアーキテクチャであり，データベースサーバを効率的に運用できる。"], "answer": 1, "explanation": "3層アーキテクチャは，画面表示を担うプレゼンテーション層，業務処理を担うファンクション（ビジネスロジック）層，データ管理を担うデータ層の三つに分離した構成です。各層は独立したコンピュータ上に構築できるため，それぞれ異なるOSを用いることも可能です。"},{"id": "AM2-2024春-23", "year": "令和6年春", "section": "午前II", "q_num": 23, "q": "機械学習を用いたビッグデータ分析において使用されるJupyterLabの説明はどれか。", "choices": ["定期的に実行するタスクを制御するための，タスク管理ツールである。", "データ分析を行う際に使用する，対話型の開発環境である。", "並列分散処理を行うバッチシステムである。", "マスターノードをもたない分散データベースシステムである。"], "answer": 1, "explanation": "JupyterLabは，プログラムのコード，実行結果，グラフ，説明文（ドキュメント）などを一つのノートブック上にまとめ，対話的に確認しながらデータ分析や機械学習のプログラムを開発できる対話型の開発環境です。"},{"id": "AM2-2024春-24", "year": "令和6年春", "section": "午前II", "q_num": 24, "q": "インターネット上やイントラネット上でのファイル共有サービスなどで用いられ，HTTPを拡張して，ファイルやフォルダの参照，作成，削除，属性変更などを可能にする仕組みはどれか。", "choices": ["iSCSI", "NFS", "WebDAV", "WebRTC"], "answer": 2, "explanation": "WebDAV（Web-based Distributed Authoring and Versioning）は，HTTPを拡張したプロトコルであり，Webサーバ上のファイルやフォルダの参照・作成・削除・属性（プロパティ）の変更などをリモートから行えるようにする仕組みです。インターネットやイントラネット上のファイル共有サービスなどで利用されます。"},{"id": "AM2-2024春-25", "year": "令和6年春", "section": "午前II", "q_num": 25, "q": "NFTの説明として，適切なものはどれか。", "choices": ["アーティストによってWeb上で発表され，パブリックドメインに置かれる絵画・音楽などのデジタルアートの総称", "芸術作品や貴金属などの売買において，正当な取引であることを記録するために暗号資産を支払の手段とすること", "ブロックチェーン技術を用いて一意性が付与されることによって，代替不可能なことが担保されたデジタルデータ", "メタバースやオンラインゲームなどの仮想空間において，代用貨幣を用いて利用者がアイテムなどを売買すること"], "answer": 2, "explanation": "NFT（Non-Fungible Token：非代替性トークン）は，ブロックチェーン技術を用いて一意性（唯一性）を証明するトークンを発行することで，デジタルデータに代替不可能な価値（証明）を持たせる仕組みです。デジタルアートや収集品などの真正性・所有権の証明に利用されます。"}];

// =====================================================
// State
// =====================================================
let state = {
  screen: 'home',     // home | quiz | result | review
  mode: null,         // 'all' | 'AM1' | 'AM2' | 'wrong'
  queue: [],
  idx: 0,
  answered: false,
  chosen: null,
  log: [],            // { id, correct, chosen }
  stats: loadStats()
};

function loadStats() {
  try { return JSON.parse(localStorage.getItem('itsm_stats')) || { total: 0, correct: 0, history: [] }; }
  catch { return { total: 0, correct: 0, history: [] }; }
}
function saveStats() {
  localStorage.setItem('itsm_stats', JSON.stringify(state.stats));
}

// =====================================================
// Render
// =====================================================
function render() {
  const app = document.getElementById('app');
  const pw = document.getElementById('progress-wrap');
  const hs = document.getElementById('header-stats');
  pw.style.display = 'none';
  hs.textContent = '';

  if (state.screen === 'home')   { app.innerHTML = renderHome(); }
  if (state.screen === 'quiz')   { app.innerHTML = renderQuiz(); pw.style.display = 'block'; updateProgress(); }
  if (state.screen === 'result') { app.innerHTML = renderResult(); }
  if (state.screen === 'review') { app.innerHTML = renderReview(); }

  attachEvents();
}

function renderHome() {
  const s = state.stats;
  const pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
  const wrongIds = getWrongIds();
  return `
    <div class="home">
      <div>
        <div class="home-badge">IPA // IT Service Manager</div>
        <h1 style="margin-top:16px">午前<span>過去問</span><br>トレーニング</h1>
        <p class="home-desc" style="margin-top:12px">午前I（応用情報レベル四択）・午前II（専門四択）<br>を繰り返し解いて合格力を鍛える</p>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${s.total}</div>
          <div class="stat-label">累計回答数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:${pct>=60?'var(--correct)':'var(--wrong)'}">${pct}<span style="font-size:18px;color:var(--muted)">%</span></div>
          <div class="stat-label">正解率</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--wrong)">${wrongIds.length}</div>
          <div class="stat-label">苦手問題数</div>
        </div>
      </div>
      <div class="mode-grid">
        <div class="mode-card" data-action="start" data-mode="all">
          <div class="mode-icon">📋</div>
          <div class="mode-name">全問ランダム</div>
          <div class="mode-desc">午前I・IIをシャッフルして出題</div>
          <div class="mode-count">${QUESTIONS.length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM1">
          <div class="mode-icon">📘</div>
          <div class="mode-name">午前Ⅰのみ</div>
          <div class="mode-desc">応用情報レベルの四択問題</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前I').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM2">
          <div class="mode-icon">📗</div>
          <div class="mode-name">午前Ⅱのみ</div>
          <div class="mode-desc">ITサービスマネージャー専門</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前II').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="wrong" ${wrongIds.length===0?'style="opacity:.4;pointer-events:none"':''}>
          <div class="mode-icon">🎯</div>
          <div class="mode-name">苦手問題</div>
          <div class="mode-desc">間違えた問題だけを集中練習</div>
          <div class="mode-count">${wrongIds.length} 問</div>
        </div>
      </div>
      ${s.total > 0 ? `<button class="btn btn-ghost" style="max-width:200px" data-action="review">📊 最後のセッションを見直す</button>` : ''}
    </div>`;
}

function renderQuiz() {
  const q = state.queue[state.idx];
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const feedbackClass = state.answered ? (state.chosen === q.answer ? 'ok' : 'ng') : '';

  let choicesHtml = q.choices.map((c, i) => {
    let cls = '';
    if (state.answered) {
      if (i === q.answer) cls = 'correct';
      else if (i === state.chosen) cls = 'wrong';
    }
    return `<button class="choice-btn ${cls}" data-action="answer" data-idx="${i}" ${state.answered ? 'disabled' : ''}>
      <span class="choice-key">${keys[i]}</span>
      <span>${c.replace(/^[ア-エ]\. /, '')}</span>
    </button>`;
  }).join('');

  const feedbackHtml = state.answered ? `
    <div class="feedback show">
      <div class="feedback-header ${feedbackClass}">
        <span class="feedback-dot ${feedbackClass}"></span>
        ${state.chosen === q.answer ? '正解！' : '不正解'}
      </div>
      <div class="feedback-answer">正解：<strong>${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</strong></div>
      <div class="feedback-body">${q.explanation}</div>
    </div>` : `<div class="feedback"></div>`;

  const nextLabel = state.idx < state.queue.length - 1 ? '次の問題 →' : '結果を見る';

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:4px">
      <button class="btn btn-ghost" style="flex:none;padding:8px 14px;font-size:13px" data-action="home">✕ 中断</button>
    </div>
    <div class="q-meta">
      <span class="tag">${q.section}</span>
      <span class="tag">${q.year} 問${q.q_num}</span>
      <span class="q-num">${state.idx + 1} / ${state.queue.length}</span>
    </div>
    <div class="q-card">
      <div class="q-text">${q.q}</div>
      ${q.figure ? `<div class="q-figure">${q.figure}</div>` : ''}
    </div>
    <div class="choices">${choicesHtml}</div>
    ${feedbackHtml}
    ${state.answered ? `<div class="btn-row"><button class="btn btn-primary" data-action="next">${nextLabel}</button></div>` : ''}
  `;
}

function renderResult() {
  const total = state.log.length;
  const correct = state.log.filter(l => l.correct).length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 60;
  return `
    <div class="result">
      <div>
        <div class="result-score" style="color:${pass?'var(--correct)':'var(--wrong)'}">${pct}<span>%</span></div>
        <div class="result-label">${correct} 問正解 / ${total} 問中</div>
      </div>
      <div class="result-grade ${pass?'pass':'fail'}">${pass ? '🎉 合格ライン達成！' : '📚 もう一息！ 60% 目標'}</div>
      <div class="result-detail">
        累計: ${state.stats.total} 問 ／ 通算正解率: ${state.stats.total>0 ? Math.round(state.stats.correct/state.stats.total*100) : 0}%
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" data-action="review">解答を見直す</button>
        <button class="btn btn-ghost" data-action="home">ホームへ戻る</button>
      </div>
    </div>`;
}

function renderReview() {
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const items = state.log.map(l => {
    const q = QUESTIONS.find(q => q.id === l.id);
    const ok = l.correct;
    return `<div class="review-item ${ok?'ok':'ng'}">
      <div class="review-q"><span class="tag" style="font-size:10px;padding:2px 8px;margin-bottom:8px;display:inline-block">${q.section} ${q.year} 問${q.q_num}</span><br>${q.q}</div>
      <div class="review-ans">
        あなたの回答: <span class="${ok?'ok':'ng'}">${keys[l.chosen]}（${q.choices[l.chosen].replace(/^[ア-エ]\. /,'')}）</span>
        ${!ok ? `　正解: <span class="ok">${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</span>` : ''}
      </div>
      ${!ok ? `<div class="feedback-body" style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7">${q.explanation}</div>` : ''}
    </div>`;
  }).join('');
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h2 style="font-size:16px;font-weight:700">解答一覧</h2>
      <button class="btn btn-ghost" style="flex:none;padding:8px 16px;font-size:13px" data-action="home">← ホーム</button>
    </div>
    <div class="review-list">${items}</div>`;
}

// =====================================================
// Events
// =====================================================
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === 'start') {
    startQuiz(el.dataset.mode);
  } else if (action === 'answer') {
    if (state.answered) return;
    const idx = parseInt(el.dataset.idx);
    answer(idx);
  } else if (action === 'next') {
    nextQuestion();
  } else if (action === 'result') {
    state.screen = 'result';
    render();
  } else if (action === 'review') {
    state.screen = 'review';
    render();
  } else if (action === 'home') {
    state.screen = 'home';
    render();
  }
}

// =====================================================
// Logic
// =====================================================
function startQuiz(mode) {
  let pool = QUESTIONS;
  if (mode === 'AM1') pool = QUESTIONS.filter(q => q.section === '午前I');
  if (mode === 'AM2') pool = QUESTIONS.filter(q => q.section === '午前II');
  if (mode === 'wrong') pool = QUESTIONS.filter(q => getWrongIds().includes(q.id));
  state.queue = shuffle([...pool]);
  state.idx = 0;
  state.answered = false;
  state.chosen = null;
  state.log = [];
  state.mode = mode;
  state.screen = 'quiz';
  render();
}

function answer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.answer;
  state.answered = true;
  state.chosen = chosen;
  state.log.push({ id: q.id, correct, chosen });
  state.stats.total++;
  if (correct) state.stats.correct++;
  // track wrong answers per question
  let wrong = {};
  try { wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}'); } catch {}
  if (!correct) wrong[q.id] = (wrong[q.id] || 0) + 1;
  else delete wrong[q.id];
  localStorage.setItem('itsm_wrong', JSON.stringify(wrong));
  saveStats();
  render();
}

function nextQuestion() {
  if (state.idx < state.queue.length - 1) {
    state.idx++;
    state.answered = false;
    state.chosen = null;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function updateProgress() {
  const pct = ((state.idx + (state.answered ? 1 : 0)) / state.queue.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-stats').textContent = `${state.idx + 1}/${state.queue.length}`;
}

function getWrongIds() {
  try {
    const wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}');
    return Object.keys(wrong);
  } catch { return []; }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =====================================================
// Boot
// =====================================================
render();
</script>

</html>
