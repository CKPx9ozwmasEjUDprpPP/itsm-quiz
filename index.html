<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ITサービスマネージャー 過去問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f1923;
  --surface:  #1a2535;
  --surface2: #223044;
  --accent:   #38bdf8;
  --accent2:  #0ea5e9;
  --correct:  #22c55e;
  --wrong:    #ef4444;
  --text:     #e2eaf5;
  --muted:    #7a9ab8;
  --border:   rgba(56,189,248,0.15);
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans JP', sans-serif;
  --radius:   14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 680px;
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.header-stats {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}

/* ── Progress bar ── */
.progress-wrap {
  width: 100%;
  max-width: 680px;
  padding: 12px 20px 0;
}
.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ── Main card ── */
.main {
  width: 100%;
  max-width: 680px;
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Home screen ── */
.home {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  text-align: center;
  padding: 40px 0;
}
.home-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(56,189,248,.1);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 99px;
  letter-spacing: .1em;
}
.home h1 {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -.01em;
}
.home h1 span { color: var(--accent); }
.home-desc {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  max-width: 420px;
}
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 460px;
}
.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
  text-align: left;
}
.mode-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
.mode-card:active { transform: translateY(0); }
.q-figure { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); overflow-x: auto; background: #1a2535; border-radius: 8px; padding: 12px; }
.q-figure svg { max-width: 100%; height: auto; }
.q-figure svg text { fill: #cbd5e1; }
.q-figure svg line, .q-figure svg path, .q-figure svg ellipse, .q-figure svg circle, .q-figure svg rect { stroke: #64748b; }
.q-figure svg rect[fill='none'], .q-figure svg ellipse[fill='none'], .q-figure svg circle[fill='none'] { fill: none; }
.mode-icon { font-size: 24px; margin-bottom: 10px; }
.mode-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.mode-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-top: 10px;
}
.stats-row {
  display: flex;
  gap: 20px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 24px;
  text-align: center;
  flex: 1;
}
.stat-num { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Question card ── */
.q-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--accent);
  background: rgba(56,189,248,.07);
  letter-spacing: .05em;
}
.q-num { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.q-text {
  font-size: 16px;
  line-height: 1.85;
  font-weight: 500;
  white-space: pre-wrap;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  line-height: 1.65;
  transition: border-color .2s, background .2s, transform .1s;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); transform: translateX(3px); }
.choice-btn:active:not(:disabled) { transform: translateX(0); }
.choice-btn:disabled { cursor: default; }
.choice-key {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
  width: 20px;
}
.choice-btn.correct { border-color: var(--correct); background: rgba(34,197,94,.1); }
.choice-btn.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,.1); }
.choice-btn.correct .choice-key { color: var(--correct); }
.choice-btn.wrong   .choice-key { color: var(--wrong); }

/* ── Feedback ── */
.feedback {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: fadeUp .3s ease;
}
.feedback.show { display: flex; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
}
.feedback-header.ok  { color: var(--correct); }
.feedback-header.ng  { color: var(--wrong); }
.feedback-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.feedback-dot.ok { background: var(--correct); }
.feedback-dot.ng { background: var(--wrong); }
.feedback-body { font-size: 13px; color: var(--muted); line-height: 1.8; }
.feedback-answer { font-size: 13px; color: var(--text); margin-top: 4px; }
.feedback-answer strong { color: var(--accent); }

/* ── Next button ── */
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 15px;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: opacity .2s, transform .1s;
  letter-spacing: .02em;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #0f1923; }
.btn-primary:hover { opacity: .9; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Result screen ── */
.result {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  text-align: center;
  padding: 40px 0;
}
.result-score {
  font-family: var(--mono);
  font-size: 72px;
  font-weight: 600;
  line-height: 1;
}
.result-score span { font-size: 32px; color: var(--muted); }
.result-label { font-size: 15px; color: var(--muted); margin-top: 8px; }
.result-grade {
  font-size: 18px;
  font-weight: 700;
  padding: 8px 24px;
  border-radius: 99px;
}
.result-grade.pass { background: rgba(34,197,94,.15); color: var(--correct); border: 1px solid rgba(34,197,94,.3); }
.result-grade.fail { background: rgba(239,68,68,.1); color: var(--wrong); border: 1px solid rgba(239,68,68,.2); }
.result-detail { color: var(--muted); font-size: 14px; line-height: 1.8; }
.result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }

/* ── Review ── */
.review-list { display: flex; flex-direction: column; gap: 16px; }
.review-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  border-left: 3px solid var(--border);
}
.review-item.ok { border-left-color: var(--correct); }
.review-item.ng { border-left-color: var(--wrong); }
.review-q { font-size: 13px; line-height: 1.7; margin-bottom: 10px; white-space: pre-wrap; }
.review-ans { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.review-ans .ok { color: var(--correct); }
.review-ans .ng { color: var(--wrong); }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

@media (max-width: 480px) {
  .mode-grid { grid-template-columns: 1fr; }
  .stats-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">ITSM // 過去問</span>
  <span class="header-stats" id="header-stats"></span>
</div>
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="main" id="app"></div>

<script>
// =====================================================
// 問題データ（午前I・午前II サンプル）
// questions.json を読み込む形に後で差し替え可能
// =====================================================
const QUESTIONS = [{"id":"AM1-2024-01","year":"2024年春","section":"午前I","q_num":1,"q":"ITサービスマネジメントにおいて、サービスデスクが提供すべき主要な機能はどれか。","choices":["システムの設計と開発","利用者からの問合せや障害の一次受付","サーバのハードウェア保守","セキュリティポリシーの策定"],"answer":1,"explanation":"サービスデスクはITILにおける「サービスオペレーション」の主要機能であり、利用者からの問合せ・インシデントの一次受付（シングルポイントオブコンタクト）を担います。"},{"id":"AM1-2024-02","year":"2024年春","section":"午前I","q_num":2,"q":"ITIL 4 において、サービス価値システム（SVS）の構成要素として正しいものはどれか。","choices":["サービスポートフォリオ・サービスカタログ・サービスパイプライン","ガバナンス・サービス価値連鎖・継続的改善","インシデント管理・問題管理・変更管理","可用性管理・容量管理・IT サービス継続性管理"],"answer":1,"explanation":"ITIL 4 のSVSは「指導原則・ガバナンス・サービス価値連鎖・プラクティス・継続的改善」の5要素で構成されます。"},{"id":"AM2-2025春-01","year":"2025年春","section":"午前II","q_num":1,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，組織は，サービスのライフサイクルに関与する他の関係者の評価及び選定のための基準を設定し，適用しなくてはならない。ここでいう「他の関係者」に該当する利害関係者の組みはどれか。","choices":["外部供給者，外部顧客，利用者","外部供給者，供給者として行動する顧客，内部供給者","外部顧客，供給者として行動する顧客，内部顧客","内部供給者，内部顧客，利用者"],"answer":1,"explanation":"JIS Q 20000-1:2020では，「他の関係者」とは外部供給者，供給者として行動する顧客（自組織のSMSのプロセスを運用する顧客），内部供給者を指します。外部顧客や利用者はサービスの受益者として区別されています。"},{"id":"AM2-2025春-02","year":"2025年春","section":"午前II","q_num":2,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）において，「力量」に関する組織への要求事項として規定されているものはどれか。","choices":["SMS及びサービスに必要な資源が利用可能であることを確実にすることによって，SMSに関するトップマネジメントのリーダーシップ及びコミットメントを実証する。","他の関係者が運用する，組織のSMSのプロセスを決定し，サービスの要求事項を満たすため，他の関係者が運用するSMSの範囲内のプロセスを統合する。","適切な教育，訓練又は経験に基づいて，SMS及びサービスのパフォーマンス及び有効性に影響を与える業務を組織の管理下で行う人々が力量を備えていることを確実にする。","プロセスが計画どおりに実施されたという確信をもつために必要な程度の，文書化した情報を保持する。"],"answer":2,"explanation":"JIS Q 20000-1:2020の「力量」要求事項（7.2節）は，SMSやサービスに影響を与える業務を行う人々が，適切な教育・訓練・経験に基づき必要な力量を備えていることを確実にすることを求めています。"},{"id":"AM2-2025春-03","year":"2025年春","section":"午前II","q_num":3,"q":"JIS Q 20000-2:2023（サービスマネジメントシステムの適用の手引）によれば，SLAに関する説明のうち，最も適切なものはどれか。","choices":["SLAでは，顧客の責任は規定せずに，サービス提供者の責任を規定する。","SLAにおいて設定する目標は，サービス提供者の視点でできるだけ多く定義する。","単一のSLAが，複数のサービス又は複数の顧客を対象とすることがある。","利用するサービスに関する情報は，サービスカタログに収録されている情報についても，必ずSLAに記載する。"],"answer":2,"explanation":"SLAは1つの文書で複数のサービスや複数の顧客をカバーするマルチレベルSLAの形態をとることがあります。顧客の責任も規定でき，目標は双方合意で設定し，サービスカタログの情報をSLAへ重複記載する必要はありません。"},{"id":"AM2-2025春-04","year":"2025年春","section":"午前II","q_num":4,"q":"ITIL4によれば，サービス・カタログ管理プラクティスの目的として，適切なものはどれか。","choices":["高品質な製品及びサービスが円滑に提供されるように，組織のサプライヤ及びそのパフォーマンスを適切に管理することを確実にする。","顧客及びユーザのニーズを満たすために，サービスが合意されたレベルの可用性を確実に提供する。","サービス及びサービス・コンポーネントを体系的に監視し，イベントとして識別された状態の変更を選別して記録及び報告する。","全てのサービスとサービス提供に関する一貫した情報を一元管理し，その情報を関連する対象者が利用できるようにする。"],"answer":3,"explanation":"ITIL4のサービス・カタログ管理プラクティスの目的は，全てのサービスとサービス提供に関する一貫した情報源を提供し，関係者が必要な情報を利用できるようにすることです。"},{"id":"AM2-2025春-05","year":"2025年春","section":"午前II","q_num":5,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，「リスク及び機会への取組み」において，サービスマネジメントシステムの計画を策定するとき，組織は，取り組む必要があるリスク及び機会を決定しなければならない。リスク及び機会を決定する目的として，適切なものはどれか。","choices":["サービスマネジメントシステム及びサービスに必要な資源が利用可能であることを確実にする。","サービスマネジメントシステムが，その意図した成果を達成できるという確信を与える。","サービスマネジメント方針と整合するサービスマネジメントの目的を確立する。","設定されたパフォーマンス基準に従ってプロセスの管理を実施する。"],"answer":1,"explanation":"JIS Q 20000-1:2020の6.1節では，SMSが意図した成果を達成できるという確信を与えること，望ましくない影響を防止・低減すること，継続的改善を達成することを目的としてリスク及び機会を決定することを求めています。"},{"id":"AM2-2025春-06","year":"2025年春","section":"午前II","q_num":6,"q":"図は，あるプロジェクトにおける，旧システムから新システムへの切替え移行作業の流れ図である。次の条件で作業を遂行する場合，移行開始から移行終了までの所要時間は最短で何時間か。\n\n〔条件〕\n・作業者は3人とし，一つの作業は1人が担当する。\n・並行して実施できる作業は同時に進める。\n・各作業者は，作業と作業との間のどこかで最低1回，連続1時間以上の休憩を取る。","choices":["6.5","7.0","7.5","8.5"],"answer":2,"figure":"<svg viewBox=\"0 0 520 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar6\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></marker></defs><rect x=\"360\" y=\"8\" width=\"150\" height=\"52\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1\"/><text x=\"435\" y=\"23\" text-anchor=\"middle\" font-weight=\"bold\">凡例</text><rect x=\"370\" y=\"28\" width=\"130\" height=\"26\ dle\">【旧システム】</text><text x=\"300\" y=\"158\" text-anchor=\"middle\">取引データ</text><text x=\"300\" y=\"171\" text-anchor=\"middle\">抽出 2.5時間</text><line x1=\"50\" y1=\"180\" x2=\"50\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"170\" y1=\"180\" x2=\"170\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"300\" y1=\"180\" x2=\"300\" y2=\"200\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"5\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"50\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"50\" y=\"228\" text-anchor=\"middle\">利用者IDデータ</text><text x=\"50\" y=\"241\" text-anchor=\"middle\">登録 4.0時間</text><rect x=\"125\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"170\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"170\" y=\"228\" text-anchor=\"middle\">マスターデータ</text><text x=\"170\" y=\"241\" text-anchor=\"middle\">登録 3.5時間</text><rect x=\"255\" y=\"200\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"300\" y=\"215\" text-anchor=\"middle\">【新システム】</text><text x=\"300\" y=\"228\" text-anchor=\"middle\">取引データ</text><text x=\"300\" y=\"241\" text-anchor=\"middle\">登録 3.0時間</text><line x1=\"50\" y1=\"250\" x2=\"50\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"170\" y1=\"250\" x2=\"170\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"300\" y1=\"250\" x2=\"300\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"265\" x2=\"300\" y2=\"265\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"265\" x2=\"110\" y2=\"280\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"240\" y1=\"265\" x2=\"240\" y2=\"280\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"60\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"110\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"110\" y=\"308\" text-anchor=\"middle\">動作確認① 0.5時間</text><rect x=\"190\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"240\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"240\" y=\"308\" text-anchor=\"middle\">動作確認② 0.5時間</text><line x1=\"110\" y1=\"318\" x2=\"110\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"240\" y1=\"318\" x2=\"240\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"335\" x2=\"240\" y2=\"335\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"175\" y1=\"335\" x2=\"175\" y2=\"350\" stroke=\"#94a3b8\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><ellipse cx=\"175\" cy=\"368\" rx=\"58\" ry=\"16\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><text x=\"175\" y=\"372\" text-anchor=\"middle\">移行終了</text><text x=\"10\" y=\"395\" font-size=\"12\">ア 6.5　　イ 7.0　　ウ 7.5　　エ 8.5</text></svg>","explanation":"クリティカルパスは「オンライン停止(0.5)→取引データ抽出(2.5)→取引データ登録(3.0)→動作確認②(0.5)」で合計6.5時間。各作業者は最低1時間の休憩が必要なため+1時間。最短は7.5時間（ウ）。"},{"id":"AM2-2025春-07","year":"2025年春","section":"午前II","q_num":7,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，サービスマネジメントにおける「リリース及び展開管理」に対する要求事項のうち，適切なものはどれか。","choices":["稼働環境へのリリースの展開後，影響を受けたCIのベースラインをとる。","顧客は，業務への影響を考慮して，緊急リリースを含むリリースの種類及び頻度を定義する。","リリースの成功又は失敗の分析から導き出された結果及び結論は記録し，改善の機会を特定するためにレビューする。","リリースは，文書化した受入れ基準に基づいて検証し，正しく展開されたことを確認した後に承認する。"],"answer":2,"explanation":"JIS Q 20000-1:2020では，リリースの成功・失敗の分析結果を記録し改善機会特定のためにレビューすることが要求されています。ア：ベースラインは展開前，イ：リリースの種類・頻度は組織が定義，エ：承認は展開前に行います。"},{"id":"AM2-2025春-08","year":"2025年春","section":"午前II","q_num":8,"q":"目標復旧時間（RTO）を24時間に定めているのはどれか。","choices":["アプリケーションソフトウェアのリリースを展開するための中断時間を，24時間以内とする。","インシデントの解決後，その原因となった問題を24時間以内に解決させる。","業務データを，障害発生時点の24時間前以降の状態に復旧させる。","中断したITサービスを24時間以内に復旧させる。"],"answer":3,"explanation":"RTO（Recovery Time Objective：目標復旧時間）とは，サービス中断から復旧までの目標時間です。「中断したITサービスを24時間以内に復旧させる」がRTOの定義に合致します。ウはRPO（目標復旧時点）の説明です。"},{"id":"AM2-2025春-09","year":"2025年春","section":"午前II","q_num":9,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，パフォーマンス評価の一つである「マネジメントレビュー」の要求事項のうち，適切なものはどれか。","choices":["SLAには，サービスレベル目標，作業負荷の限度及び例外を含めなければならない。","アウトプットには，継続的改善の機会に関する決定を含まなければならない。","改善の機会に対して適用する評価基準には，改善とサービスマネジメントの目的との整合性が含まれなければならない。","既存のサービス，新規サービス及びサービス変更に対するサービスの要求事項を決定し，文書化しなければならない。"],"answer":1,"explanation":"マネジメントレビューのアウトプットには，継続的改善の機会に関する決定，SMSやサービスの変更の必要性，必要な資源が含まれなければなりません。"},{"id":"AM2-2025春-10","year":"2025年春","section":"午前II","q_num":10,"q":"バックアップサイトを用いたサービス復旧方法の説明のうち，ウォームスタンバイの説明として，最も適切なものはどれか。","choices":["同じようなシステムを運用する外部の企業や組織と協定を結び，緊急時には互いのシステムを貸し借りして，サービスを復旧させる。","緊急時にはバックアップシステムを持ち込んでシステムを再開し，サービスを復旧させる。","常にデータの同期が取れているバックアップシステムを用意しておき，緊急時にはバックアップシステムに切り替えて直ちにサービスを復旧させる。","バックアップシステムを起動しておき，緊急時にはバックアップシステムに切り替えて，データを最新状態にする処理を行った後にサービスを復旧させる。"],"answer":3,"explanation":"ウォームスタンバイは，バックアップシステムを起動した状態で待機させ，緊急時に切り替え後データを最新化してからサービスを復旧する方法です。ア：相互利用協定，イ：コールドスタンバイ，ウ：ホットスタンバイの説明です。"},{"id":"AM2-2025春-11","year":"2025年春","section":"午前II","q_num":11,"q":"ヒューマンエラーに起因する運用作業ミスの防止対策の一つに，エラープルーフ化がある。〔磁気テープ交換作業のミス〕に対する再発防止策のうち，エラープルーフ化の五つの原理（排除，代替化，容易化，異常検出，影響緩和）の「排除」に該当するものはどれか。\n\n〔磁気テープ交換作業のミス〕\nサーバの内蔵ディスクに記録されているデータを磁気テープにバックアップする作業において，磁気テープに書ききれなくなったことを示すメッセージがコンソールに表示された。この場合，未使用の磁気テープに交換した後にバックアップ作業を継続するのが正しい作業であるが，オペレーターが誤って既にほかのデータが記録されている磁気テープに交換して作業を継続したので，取得済みのデータが失われてしまった。","choices":["磁気テープに最初のデータを書き込む前に磁気情報をチェックし，データが記録された磁気テープであった場合はエラーメッセージを表示することによって，磁気テープの交換ミスに気付かせるようにする。","十分な記憶容量をもつ外部ディスク装置にバックアップ先を変更することによって，磁気テープへのバックアップ作業を不要にする。","既にデータが記録されている磁気テープに目印となるシールを貼っておくことによって，磁気テープの交換ミスを起こりにくくする。","データが記録された磁気テープを書込み禁止状態にしておくことによって，磁気テープの交換ミスをしてもバックアップデータが書き込めないようにする。"],"answer":1,"explanation":"「排除」とはミスが発生する原因そのものをなくすことです。磁気テープへのバックアップを外部ディスクに変更することで，磁気テープ交換作業自体が不要になりミスの原因が排除されます。ア：異常検出，ウ：容易化，エ：影響緩和に該当します。"},{"id":"AM2-2025春-12","year":"2025年春","section":"午前II","q_num":12,"q":"データセンターのファシリティマネジメントにおいて，設備機器に関わる，運転状況の監視と運転の制御，設備故障の監視，計測データの管理を行うものはどれか。","choices":["AIM（Automated Infrastructure Management）","BAS（Building Automation System）","CMDB（Configuration Management Database）","NEBS（Network Equipment Building Systems）"],"answer":1,"explanation":"BAS（ビルオートメーションシステム）は，空調・電源・照明などの設備機器の運転状況監視・制御，故障監視，計測データ管理を行うシステムです。"},{"id":"AM2-2025春-13","year":"2025年春","section":"午前II","q_num":13,"q":"サーバルームのように，散水による消火では甚大な水損が発生するおそれがある施設に設置される消火設備であって，二酸化炭素などを消火剤に用いて酸素濃度を下げて消火する設備はどれか。","choices":["泡消火設備","ハロゲン化物消火設備","不活性ガス消火設備","粉末消火設備"],"answer":2,"explanation":"不活性ガス消火設備は，二酸化炭素・窒素・アルゴンなどの不活性ガスを放出して酸素濃度を下げることで消火します。水損がなくサーバルームに適しています。"},{"id":"AM2-2025春-14","year":"2025年春","section":"午前II","q_num":14,"q":"金融庁「財務報告に係る内部統制の評価及び監査に関する実施基準（令和5年）」によれば，「記録した取引に漏れ，重複がないこと」は，組織目標を達成するためのITの統制目標のうち，どれに含まれるか。","choices":["可用性","機密性","準拠性","信頼性"],"answer":3,"explanation":"「記録した取引に漏れ，重複がないこと」はデータの完全性・正確性に関わり，財務報告の「信頼性」に含まれます。"},{"id":"AM2-2025春-15","year":"2025年春","section":"午前II","q_num":15,"q":"Webサーバでのシングルサインオンの実装方式に関する記述のうち，適切なものはどれか。","choices":["cookieを使ったシングルサインオンの場合，Webサーバごとの認証情報を含んだcookieをクライアントで生成し，各Webサーバ上で保存，管理する。","cookieを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，利用者認証においてパスワードの代わりにデジタル証明書を用いることができる。"],"answer":3,"explanation":"リバースプロキシ方式のSSOでは，プロキシが認証を一元管理するため，利用者認証にデジタル証明書を利用することが可能です。cookie方式では同一ドメイン内でcookieを共有します。"},{"id":"AM2-2025春-16","year":"2025年春","section":"午前II","q_num":16,"q":"JIS Q 0073:2010（リスクマネジメント一用語）におけるリスクマトリックスの定義はどれか。","choices":["結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段","結果とその起こりやすさの組合せとして表現される，リスク又は組み合わさったリスクの大きさ","組織に追求する又は保有する意思があるリスクの量及び種類","リスク全体を更に完全に理解することを進展させるために，幾つかのリスクを一つのリスクに組み合わせたもの"],"answer":0,"explanation":"JIS Q 0073:2010では，リスクマトリックスとは「結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段」と定義されています。イ：リスクレベル，ウ：リスク選好，エ：複合リスクの説明です。"},{"id":"AM2-2025春-17","year":"2025年春","section":"午前II","q_num":17,"q":"JIS Q 22301:2020が要求事項を規定している対象はどれか。","choices":["ITサービスマネジメントシステム","個人情報保護マネジメントシステム","事業継続マネジメントシステム","情報セキュリティマネジメントシステム"],"answer":2,"explanation":"JIS Q 22301は事業継続マネジメントシステム（BCMS）の要求事項を規定する規格です。ア：JIS Q 20000，イ：JIS Q 15001，エ：JIS Q 27001が対応します。"},{"id":"AM2-2025春-18","year":"2025年春","section":"午前II","q_num":18,"q":"プロジェクトマネジメントにおいて，プロジェクトスコープのクリープと呼ばれるものはどれか。","choices":["時間，コスト及び資源の調整が行われず，コントロールされていないプロジェクトスコープの変更","発生した場合に，プロジェクトの目標にプラス又はマイナスの影響を与えることがある潜在的な事象","プロジェクトの目標を達成するために完了する必要のある作業を表すための，階層的分割の枠組み","目標，成果物，要求事項及び境界を含むプロジェクトスコープを記述したもの"],"answer":0,"explanation":"スコープクリープとは，適切な変更管理プロセスを経ずに，時間・コスト・資源の調整なしにプロジェクトスコープが拡大していく現象です。イ：リスク，ウ：WBS，エ：スコープ記述書の説明です。"},{"id":"AM2-2025春-19","year":"2025年春","section":"午前II","q_num":19,"q":"プロジェクトのスケジュールを短縮したい。当初の計画は図1のとおりである。作業Eを作業E1，E2，E3に分けて，図2のとおりに計画を変更すると，スケジュールは全体で何日短縮できるか。","choices":["1","2","3","4"],"answer":0,"figure":"<svg viewBox=\"0 0 480 310\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar19\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/></marker></defs><text x=\"5\" y=\"14\" font-weight=\"bold\" font-size=\"12\">図1　当初の計画</text><circle cx=\"30\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"100\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"175\" cy=\"35\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"175\" cy=\"75\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"255\" cy=\"35\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"255\" cy=\"75\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><circle cx=\"330\" cy=\"55\" r=\"13\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/><line x1=\"43\"
