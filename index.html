<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ITサービスマネージャー 過去問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f1923;
  --surface:  #1a2535;
  --surface2: #223044;
  --accent:   #38bdf8;
  --accent2:  #0ea5e9;
  --correct:  #22c55e;
  --wrong:    #ef4444;
  --text:     #e2eaf5;
  --muted:    #7a9ab8;
  --border:   rgba(56,189,248,0.15);
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans JP', sans-serif;
  --radius:   14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 680px;
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-family: var(--mono);
}
.header-stats {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}

/* ── Progress bar ── */
.progress-wrap {
  width: 100%;
  max-width: 680px;
  padding: 12px 20px 0;
}
.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ── Main card ── */
.main {
  width: 100%;
  max-width: 680px;
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Home screen ── */
.home {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  text-align: center;
  padding: 40px 0;
}
.home-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(56,189,248,.1);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 99px;
  letter-spacing: .1em;
}
.home h1 {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -.01em;
}
.home h1 span { color: var(--accent); }
.home-desc {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  max-width: 420px;
}
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 460px;
}
.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
  text-align: left;
}
.mode-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
.mode-card:active { transform: translateY(0); }
.q-figure { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); overflow-x: auto; }
.q-figure svg { max-width: 100%; height: auto; }
.mode-icon { font-size: 24px; margin-bottom: 10px; }
.mode-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.mode-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  margin-top: 10px;
}
.stats-row {
  display: flex;
  gap: 20px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 24px;
  text-align: center;
  flex: 1;
}
.stat-num { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Question card ── */
.q-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.tag {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--accent);
  background: rgba(56,189,248,.07);
  letter-spacing: .05em;
}
.q-num { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.q-text {
  font-size: 16px;
  line-height: 1.85;
  font-weight: 500;
  white-space: pre-wrap;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  line-height: 1.65;
  transition: border-color .2s, background .2s, transform .1s;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); transform: translateX(3px); }
.choice-btn:active:not(:disabled) { transform: translateX(0); }
.choice-btn:disabled { cursor: default; }
.choice-key {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
  width: 20px;
}
.choice-btn.correct { border-color: var(--correct); background: rgba(34,197,94,.1); }
.choice-btn.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,.1); }
.choice-btn.correct .choice-key { color: var(--correct); }
.choice-btn.wrong   .choice-key { color: var(--wrong); }

/* ── Feedback ── */
.feedback {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: fadeUp .3s ease;
}
.feedback.show { display: flex; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
}
.feedback-header.ok  { color: var(--correct); }
.feedback-header.ng  { color: var(--wrong); }
.feedback-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.feedback-dot.ok { background: var(--correct); }
.feedback-dot.ng { background: var(--wrong); }
.feedback-body { font-size: 13px; color: var(--muted); line-height: 1.8; }
.feedback-answer { font-size: 13px; color: var(--text); margin-top: 4px; }
.feedback-answer strong { color: var(--accent); }

/* ── Next button ── */
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 15px;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: opacity .2s, transform .1s;
  letter-spacing: .02em;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #0f1923; }
.btn-primary:hover { opacity: .9; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Result screen ── */
.result {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  text-align: center;
  padding: 40px 0;
}
.result-score {
  font-family: var(--mono);
  font-size: 72px;
  font-weight: 600;
  line-height: 1;
}
.result-score span { font-size: 32px; color: var(--muted); }
.result-label { font-size: 15px; color: var(--muted); margin-top: 8px; }
.result-grade {
  font-size: 18px;
  font-weight: 700;
  padding: 8px 24px;
  border-radius: 99px;
}
.result-grade.pass { background: rgba(34,197,94,.15); color: var(--correct); border: 1px solid rgba(34,197,94,.3); }
.result-grade.fail { background: rgba(239,68,68,.1); color: var(--wrong); border: 1px solid rgba(239,68,68,.2); }
.result-detail { color: var(--muted); font-size: 14px; line-height: 1.8; }
.result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }

/* ── Review ── */
.review-list { display: flex; flex-direction: column; gap: 16px; }
.review-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  border-left: 3px solid var(--border);
}
.review-item.ok { border-left-color: var(--correct); }
.review-item.ng { border-left-color: var(--wrong); }
.review-q { font-size: 13px; line-height: 1.7; margin-bottom: 10px; white-space: pre-wrap; }
.review-ans { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.review-ans .ok { color: var(--correct); }
.review-ans .ng { color: var(--wrong); }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

@media (max-width: 480px) {
  .mode-grid { grid-template-columns: 1fr; }
  .stats-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">ITSM // 過去問</span>
  <span class="header-stats" id="header-stats"></span>
</div>
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="main" id="app"></div>

<script>
// =====================================================
// 問題データ（午前I・午前II サンプル）
// questions.json を読み込む形に後で差し替え可能
// =====================================================
const QUESTIONS = [{"id":"AM1-2024-01","year":"2024年春","section":"午前I","q_num":1,"q":"ITサービスマネジメントにおいて、サービスデスクが提供すべき主要な機能はどれか。","choices":["システムの設計と開発","利用者からの問合せや障害の一次受付","サーバのハードウェア保守","セキュリティポリシーの策定"],"answer":1,"explanation":"サービスデスクはITILにおける「サービスオペレーション」の主要機能であり、利用者からの問合せ・インシデントの一次受付（シングルポイントオブコンタクト）を担います。"},{"id":"AM1-2024-02","year":"2024年春","section":"午前I","q_num":2,"q":"ITIL 4 において、サービス価値システム（SVS）の構成要素として正しいものはどれか。","choices":["サービスポートフォリオ・サービスカタログ・サービスパイプライン","ガバナンス・サービス価値連鎖・継続的改善","インシデント管理・問題管理・変更管理","可用性管理・容量管理・IT サービス継続性管理"],"answer":1,"explanation":"ITIL 4 のSVSは「指導原則・ガバナンス・サービス価値連鎖・プラクティス・継続的改善」の5要素で構成されます。"},{"id":"AM2-2025春-01","year":"2025年春","section":"午前II","q_num":1,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，組織は，サービスのライフサイクルに関与する他の関係者の評価及び選定のための基準を設定し，適用しなくてはならない。ここでいう「他の関係者」に該当する利害関係者の組みはどれか。","choices":["外部供給者，外部顧客，利用者","外部供給者，供給者として行動する顧客，内部供給者","外部顧客，供給者として行動する顧客，内部顧客","内部供給者，内部顧客，利用者"],"answer":1,"explanation":"JIS Q 20000-1:2020では，「他の関係者」とは外部供給者，供給者として行動する顧客（自組織のSMSのプロセスを運用する顧客），内部供給者を指します。外部顧客や利用者はサービスの受益者として区別されています。"},{"id":"AM2-2025春-02","year":"2025年春","section":"午前II","q_num":2,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）において，「力量」に関する組織への要求事項として規定されているものはどれか。","choices":["SMS及びサービスに必要な資源が利用可能であることを確実にすることによって，SMSに関するトップマネジメントのリーダーシップ及びコミットメントを実証する。","他の関係者が運用する，組織のSMSのプロセスを決定し，サービスの要求事項を満たすため，他の関係者が運用するSMSの範囲内のプロセスを統合する。","適切な教育，訓練又は経験に基づいて，SMS及びサービスのパフォーマンス及び有効性に影響を与える業務を組織の管理下で行う人々が力量を備えていることを確実にする。","プロセスが計画どおりに実施されたという確信をもつために必要な程度の，文書化した情報を保持する。"],"answer":2,"explanation":"JIS Q 20000-1:2020の「力量」要求事項（7.2節）は，SMSやサービスに影響を与える業務を行う人々が，適切な教育・訓練・経験に基づき必要な力量を備えていることを確実にすることを求めています。"},{"id":"AM2-2025春-03","year":"2025年春","section":"午前II","q_num":3,"q":"JIS Q 20000-2:2023（サービスマネジメントシステムの適用の手引）によれば，SLAに関する説明のうち，最も適切なものはどれか。","choices":["SLAでは，顧客の責任は規定せずに，サービス提供者の責任を規定する。","SLAにおいて設定する目標は，サービス提供者の視点でできるだけ多く定義する。","単一のSLAが，複数のサービス又は複数の顧客を対象とすることがある。","利用するサービスに関する情報は，サービスカタログに収録されている情報についても，必ずSLAに記載する。"],"answer":2,"explanation":"SLAは1つの文書で複数のサービスや複数の顧客をカバーするマルチレベルSLAの形態をとることがあります。顧客の責任も規定でき，目標は双方合意で設定し，サービスカタログの情報をSLAへ重複記載する必要はありません。"},{"id":"AM2-2025春-04","year":"2025年春","section":"午前II","q_num":4,"q":"ITIL4によれば，サービス・カタログ管理プラクティスの目的として，適切なものはどれか。","choices":["高品質な製品及びサービスが円滑に提供されるように，組織のサプライヤ及びそのパフォーマンスを適切に管理することを確実にする。","顧客及びユーザのニーズを満たすために，サービスが合意されたレベルの可用性を確実に提供する。","サービス及びサービス・コンポーネントを体系的に監視し，イベントとして識別された状態の変更を選別して記録及び報告する。","全てのサービスとサービス提供に関する一貫した情報を一元管理し，その情報を関連する対象者が利用できるようにする。"],"answer":3,"explanation":"ITIL4のサービス・カタログ管理プラクティスの目的は，全てのサービスとサービス提供に関する一貫した情報源を提供し，関係者が必要な情報を利用できるようにすることです。"},{"id":"AM2-2025春-05","year":"2025年春","section":"午前II","q_num":5,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，「リスク及び機会への取組み」において，サービスマネジメントシステムの計画を策定するとき，組織は，取り組む必要があるリスク及び機会を決定しなければならない。リスク及び機会を決定する目的として，適切なものはどれか。","choices":["サービスマネジメントシステム及びサービスに必要な資源が利用可能であることを確実にする。","サービスマネジメントシステムが，その意図した成果を達成できるという確信を与える。","サービスマネジメント方針と整合するサービスマネジメントの目的を確立する。","設定されたパフォーマンス基準に従ってプロセスの管理を実施する。"],"answer":1,"explanation":"JIS Q 20000-1:2020の6.1節では，SMSが意図した成果を達成できるという確信を与えること，望ましくない影響を防止・低減すること，継続的改善を達成することを目的としてリスク及び機会を決定することを求めています。"},{"id":"AM2-2025春-06","year":"2025年春","section":"午前II","q_num":6,"q":"図は，あるプロジェクトにおける，旧システムから新システムへの切替え移行作業の流れ図である。次の条件で作業を遂行する場合，移行開始から移行終了までの所要時間は最短で何時間か。

〔条件〕
・作業者は3人とし，一つの作業は1人が担当する。
・並行して実施できる作業は同時に進める。
・各作業者は，作業と作業との間のどこかで最低1回，連続1時間以上の休憩を取る。","choices":["6.5","7.0","7.5","8.5"],"answer":2,"figure":"<svg viewBox=\"0 0 520 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar6\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/></marker></defs><rect x=\"360\" y=\"8\" width=\"150\" height=\"52\" fill=\"none\" stroke=\"#555\" stroke-width=\"1\"/><text x=\"435\" y=\"23\" text-anchor=\"middle\" font-weight=\"bold\">凡例</text><rect x=\"370\" y=\"28\" width=\"130\" height=\"26\" fill=\"none\" stroke=\"#555\" stroke-width=\"1\"/><text x=\"435\" y=\"38\" text-anchor=\"middle\" font-size=\"10\">【システム区分】作業名</text><text x=\"435\" y=\"50\" text-anchor=\"middle\" font-size=\"10\">作業時間</text><ellipse cx=\"170\" cy=\"28\" rx=\"58\" ry=\"16\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/><text x=\"170\" y=\"32\" text-anchor=\"middle\">移行開始</text><line x1=\"170\" y1=\"44\" x2=\"170\" y2=\"64\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"100\" y=\"64\" width=\"140\" height=\"40\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/><text x=\"170\" y=\"79\" text-anchor=\"middle\">【旧システム】</text><text x=\"170\" y=\"95\" text-anchor=\"middle\">オンライン停止 0.5時間</text><line x1=\"170\" y1=\"104\" x2=\"170\" y2=\"115\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"115\" x2=\"300\" y2=\"115\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"115\" x2=\"50\" y2=\"130\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"170\" y1=\"115\" x2=\"170\" y2=\"130\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"300\" y1=\"115\" x2=\"300\" y2=\"130\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"5\" y=\"130\" width=\"90\" height=\"50\" fill=\"none\" stroke=\"#555\" stroke-width=\"1 ine x1=\"50\" y1=\"250\" x2=\"50\" y2=\"265\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"170\" y1=\"250\" x2=\"170\" y2=\"265\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"300\" y1=\"250\" x2=\"300\" y2=\"265\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"265\" x2=\"300\" y2=\"265\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"265\" x2=\"110\" y2=\"280\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><line x1=\"240\" y1=\"265\" x2=\"240\" y2=\"280\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><rect x=\"60\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/><text x=\"110\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"110\" y=\"308\" text-anchor=\"middle\">動作確認① 0.5時間</text><rect x=\"190\" y=\"280\" width=\"100\" height=\"38\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/><text x=\"240\" y=\"295\" text-anchor=\"middle\">【新システム】</text><text x=\"240\" y=\"308\" text-anchor=\"middle\">動作確認② 0.5時間</text><line x1=\"110\" y1=\"318\" x2=\"110\" y2=\"335\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"240\" y1=\"318\" x2=\"240\" y2=\"335\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"110\" y1=\"335\" x2=\"240\" y2=\"335\" stroke=\"#555\" stroke-width=\"1.5\"/><line x1=\"175\" y1=\"335\" x2=\"175\" y2=\"350\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar6)\"/><ellipse cx=\"175\" cy=\"368\" rx=\"58\" ry=\"16\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/><text x=\"175\" y=\"372\" text-anchor=\"middle\">移行終了</text><text x=\"10\" y=\"395\" font-size=\"12\">ア 6.5　　イ 7.0　　ウ 7.5　　エ 8.5</text></svg>","explanation":"クリティカルパスは「オンライン停止(0.5)→取引データ抽出(2.5)→取引データ登録(3.0)→動作確認②(0.5)」で合計6.5時間。各作業者は最低1時間の休憩が必要なため+1時間。最短は7.5時間（ウ）。"},{"id":"AM2-2025春-07","year":"2025年春","section":"午前II","q_num":7,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，サービスマネジメントにおける「リリース及び展開管理」に対する要求事項のうち，適切なものはどれか。","choices":["稼働環境へのリリースの展開後，影響を受けたCIのベースラインをとる。","顧客は，業務への影響を考慮して，緊急リリースを含むリリースの種類及び頻度を定義する。","リリースの成功又は失敗の分析から導き出された結果及び結論は記録し，改善の機会を特定するためにレビューする。","リリースは，文書化した受入れ基準に基づいて検証し，正しく展開されたことを確認した後に承認する。"],"answer":2,"explanation":"JIS Q 20000-1:2020では，リリースの成功・失敗の分析結果を記録し改善機会特定のためにレビューすることが要求されています。ア：ベースラインは展開前，イ：リリースの種類・頻度は組織が定義，エ：承認は展開前に行います。"},{"id":"AM2-2025春-08","year":"2025年春","section":"午前II","q_num":8,"q":"目標復旧時間（RTO）を24時間に定めているのはどれか。","choices":["アプリケーションソフトウェアのリリースを展開するための中断時間を，24時間以内とする。","インシデントの解決後，その原因となった問題を24時間以内に解決させる。","業務データを，障害発生時点の24時間前以降の状態に復旧させる。","中断したITサービスを24時間以内に復旧させる。"],"answer":3,"explanation":"RTO（Recovery Time Objective：目標復旧時間）とは，サービス中断から復旧までの目標時間です。「中断したITサービスを24時間以内に復旧させる」がRTOの定義に合致します。ウはRPO（目標復旧時点）の説明です。"},{"id":"AM2-2025春-09","year":"2025年春","section":"午前II","q_num":9,"q":"JIS Q 20000-1:2020（サービスマネジメントシステム要求事項）によれば，パフォーマンス評価の一つである「マネジメントレビュー」の要求事項のうち，適切なものはどれか。","choices":["SLAには，サービスレベル目標，作業負荷の限度及び例外を含めなければならない。","アウトプットには，継続的改善の機会に関する決定を含まなければならない。","改善の機会に対して適用する評価基準には，改善とサービスマネジメントの目的との整合性が含まれなければならない。","既存のサービス，新規サービス及びサービス変更に対するサービスの要求事項を決定し，文書化しなければならない。"],"answer":1,"explanation":"マネジメントレビューのアウトプットには，継続的改善の機会に関する決定，SMSやサービスの変更の必要性，必要な資源が含まれなければなりません。"},{"id":"AM2-2025春-10","year":"2025年春","section":"午前II","q_num":10,"q":"バックアップサイトを用いたサービス復旧方法の説明のうち，ウォームスタンバイの説明として，最も適切なものはどれか。","choices":["同じようなシステムを運用する外部の企業や組織と協定を結び，緊急時には互いのシステムを貸し借りして，サービスを復旧させる。","緊急時にはバックアップシステムを持ち込んでシステムを再開し，サービスを復旧させる。","常にデータの同期が取れているバックアップシステムを用意しておき，緊急時にはバックアップシステムに切り替えて直ちにサービスを復旧させる。","バックアップシステムを起動しておき，緊急時にはバックアップシステムに切り替えて，データを最新状態にする処理を行った後にサービスを復旧させる。"],"answer":3,"explanation":"ウォームスタンバイは，バックアップシステムを起動した状態で待機させ，緊急時に切り替え後データを最新化してからサービスを復旧する方法です。ア：相互利用協定，イ：コールドスタンバイ，ウ：ホットスタンバイの説明です。"},{"id":"AM2-2025春-11","year":"2025年春","section":"午前II","q_num":11,"q":"ヒューマンエラーに起因する運用作業ミスの防止対策の一つに，エラープルーフ化がある。〔磁気テープ交換作業のミス〕に対する再発防止策のうち，エラープルーフ化の五つの原理（排除，代替化，容易化，異常検出，影響緩和）の「排除」に該当するものはどれか。

〔磁気テープ交換作業のミス〕
サーバの内蔵ディスクに記録されているデータを磁気テープにバックアップする作業において，磁気テープに書ききれなくなったことを示すメッセージがコンソールに表示された。この場合，未使用の磁気テープに交換した後にバックアップ作業を継続するのが正しい作業であるが，オペレーターが誤って既にほかのデータが記録されている磁気テープに交換して作業を継続したので，取得済みのデータが失われてしまった。","choices":["磁気テープに最初のデータを書き込む前に磁気情報をチェックし，データが記録された磁気テープであった場合はエラーメッセージを表示することによって，磁気テープの交換ミスに気付かせるようにする。","十分な記憶容量をもつ外部ディスク装置にバックアップ先を変更することによって，磁気テープへのバックアップ作業を不要にする。","既にデータが記録されている磁気テープに目印となるシールを貼っておくことによって，磁気テープの交換ミスを起こりにくくする。","データが記録された磁気テープを書込み禁止状態にしておくことによって，磁気テープの交換ミスをしてもバックアップデータが書き込めないようにする。"],"answer":1,"explanation":"「排除」とはミスが発生する原因そのものをなくすことです。磁気テープへのバックアップを外部ディスクに変更することで，磁気テープ交換作業自体が不要になりミスの原因が排除されます。ア：異常検出，ウ：容易化，エ：影響緩和に該当します。"},{"id":"AM2-2025春-12","year":"2025年春","section":"午前II","q_num":12,"q":"データセンターのファシリティマネジメントにおいて，設備機器に関わる，運転状況の監視と運転の制御，設備故障の監視，計測データの管理を行うものはどれか。","choices":["AIM（Automated Infrastructure Management）","BAS（Building Automation System）","CMDB（Configuration Management Database）","NEBS（Network Equipment Building Systems）"],"answer":1,"explanation":"BAS（ビルオートメーションシステム）は，空調・電源・照明などの設備機器の運転状況監視・制御，故障監視，計測データ管理を行うシステムです。"},{"id":"AM2-2025春-13","year":"2025年春","section":"午前II","q_num":13,"q":"サーバルームのように，散水による消火では甚大な水損が発生するおそれがある施設に設置される消火設備であって，二酸化炭素などを消火剤に用いて酸素濃度を下げて消火する設備はどれか。","choices":["泡消火設備","ハロゲン化物消火設備","不活性ガス消火設備","粉末消火設備"],"answer":2,"explanation":"不活性ガス消火設備は，二酸化炭素・窒素・アルゴンなどの不活性ガスを放出して酸素濃度を下げることで消火します。水損がなくサーバルームに適しています。"},{"id":"AM2-2025春-14","year":"2025年春","section":"午前II","q_num":14,"q":"金融庁「財務報告に係る内部統制の評価及び監査に関する実施基準（令和5年）」によれば，「記録した取引に漏れ，重複がないこと」は，組織目標を達成するためのITの統制目標のうち，どれに含まれるか。","choices":["可用性","機密性","準拠性","信頼性"],"answer":3,"explanation":"「記録した取引に漏れ，重複がないこと」はデータの完全性・正確性に関わり，財務報告の「信頼性」に含まれます。"},{"id":"AM2-2025春-15","year":"2025年春","section":"午前II","q_num":15,"q":"Webサーバでのシングルサインオンの実装方式に関する記述のうち，適切なものはどれか。","choices":["cookieを使ったシングルサインオンの場合，Webサーバごとの認証情報を含んだcookieをクライアントで生成し，各Webサーバ上で保存，管理する。","cookieを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，認証対象のWebサーバを，それぞれ異なるインターネットドメインに配置する必要がある。","リバースプロキシを使ったシングルサインオンの場合，利用者認証においてパスワードの代わりにデジタル証明書を用いることができる。"],"answer":3,"explanation":"リバースプロキシ方式のSSOでは，プロキシが認証を一元管理するため，利用者認証にデジタル証明書を利用することが可能です。cookie方式では同一ドメイン内でcookieを共有します。"},{"id":"AM2-2025春-16","year":"2025年春","section":"午前II","q_num":16,"q":"JIS Q 0073:2010（リスクマネジメント一用語）におけるリスクマトリックスの定義はどれか。","choices":["結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段","結果とその起こりやすさの組合せとして表現される，リスク又は組み合わさったリスクの大きさ","組織に追求する又は保有する意思があるリスクの量及び種類","リスク全体を更に完全に理解することを進展させるために，幾つかのリスクを一つのリスクに組み合わせたもの"],"answer":0,"explanation":"JIS Q 0073:2010では，リスクマトリックスとは「結果及び起こりやすさの範囲を明確化することによって，リスクの順位付けと表示を行う手段」と定義されています。イ：リスクレベル，ウ：リスク選好，エ：複合リスクの説明です。"},{"id":"AM2-2025春-17","year":"2025年春","section":"午前II","q_num":17,"q":"JIS Q 22301:2020が要求事項を規定している対象はどれか。","choices":["ITサービスマネジメントシステム","個人情報保護マネジメントシステム","事業継続マネジメントシステム","情報セキュリティマネジメントシステム"],"answer":2,"explanation":"JIS Q 22301は事業継続マネジメントシステム（BCMS）の要求事項を規定する規格です。ア：JIS Q 20000，イ：JIS Q 15001，エ：JIS Q 27001が対応します。"},{"id":"AM2-2025春-18","year":"2025年春","section":"午前II","q_num":18,"q":"プロジェクトマネジメントにおいて，プロジェクトスコープのクリープと呼ばれるものはどれか。","choices":["時間，コスト及び資源の調整が行われず，コントロールされていないプロジェクトスコープの変更","発生した場合に，プロジェクトの目標にプラス又はマイナスの影響を与えることがある潜在的な事象","プロジェクトの目標を達成するために完了する必要のある作業を表すための，階層的分割の枠組み","目標，成果物，要求事項及び境界を含むプロジェクトスコープを記述したもの"],"answer":0,"explanation":"スコープクリープとは，適切な変更管理プロセスを経ずに，時間・コスト・資源の調整なしにプロジェクトスコープが拡大していく現象です。イ：リスク，ウ：WBS，エ：スコープ記述書の説明です。"},{"id":"AM2-2025春-19","year":"2025年春","section":"午前II","q_num":19,"q":"プロジェクトのスケジュールを短縮したい。当初の計画は図1のとおりである。作業Eを作業E1，E2，E3に分けて，図2のとおりに計画を変更すると，スケジュールは全体で何日短縮できるか。","choices":["1","2","3","4"],"answer":0,"figure":"<svg viewBox=\"0 0 480 310\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:100%;font-family:sans-serif;font-size:11px\"><defs><marker id=\"ar19\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M1 1L9 5L1 9\" fill=\"none\" stroke=\"#555\" stroke-width=\"1.5\"/></marker></defs><text x=\"5\" y=\"14\" font-weight=\"bold\" font-size=\"12\" #ar19)\"/><text x=\"182\" y=\"221\" text-anchor=\"middle\">E3 2</text><line x1=\"215\" y1=\"183\" x2=\"162\" y2=\"202\" stroke=\"#555\" stroke-width=\"1.5\" stroke-dasharray=\"5 3\" marker-end=\"url(#ar19)\"/><text x=\"192\" y=\"197\" font-size=\"9\" text-anchor=\"middle\">ダミー</text><line x1=\"173\" y1=\"215\" x2=\"242\" y2=\"215\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar19)\"/><text x=\"207\" y=\"228\" text-anchor=\"middle\">F 5</text><line x1=\"267\" y1=\"180\" x2=\"318\" y2=\"190\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar19)\"/><text x=\"290\" y=\"178\" text-anchor=\"middle\">G 7</text><line x1=\"267\" y1=\"210\" x2=\"318\" y2=\"200\" stroke=\"#555\" stroke-width=\"1.5\" marker-end=\"url(#ar19)\"/><text x=\"290\" y=\"216\" text-anchor=\"middle\">H 4</text><text x=\"5\" y=\"280\" font-size=\"12\">ア 1　　イ 2　　ウ 3　　エ 4</text></svg>","explanation":"図1のクリティカルパスはA(5)→B(8)→E(9)→G(7)=29日。図2ではE1(3)→E2(4)でE相当=7日となりE経由が26日，ダミー考慮でもクリティカルパスは28日。29-28=1日の短縮（ア）。"},{"id":"AM2-2025春-20","year":"2025年春","section":"午前II","q_num":20,"q":"JIS Q 21500:2018（プロジェクトマネジメントの手引）によれば，プロセス「品質の計画」で行う活動はどれか。","choices":["成果物及びプロセスの品質を満たしそうなことを監視し，確定済みのツール，手順及び技法を用いて欠陥を発見する。","品質要求事項を満たすために達成する目標及び関連する規格が，適切なプロジェクト組織の構成員によって伝達され，理解され，受け入れられ，遵守されることを確実にする。","品質要求事項を満たすために必要なものとして確定した，ツール，手順，技法及び資源を使用することを確実にする。","プロジェクトの目標に基づいて，プロジェクトに適用する品質に関連する規格を満たすために必要なツール，手順，技法及び資源を確定する。"],"answer":3,"explanation":"「品質の計画」プロセスでは，プロジェクト目標に基づき，適用する品質規格を満たすために必要なツール・手順・技法・資源を確定する活動を行います。"},{"id":"AM2-2025春-21","year":"2025年春","section":"午前II","q_num":21,"q":"メモリインタリーブの説明として，適切なものはどれか。","choices":["外部記憶装置を利用して，主記憶の物理容量を超えるメモリ空間をプログラムから利用可能にする。","主記憶と磁気ディスク装置との間にバッファメモリを置いて，双方のアクセス速度の差を補う。","主記憶と入出力装置との間でCPUを介さずにデータ転送を行う。","主記憶を複数のバンクに分けて，CPUからのアクセス要求を並列的に処理できるようにする。"],"answer":3,"explanation":"メモリインタリーブは，主記憶を複数のバンクに分割し，CPUからのアクセスを各バンクに分散して並列処理することでメモリアクセスを高速化する技術です。ア：仮想記憶，イ：キャッシュメモリ，ウ：DMAの説明です。"},{"id":"AM2-2025春-22","year":"2025年春","section":"午前II","q_num":22,"q":"MTBFがx時間，MTTRがy時間のシステムがある。稼働環境が変わったので，MTBF，MTTRがともに従来の1.5倍になった。新しい稼働環境での稼働率はどうなるか。","choices":["x，yの値によって変化するが，従来の稼働率よりは大きい値になる。","従来の稼働率と同じ値である。","従来の稼働率の1.5倍になる。","従来の稼働率の2/3倍になる。"],"answer":1,"explanation":"稼働率＝MTBF÷(MTBF+MTTR)。MTBFとMTTRが両方1.5倍になると，1.5x÷(1.5x+1.5y)＝x÷(x+y)となり，従来と同じ稼働率になります。"},{"id":"AM2-2025春-23","year":"2025年春","section":"午前II","q_num":23,"q":"DBMSにおいて，複数のトランザクション処理プログラムが同一データベースを同時に更新する場合，論理的な矛盾を生じさせないために用いる技法はどれか。","choices":["再編成","正規化","整合性制約","排他制御"],"answer":3,"explanation":"排他制御（ロック）は，複数のトランザクションが同一データに同時アクセスする際の競合を防ぎ，データの整合性を保つ技法です。"},{"id":"AM2-2025春-24","year":"2025年春","section":"午前II","q_num":24,"q":"スイッチングハブ同士を接続する際に，複数のポートを束ねて一つの論理ポートとして扱う技術はどれか。","choices":["MIME","MIMO","マルチパート","リンクアグリゲーション"],"answer":3,"explanation":"リンクアグリゲーション（IEEE 802.3ad/LACP）は，複数の物理ポートを束ねて1つの論理リンクとして扱う技術です。帯域幅の増加と冗長性の確保が実現できます。"},{"id":"AM2-2025春-25","year":"2025年春","section":"午前II","q_num":25,"q":"労働基準法で定める制度のうち，いわゆる36協定と呼ばれる労使協定に関する制度はどれか。","choices":["業務遂行の手段，時間配分の決定などを大幅に労働者に委ねる業務に適用され，労働時間の算定は，労使協定で定めた労働時間の労働とみなす制度","業務の繁閑に応じた労働時間の配分などを行い，労使協定によって1か月以内の期間を平均して1週の法定労働時間を超えないようにする制度","時間外労働，休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることによって，法定労働時間を超える時間外労働が認められる制度","労使協定によって1か月以内の一定期間の総労働時間を定め，1日の固定勤務時間以外では，労働者に始業・終業時刻の決定を委ねる制度"],"answer":2,"explanation":"36協定（労働基準法第36条）とは，時間外労働・休日労働についての労使協定を書面で締結し，労働基準監督署に届け出ることで，法定労働時間を超える労働が認められる制度です。ア：裁量労働制，イ：変形労働時間制，エ：フレックスタイム制の説明です。"}];

// =====================================================
// State
// =====================================================
let state = {
  screen: 'home',     // home | quiz | result | review
  mode: null,         // 'all' | 'AM1' | 'AM2' | 'wrong'
  queue: [],
  idx: 0,
  answered: false,
  chosen: null,
  log: [],            // { id, correct, chosen }
  stats: loadStats()
};

function loadStats() {
  try { return JSON.parse(localStorage.getItem('itsm_stats')) || { total: 0, correct: 0, history: [] }; }
  catch { return { total: 0, correct: 0, history: [] }; }
}
function saveStats() {
  localStorage.setItem('itsm_stats', JSON.stringify(state.stats));
}

// =====================================================
// Render
// =====================================================
function render() {
  const app = document.getElementById('app');
  const pw = document.getElementById('progress-wrap');
  const hs = document.getElementById('header-stats');
  pw.style.display = 'none';
  hs.textContent = '';

  if (state.screen === 'home')   { app.innerHTML = renderHome(); }
  if (state.screen === 'quiz')   { app.innerHTML = renderQuiz(); pw.style.display = 'block'; updateProgress(); }
  if (state.screen === 'result') { app.innerHTML = renderResult(); }
  if (state.screen === 'review') { app.innerHTML = renderReview(); }

  attachEvents();
}

function renderHome() {
  const s = state.stats;
  const pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
  const wrongIds = getWrongIds();
  return `
    <div class="home">
      <div>
        <div class="home-badge">IPA // IT Service Manager</div>
        <h1 style="margin-top:16px">午前<span>過去問</span><br>トレーニング</h1>
        <p class="home-desc" style="margin-top:12px">午前I（応用情報レベル四択）・午前II（専門四択）<br>を繰り返し解いて合格力を鍛える</p>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${s.total}</div>
          <div class="stat-label">累計回答数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:${pct>=60?'var(--correct)':'var(--wrong)'}">${pct}<span style="font-size:18px;color:var(--muted)">%</span></div>
          <div class="stat-label">正解率</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--wrong)">${wrongIds.length}</div>
          <div class="stat-label">苦手問題数</div>
        </div>
      </div>
      <div class="mode-grid">
        <div class="mode-card" data-action="start" data-mode="all">
          <div class="mode-icon">📋</div>
          <div class="mode-name">全問ランダム</div>
          <div class="mode-desc">午前I・IIをシャッフルして出題</div>
          <div class="mode-count">${QUESTIONS.length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM1">
          <div class="mode-icon">📘</div>
          <div class="mode-name">午前Ⅰのみ</div>
          <div class="mode-desc">応用情報レベルの四択問題</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前I').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="AM2">
          <div class="mode-icon">📗</div>
          <div class="mode-name">午前Ⅱのみ</div>
          <div class="mode-desc">ITサービスマネージャー専門</div>
          <div class="mode-count">${QUESTIONS.filter(q=>q.section==='午前II').length} 問</div>
        </div>
        <div class="mode-card" data-action="start" data-mode="wrong" ${wrongIds.length===0?'style="opacity:.4;pointer-events:none"':''}>
          <div class="mode-icon">🎯</div>
          <div class="mode-name">苦手問題</div>
          <div class="mode-desc">間違えた問題だけを集中練習</div>
          <div class="mode-count">${wrongIds.length} 問</div>
        </div>
      </div>
      ${s.total > 0 ? `<button class="btn btn-ghost" style="max-width:200px" data-action="review">📊 最後のセッションを見直す</button>` : ''}
    </div>`;
}

function renderQuiz() {
  const q = state.queue[state.idx];
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const feedbackClass = state.answered ? (state.chosen === q.answer ? 'ok' : 'ng') : '';

  let choicesHtml = q.choices.map((c, i) => {
    let cls = '';
    if (state.answered) {
      if (i === q.answer) cls = 'correct';
      else if (i === state.chosen) cls = 'wrong';
    }
    return `<button class="choice-btn ${cls}" data-action="answer" data-idx="${i}" ${state.answered ? 'disabled' : ''}>
      <span class="choice-key">${keys[i]}</span>
      <span>${c.replace(/^[ア-エ]\. /, '')}</span>
    </button>`;
  }).join('');

  const feedbackHtml = state.answered ? `
    <div class="feedback show">
      <div class="feedback-header ${feedbackClass}">
        <span class="feedback-dot ${feedbackClass}"></span>
        ${state.chosen === q.answer ? '正解！' : '不正解'}
      </div>
      <div class="feedback-answer">正解：<strong>${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</strong></div>
      <div class="feedback-body">${q.explanation}</div>
    </div>` : `<div class="feedback"></div>`;

  const nextLabel = state.idx < state.queue.length - 1 ? '次の問題 →' : '結果を見る';

  return `
    <div class="q-meta">
      <span class="tag">${q.section}</span>
      <span class="tag">${q.year}</span>
      <span class="q-num">${state.idx + 1} / ${state.queue.length}</span>
    </div>
    <div class="q-card">
      <div class="q-text">${q.q}</div>
      ${q.figure ? `<div class="q-figure">${q.figure}</div>` : ''}
    </div>
    <div class="choices">${choicesHtml}</div>
    ${feedbackHtml}
    ${state.answered ? `<div class="btn-row"><button class="btn btn-primary" data-action="next">${nextLabel}</button></div>` : ''}
  `;
}

function renderResult() {
  const total = state.log.length;
  const correct = state.log.filter(l => l.correct).length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 60;
  return `
    <div class="result">
      <div>
        <div class="result-score" style="color:${pass?'var(--correct)':'var(--wrong)'}">${pct}<span>%</span></div>
        <div class="result-label">${correct} 問正解 / ${total} 問中</div>
      </div>
      <div class="result-grade ${pass?'pass':'fail'}">${pass ? '🎉 合格ライン達成！' : '📚 もう一息！ 60% 目標'}</div>
      <div class="result-detail">
        累計: ${state.stats.total} 問 ／ 通算正解率: ${state.stats.total>0 ? Math.round(state.stats.correct/state.stats.total*100) : 0}%
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" data-action="review">解答を見直す</button>
        <button class="btn btn-ghost" data-action="home">ホームへ戻る</button>
      </div>
    </div>`;
}

function renderReview() {
  const keys = ['ア', 'イ', 'ウ', 'エ'];
  const items = state.log.map(l => {
    const q = QUESTIONS.find(q => q.id === l.id);
    const ok = l.correct;
    return `<div class="review-item ${ok?'ok':'ng'}">
      <div class="review-q"><span class="tag" style="font-size:10px;padding:2px 8px;margin-bottom:8px;display:inline-block">${q.section} ${q.year}</span><br>${q.q}</div>
      <div class="review-ans">
        あなたの回答: <span class="${ok?'ok':'ng'}">${keys[l.chosen]}（${q.choices[l.chosen].replace(/^[ア-エ]\. /,'')}）</span>
        ${!ok ? `　正解: <span class="ok">${keys[q.answer]}（${q.choices[q.answer].replace(/^[ア-エ]\. /,'')}）</span>` : ''}
      </div>
      ${!ok ? `<div class="feedback-body" style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7">${q.explanation}</div>` : ''}
    </div>`;
  }).join('');
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h2 style="font-size:16px;font-weight:700">解答一覧</h2>
      <button class="btn btn-ghost" style="flex:none;padding:8px 16px;font-size:13px" data-action="home">← ホーム</button>
    </div>
    <div class="review-list">${items}</div>`;
}

// =====================================================
// Events
// =====================================================
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === 'start') {
    startQuiz(el.dataset.mode);
  } else if (action === 'answer') {
    if (state.answered) return;
    const idx = parseInt(el.dataset.idx);
    answer(idx);
  } else if (action === 'next') {
    nextQuestion();
  } else if (action === 'result') {
    state.screen = 'result';
    render();
  } else if (action === 'review') {
    state.screen = 'review';
    render();
  } else if (action === 'home') {
    state.screen = 'home';
    render();
  }
}

// =====================================================
// Logic
// =====================================================
function startQuiz(mode) {
  let pool = QUESTIONS;
  if (mode === 'AM1') pool = QUESTIONS.filter(q => q.section === '午前I');
  if (mode === 'AM2') pool = QUESTIONS.filter(q => q.section === '午前II');
  if (mode === 'wrong') pool = QUESTIONS.filter(q => getWrongIds().includes(q.id));
  state.queue = shuffle([...pool]);
  state.idx = 0;
  state.answered = false;
  state.chosen = null;
  state.log = [];
  state.mode = mode;
  state.screen = 'quiz';
  render();
}

function answer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.answer;
  state.answered = true;
  state.chosen = chosen;
  state.log.push({ id: q.id, correct, chosen });
  state.stats.total++;
  if (correct) state.stats.correct++;
  // track wrong answers per question
  let wrong = {};
  try { wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}'); } catch {}
  if (!correct) wrong[q.id] = (wrong[q.id] || 0) + 1;
  else delete wrong[q.id];
  localStorage.setItem('itsm_wrong', JSON.stringify(wrong));
  saveStats();
  render();
}

function nextQuestion() {
  if (state.idx < state.queue.length - 1) {
    state.idx++;
    state.answered = false;
    state.chosen = null;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function updateProgress() {
  const pct = ((state.idx + (state.answered ? 1 : 0)) / state.queue.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-stats').textContent = `${state.idx + 1}/${state.queue.length}`;
}

function getWrongIds() {
  try {
    const wrong = JSON.parse(localStorage.getItem('itsm_wrong') || '{}');
    return Object.keys(wrong);
  } catch { return []; }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =====================================================
// Boot
// =====================================================
render();
</script>

</html>
